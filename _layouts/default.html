<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERDVANA — {{ page.title }}</title>
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="/static/img/avatar.jpg">
    <link rel="apple-touch-icon" href="/static/img/avatar.jpg">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/katex/dist/contrib/auto-render.min.js" defer onload='renderMathInElement(document.body, { delimiters: [{ left: "$", right: "$", display: false }, { left: "$$", right: "$$", display: true }] })'></script>
    
    <!-- Mermaid -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js" defer onload='mermaid.initialize({startOnLoad:true, theme:"dark"});'></script>
    
    <!-- Wavedrom -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wavedrom/3.1.0/wavedrom.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wavedrom/3.1.0/skins/default.js" defer></script>

    <!-- Prism Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.min.css">
    <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-core.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/plugins/autoloader/prism-autoloader.min.js" defer onload='Prism.plugins.autoloader.languages_path = "https://cdn.jsdelivr.net/npm/prismjs/components/"'></script>
    
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --secondary-text: #8e8e93;
            --accent-color: #0071e3;
            --border-color: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(28, 28, 30, 0.7);
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Fixed Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
        }

        nav .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: white;
        }

        nav .logo-area img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            object-fit: cover;
        }

        nav .logo {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        nav .nav-links {
            display: flex;
            gap: 30px;
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: var(--secondary-text);
        }

        /* Main Content Container */
        main {
            padding-top: 80px; /* Space for fixed nav */
        }

        /* Footer */
        footer {
            padding: 100px 10% 120px;
            background: #000;
            border-top: 1px solid var(--border-color);
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .footer-left h2 {
            font-size: 48px;
            letter-spacing: -2px;
            margin-bottom: 40px;
        }

        .contact-group h5 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--secondary-text);
            margin-bottom: 20px;
        }

        .contact-pills {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .pill {
            padding: 12px 28px;
            border-radius: 40px;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .pill:hover { opacity: 0.8; transform: scale(1.02); }

        .pill.outline {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .footer-right {
            text-align: right;
        }

        .footer-right p {
            color: var(--secondary-text);
            margin-bottom: 8px;
        }

        @media (max-width: 900px) {
            nav { padding: 15px 20px; }
            nav .nav-links { gap: 15px; }
            nav .nav-links a { font-size: 13px; }
            
            .footer-content { flex-direction: column; align-items: flex-start; gap: 30px; }
            .footer-right { text-align: left; }
        }
    </style>
    {% if page.header_append %}
        {{ page.header_append }}
    {% endif %}
</head>
<body onload="WaveDrom.ProcessAll()">
    <nav>
        <a href="/" class="logo-area">
            <img src="/static/img/avatar.jpg" alt="Verdvana">
            <span class="logo">VERDVANA</span>
        </a>
        <div class="nav-links">
            <a href="/archive">Blog</a>
            <a href="/labs">Labs</a>
            <a href="/comments">Comments</a>
            <a href="https://github.com/Verdvana">GitHub</a>
        </div>
    </nav>

    <main>
        {{ content }}
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-left">
                <h2>Connect.</h2>
                <div class="contact-group">
                    <h5>Direct Contact</h5>
                    <div class="contact-pills">
                        <a href="mailto:verdvana@outlook.com" class="pill">
                            <i class="fa-solid fa-envelope"></i> Email
                        </a>
                        <a href="https://github.com/Verdvana" target="_blank" class="pill outline">
                            <i class="fa-brands fa-github"></i> GitHub
                        </a>
                    </div>
                </div>
            </div>
            <div class="footer-right">
                <p>© 2018-2026 Verdvana. All rights reserved.</p>
                <p style="font-size: 12px;">Engineered with precision in Shanghai.</p>
            </div>
        </div>
    </footer>

    <!-- Busuanzi Script -->
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</body>
</html>
