<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width,initial-scale=1" name="viewport"/>
    <title>在线加密工具箱</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" referrerpolicy="no-referrer" rel="stylesheet"/>
    <style>

:root{
  --bg: #0b0f14;
  --panel: rgba(255,255,255,0.06);
  --panel2: rgba(255,255,255,0.08);
  --text: rgba(255,255,255,0.92);
  --muted: rgba(255,255,255,0.66);
  --faint: rgba(255,255,255,0.45);
  --border: rgba(255,255,255,0.12);
  --shadow: 0 18px 60px rgba(0,0,0,0.45);
  --accent: #7aa2ff;
  --accent2:#7df0c4;
  --danger:#ff6b6b;
  --ok:#39d98a;
  --warn:#ffd166;
  --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
  --radius: 16px;
}


*{box-sizing:border-box;margin:0;padding:0;}
body{background:radial-gradient(1200px 700px at 80% -20%,rgba(122,162,255,.22),transparent 60%),
  radial-gradient(900px 550px at 20% 0%,rgba(125,240,196,.18),transparent 55%),var(--bg);
  color:var(--text);font-family:var(--sans);line-height:1.5;min-height:100vh;}
a{color:var(--accent);text-decoration:none;}a:hover{text-decoration:underline;}
.wrap{max-width:960px;margin:0 auto;padding:24px 18px 80px;
    padding-top: 90px;
}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px;}
.brand{display:flex;gap:12px;align-items:center;}
.brand-icon{width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,rgba(122,162,255,.95),rgba(125,240,196,.85));
  box-shadow:0 10px 30px rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;}
h1{font-size:18px;margin:0;letter-spacing:.2px;}
.subtitle{margin:2px 0 0;color:var(--muted);font-size:13px;}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:22px;}
.tab-btn{background:var(--panel);border:1px solid var(--border);color:var(--muted);
  padding:8px 16px;border-radius:999px;cursor:pointer;font-size:13px;font-family:var(--sans);
  transition:all .18s;white-space:nowrap;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:700px){.grid{grid-template-columns:1fr;}}
.card{border:1px solid var(--border);background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.03));
  border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.card .hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.card .hd h3{font-size:14px;font-weight:600;margin:0;flex:1;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.card .bd{padding:16px 18px;display:flex;flex-direction:column;gap:12px;}
label{font-size:13px;color:var(--muted);display:block;margin-bottom:4px;}
textarea,input[type=text],input[type=number],input[type=password],select{
  width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:var(--mono);font-size:13px;padding:10px 12px;resize:vertical;
  outline:none;transition:border-color .2s;}
textarea:focus,input:focus,select:focus{border-color:var(--accent);}
textarea{min-height:100px;}
select{resize:none;cursor:pointer;}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;}
button.primary{background:var(--accent);border:none;color:#fff;padding:8px 18px;border-radius:8px;
  cursor:pointer;font-size:13px;font-family:var(--sans);font-weight:600;transition:opacity .18s;}
button.primary:hover{opacity:.85;}
button.secondary{background:var(--panel2);border:1px solid var(--border);color:var(--text);
  padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--sans);transition:all .18s;}
button.secondary:hover{border-color:var(--accent);color:var(--accent);}
button.danger{background:var(--danger);border:none;color:#fff;padding:8px 14px;border-radius:8px;
  cursor:pointer;font-size:13px;font-family:var(--sans);transition:opacity .18s;}
button.danger:hover{opacity:.85;}
.result-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.result-row:last-child{border-bottom:none;}
.result-label{font-size:12px;color:var(--muted);min-width:80px;flex-shrink:0;}
.result-val{font-family:var(--mono);font-size:12px;color:var(--accent2);word-break:break-all;flex:1;}
.copy-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:4px 10px;
  border-radius:6px;cursor:pointer;font-size:11px;font-family:var(--sans);flex-shrink:0;transition:all .18s;}
.copy-btn:hover{border-color:var(--accent);color:var(--accent);}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:12px;}
.badge.ok{background:rgba(57,217,138,.15);color:var(--ok);}
.badge.warn{background:rgba(255,209,102,.15);color:var(--warn);}
.badge.err{background:rgba(255,107,107,.15);color:var(--danger);}
.code-block{background:var(--panel2);border:1px solid var(--border);border-radius:10px;
  padding:12px;font-family:var(--mono);font-size:12px;white-space:pre-wrap;word-break:break-all;
  max-height:220px;overflow-y:auto;}
.tab-panel{display:none;animation:fadeIn .2s ease;}
.tab-panel.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.full-card{border:1px solid var(--border);background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.03));
  border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px;}
.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px;}
@media(max-width:700px){.row3{grid-template-columns:1fr;}}
.checkbox-group{display:flex;gap:12px;flex-wrap:wrap;}
.checkbox-group label{display:flex;align-items:center;gap:5px;color:var(--text);font-size:13px;cursor:pointer;}
.checkbox-group input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);}
footer.foot{text-align:center;padding:24px;color:var(--faint);font-size:12px;border-top:1px solid var(--border);margin-top:40px;}
/* ====== Theme override: manual light/dark ====== */
    
    

    /* ====== Smooth theme transition (avoid affecting input experience) ====== */
    html {
      scrollbar-gutter: stable;
    }
    html.theme-transition,
    html.theme-transition body{
      transition: background-color .25s ease, color .25s ease;
    }
    html.theme-transition *:not(input):not(textarea):not(select),
    html.theme-transition *:not(input):not(textarea):not(select)::before,
    html.theme-transition *:not(input):not(textarea):not(select)::after{
      transition:
        background-color .25s ease,
        color .25s ease,
        border-color .25s ease,
        box-shadow .25s ease,
        fill .25s ease,
        stroke .25s ease,
        opacity .25s ease;
    }
    html.theme-transition input,
    html.theme-transition textarea,
    html.theme-transition select{
      transition: none !important;
    }

    /* ====== iOS-like theme switch ====== */
    
    
    
    
    
    
    
    
    
    

      

        /* ── Fixed Navigation (exact from index.html) ─────────────────────── */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
        }

        nav .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #ffffff;
        }

        nav .logo-area img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            object-fit: cover;
        }

        nav .logo {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        nav .nav-links {
            display: flex;
            gap: 30px;
        }

        nav a {
            text-decoration: none;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #8e8e93;
        }

        @media (max-width: 900px) {
            nav { padding: 15px 20px; }
            nav .nav-links { gap: 15px; }
            nav .nav-links a { font-size: 13px; }
        }


        /* ── Floating Back Button ─────────────────────────────────────── */
        #fabBack {
            position: fixed;
            bottom: 32px;
            right: 32px;
            z-index: 999;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #0071e3;
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0,113,227,0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
        }
        #fabBack:hover {
            background: #0077ed;
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0,113,227,0.55);
        }
        #fabBack:active {
            transform: translateY(0);
        }

    </style>
</head>
<body>
<nav>
    <a class="logo-area" href="/">
        <img alt="Verdvana" src="/static/img/avatar.jpg"/>
        <span class="logo">VERDVANA</span>
    </a>
    <div class="nav-links">
        <a href="/archive">Blog</a><a href="/labs">Labs</a><a href="/comments">Comments</a><a href="https://github.com/Verdvana">GitHub</a>
    </div>
</nav>
<main class="main" id="mainContent">
<div class="wrap">
<!-- Topbar -->
<header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
<div style="flex:1;">
<h1 style="margin:0; font-size: 24px; letter-spacing: -0.5px;">在线加密工具箱</h1>
<p style="margin:4px 0 0; opacity: 0.5; font-size: 13px;">纯客户端 · 数据不上传 · 支持哈希 / 对称加密 / 编解码 / JWT 等</p>
</div>
<div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap; justify-content:flex-end;">

</div>
</header>
<!-- Tabs -->
<div class="tabs">
<button class="tab-btn active" onclick="switchTab('hash',this)"><i class="fa-solid fa-hashtag"></i> 哈希</button>
<button class="tab-btn" onclick="switchTab('hmac',this)"><i class="fa-solid fa-key"></i> HMAC</button>
<button class="tab-btn" onclick="switchTab('aes',this)"><i class="fa-solid fa-shield-halved"></i> AES</button>
<button class="tab-btn" onclick="switchTab('base64',this)"><i class="fa-solid fa-code"></i> Base64</button>
<button class="tab-btn" onclick="switchTab('hex',this)"><i class="fa-solid fa-grip"></i> Hex</button>
<button class="tab-btn" onclick="switchTab('url',this)"><i class="fa-solid fa-link"></i> URL编解码</button>
<button class="tab-btn" onclick="switchTab('jwt',this)"><i class="fa-solid fa-id-badge"></i> JWT解析</button>
<button class="tab-btn" onclick="switchTab('rand',this)"><i class="fa-solid fa-dice"></i> 随机生成</button>
</div>
<!-- Panel 1: Hash -->
<div class="tab-panel active" id="p-hash">
<div class="grid">
<div class="card">
<div class="hd"><div class="dot"></div><h3>输入文本</h3></div>
<div class="bd">
<div><label>待哈希的文本</label><textarea id="hash-input" placeholder="请输入要计算哈希的文本..."></textarea></div>
<div><label>字符编码</label>
<select id="hash-enc"><option value="utf8">UTF-8</option><option value="utf16">UTF-16LE</option></select>
</div>
<div class="toolbar">
<button class="primary" onclick="calcHash()"><i class="fa-solid fa-play"></i> 计算哈希</button>
<button class="secondary" onclick="clearField('hash-input','hash-results')">清空</button>
</div>
</div>
</div>
<div class="card">
<div class="hd"><div class="dot" style="background:var(--accent2)"></div><h3>哈希结果</h3></div>
<div class="bd" id="hash-results">
<div class="result-row"><span class="result-label">MD5</span><span class="result-val" id="r-md5">—</span><button class="copy-btn" onclick="copyVal('r-md5',this)">复制</button></div>
<div class="result-row"><span class="result-label">SHA-1</span><span class="result-val" id="r-sha1">—</span><button class="copy-btn" onclick="copyVal('r-sha1',this)">复制</button></div>
<div class="result-row"><span class="result-label">SHA-256</span><span class="result-val" id="r-sha256">—</span><button class="copy-btn" onclick="copyVal('r-sha256',this)">复制</button></div>
<div class="result-row"><span class="result-label">SHA-384</span><span class="result-val" id="r-sha384">—</span><button class="copy-btn" onclick="copyVal('r-sha384',this)">复制</button></div>
<div class="result-row"><span class="result-label">SHA-512</span><span class="result-val" id="r-sha512">—</span><button class="copy-btn" onclick="copyVal('r-sha512',this)">复制</button></div>
</div>
</div>
</div>
</div>
<!-- Panel 2: HMAC -->
<div class="tab-panel" id="p-hmac">
<div class="grid">
<div class="card">
<div class="hd"><div class="dot"></div><h3>HMAC 参数</h3></div>
<div class="bd">
<div><label>消息内容</label><textarea id="hmac-msg" placeholder="请输入消息..."></textarea></div>
<div><label>密钥 (Key)</label><input id="hmac-key" placeholder="输入密钥字符串" type="text"/></div>
<div><label>算法</label>
<select id="hmac-alg">
<option value="SHA-1">HMAC-SHA-1</option>
<option selected="" value="SHA-256">HMAC-SHA-256</option>
<option value="SHA-384">HMAC-SHA-384</option>
<option value="SHA-512">HMAC-SHA-512</option>
</select>
</div>
<div class="toolbar">
<button class="primary" onclick="calcHMAC()"><i class="fa-solid fa-play"></i> 计算 HMAC</button>
<button class="secondary" onclick="document.getElementById('hmac-msg').value='';document.getElementById('hmac-result').textContent='—'">清空</button>
</div>
</div>
</div>
<div class="card">
<div class="hd"><div class="dot" style="background:var(--accent2)"></div><h3>HMAC 结果</h3></div>
<div class="bd">
<div><label>十六进制结果</label>
<div class="code-block" id="hmac-result" style="min-height:60px;">—</div>
</div>
<div class="toolbar"><button class="copy-btn" onclick="copyText(document.getElementById('hmac-result').textContent,this)" style="padding:7px 16px;">复制结果</button></div>
</div>
</div>
</div>
</div>
<!-- Panel 3: AES -->
<div class="tab-panel" id="p-aes">
<div class="grid">
<div class="card">
<div class="hd"><div class="dot"></div><h3>AES 加解密参数</h3></div>
<div class="bd">
<div><label>操作</label>
<select id="aes-op"><option value="enc">加密 (Encrypt)</option><option value="dec">解密 (Decrypt)</option></select>
</div>
<div><label>明文 / 密文</label><textarea id="aes-input" placeholder="加密时输入明文；解密时输入 Base64 密文..."></textarea></div>
<div><label>密码 (Password)</label><input id="aes-pass" placeholder="输入密码（自动派生密钥）" type="password"/></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
<div><label>模式</label>
<select id="aes-mode"><option value="AES-GCM">AES-GCM</option><option value="AES-CBC">AES-CBC</option></select>
</div>
<div><label>密钥长度</label>
<select id="aes-bits"><option value="128">128 bit</option><option value="192">192 bit</option><option selected="" value="256">256 bit</option></select>
</div>
</div>
<div class="toolbar">
<button class="primary" onclick="doAES()"><i class="fa-solid fa-shield-halved"></i> 执行</button>
<button class="secondary" onclick="document.getElementById('aes-input').value='';document.getElementById('aes-output').value=''">清空</button>
</div>
</div>
</div>
<div class="card">
<div class="hd"><div class="dot" style="background:var(--accent2)"></div><h3>输出结果</h3></div>
<div class="bd">
<div><label>结果（Base64）</label><textarea id="aes-output" placeholder="结果将显示在此处..." readonly=""></textarea></div>
<div class="badge err" id="aes-err" style="display:none;"><i class="fa-solid fa-circle-exclamation"></i> <span id="aes-err-msg"></span></div>
<div class="toolbar"><button class="copy-btn" onclick="copyText(document.getElementById('aes-output').value,this)" style="padding:7px 16px;">复制结果</button></div>
</div>
</div>
</div>
</div>
<!-- Panel 4: Base64 -->
<div class="tab-panel" id="p-base64">
<div class="grid">
<div class="card">
<div class="hd"><div class="dot"></div><h3>输入</h3></div>
<div class="bd">
<div><label>文本内容</label><textarea id="b64-input" placeholder="输入文本或 Base64 字符串..."></textarea></div>
<div><label>模式</label>
<select id="b64-mode"><option value="std">标准 Base64</option><option value="url">URL-Safe Base64</option></select>
</div>
<div><label>文件上传（将文件转为 Base64）</label>
<input id="b64-file" style="background:none;border:none;padding:0;font-family:var(--sans);color:var(--muted);font-size:13px;" type="file"/>
</div>
<div class="toolbar">
<button class="primary" onclick="b64Encode()"><i class="fa-solid fa-arrow-right"></i> 编码</button>
<button class="secondary" onclick="b64Decode()"><i class="fa-solid fa-arrow-left"></i> 解码</button>
<button class="secondary" onclick="document.getElementById('b64-input').value='';document.getElementById('b64-output').value=''">清空</button>
</div>
</div>
</div>
<div class="card">
<div class="hd"><div class="dot" style="background:var(--accent2)"></div><h3>结果</h3></div>
<div class="bd">
<div><label>输出</label><textarea id="b64-output" placeholder="结果显示在此..." readonly=""></textarea></div>
<div class="toolbar"><button class="copy-btn" onclick="copyText(document.getElementById('b64-output').value,this)" style="padding:7px 16px;">复制结果</button></div>
</div>
</div>
</div>
</div>
<!-- Panel 5: Hex -->
<div class="tab-panel" id="p-hex">
<div class="grid">
<div class="card">
<div class="hd"><div class="dot"></div><h3>输入</h3></div>
<div class="bd">
<div><label>文本 / Hex 字符串</label><textarea id="hex-input" placeholder="输入文本或十六进制字符串..."></textarea></div>
<div><label>十六进制分隔符</label>
<select id="hex-sep"><option value="">无分隔</option><option value=" ">空格</option><option value=":">冒号</option></select>
</div>
<div class="toolbar">
<button class="primary" onclick="toHex()"><i class="fa-solid fa-arrow-right"></i> 文本→Hex</button>
<button class="secondary" onclick="fromHex()"><i class="fa-solid fa-arrow-left"></i> Hex→文本</button>
<button class="secondary" onclick="document.getElementById('hex-input').value='';document.getElementById('hex-output').value=''">清空</button>
</div>
</div>
</div>
<div class="card">
<div class="hd"><div class="dot" style="background:var(--accent2)"></div><h3>结果</h3></div>
<div class="bd">
<div><label>输出</label><textarea id="hex-output" placeholder="结果显示在此..." readonly=""></textarea></div>
<div class="toolbar"><button class="copy-btn" onclick="copyText(document.getElementById('hex-output').value,this)" style="padding:7px 16px;">复制结果</button></div>
</div>
</div>
</div>
</div>
<!-- Panel 6: URL -->
<div class="tab-panel" id="p-url">
<div class="grid">
<div class="card">
<div class="hd"><div class="dot"></div><h3>输入</h3></div>
<div class="bd">
<div><label>URL / 文本内容</label><textarea id="url-input" placeholder="输入 URL 或文本..."></textarea></div>
<div class="toolbar">
<button class="primary" onclick="urlEncode()"><i class="fa-solid fa-arrow-right"></i> 编码</button>
<button class="secondary" onclick="urlDecode()"><i class="fa-solid fa-arrow-left"></i> 解码</button>
<button class="secondary" onclick="document.getElementById('url-input').value='';document.getElementById('url-output').value=''">清空</button>
</div>
</div>
</div>
<div class="card">
<div class="hd"><div class="dot" style="background:var(--accent2)"></div><h3>结果</h3></div>
<div class="bd">
<div><label>输出</label><textarea id="url-output" placeholder="结果显示在此..." readonly=""></textarea></div>
<div class="toolbar"><button class="copy-btn" onclick="copyText(document.getElementById('url-output').value,this)" style="padding:7px 16px;">复制结果</button></div>
</div>
</div>
</div>
</div>
<!-- Panel 7: JWT -->
<div class="tab-panel" id="p-jwt">
<div class="full-card">
<div class="hd"><div class="dot"></div><h3>JWT Token 输入</h3></div>
<div class="bd">
<div><label>粘贴 JWT Token</label><textarea id="jwt-input" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIn0..." style="min-height:80px;"></textarea></div>
<div class="toolbar">
<button class="primary" onclick="parseJWT()"><i class="fa-solid fa-magnifying-glass"></i> 解析</button>
<button class="secondary" onclick="document.getElementById('jwt-input').value='';document.getElementById('jwt-out').innerHTML=''">清空</button>
</div>

// ── Copy helpers ──

// ── MD5 (pure JS, RFC 1321) ──
function md5(str){
  function safeAdd(x,y){const lsw=(x&0xffff)+(y&0xffff);return((x>>16)+(y>>16)+(lsw>>16))<<16|lsw&0xffff;}
  function rol(n,c){return n<<c|n>>>32-c;}
  function cmn(q,a,b,x,s,t){return safeAdd(rol(safeAdd(safeAdd(a,q),safeAdd(x,t)),s),b);}
  function ff(a,b,c,d,x,s,t){return cmn(b&c|~b&d,a,b,x,s,t);}
  function gg(a,b,c,d,x,s,t){return cmn(b&d|c&~d,a,b,x,s,t);}
  function hh(a,b,c,d,x,s,t){return cmn(b^c^d,a,b,x,s,t);}
  function ii(a,b,c,d,x,s,t){return cmn(c^(b|~d),a,b,x,s,t);}
  function coreMD5(x,len){
    x[len>>5]|=0x80<<len%32;x[(len+64>>>9<<4)+14]=len;
    let a=1732584193,b=-271733879,c=-1732584194,d=271733878;
    for(let i=0;i<x.length;i+=16){
      let oa=a,ob=b,oc=c,od=d;
      a=ff(a,b,c,d,x[i],7,-680876936);d=ff(d,a,b,c,x[i+1],12,-389564586);
      c=ff(c,d,a,b,x[i+2],17,606105819);b=ff(b,c,d,a,x[i+3],22,-1044525330);
      a=ff(a,b,c,d,x[i+4],7,-176418897);d=ff(d,a,b,c,x[i+5],12,1200080426);
      c=ff(c,d,a,b,x[i+6],17,-1473231341);b=ff(b,c,d,a,x[i+7],22,-45705983);
      a=ff(a,b,c,d,x[i+8],7,1770035416);d=ff(d,a,b,c,x[i+9],12,-1958414417);
      c=ff(c,d,a,b,x[i+10],17,-42063);b=ff(b,c,d,a,x[i+11],22,-1990404162);
      a=ff(a,b,c,d,x[i+12],7,1804603682);d=ff(d,a,b,c,x[i+13],12,-40341101);
      c=ff(c,d,a,b,x[i+14],17,-1502002290);b=ff(b,c,d,a,x[i+15],22,1236535329);
      a=gg(a,b,c,d,x[i+1],5,-165796510);d=gg(d,a,b,c,x[i+6],9,-1069501632);
      c=gg(c,d,a,b,x[i+11],14,643717713);b=gg(b,c,d,a,x[i],20,-373897302);
      a=gg(a,b,c,d,x[i+5],5,-701558691);d=gg(d,a,b,c,x[i+10],9,38016083);
      c=gg(c,d,a,b,x[i+15],14,-660478335);b=gg(b,c,d,a,x[i+4],20,-405537848);
      a=gg(a,b,c,d,x[i+9],5,568446438);d=gg(d,a,b,c,x[i+14],9,-1019803690);
      c=gg(c,d,a,b,x[i+3],14,-187363961);b=gg(b,c,d,a,x[i+8],20,1163531501);
      a=gg(a,b,c,d,x[i+13],5,-1444681467);d=gg(d,a,b,c,x[i+2],9,-51403784);
      c=gg(c,d,a,b,x[i+7],14,1735328473);b=gg(b,c,d,a,x[i+12],20,-1926607734);
      a=hh(a,b,c,d,x[i+5],4,-378558);d=hh(d,a,b,c,x[i+8],11,-2022574463);
      c=hh(c,d,a,b,x[i+11],16,1839030562);b=hh(b,c,d,a,x[i+14],23,-35309556);
      a=hh(a,b,c,d,x[i+1],4,-1530992060);d=hh(d,a,b,c,x[i+4],11,1272893353);
      c=hh(c,d,a,b,x[i+7],16,-155497632);b=hh(b,c,d,a,x[i+10],23,-1094730640);
      a=hh(a,b,c,d,x[i+13],4,681279174);d=hh(d,a,b,c,x[i],11,-358537222);
      c=hh(c,d,a,b,x[i+3],16,-722521979);b=hh(b,c,d,a,x[i+6],23,76029189);
      a=hh(a,b,c,d,x[i+9],4,-640364487);d=hh(d,a,b,c,x[i+12],11,-421815835);
      c=hh(c,d,a,b,x[i+15],16,530742520);b=hh(b,c,d,a,x[i+2],23,-995338651);
      a=ii(a,b,c,d,x[i],6,-198630844);d=ii(d,a,b,c,x[i+7],10,1126891415);
      c=ii(c,d,a,b,x[i+14],15,-1416354905);b=ii(b,c,d,a,x[i+5],21,-57434055);
      a=ii(a,b,c,d,x[i+12],6,1700485571);d=ii(d,a,b,c,x[i+3],10,-1894986606);
      c=ii(c,d,a,b,x[i+10],15,-1051523);b=ii(b,c,d,a,x[i+1],21,-2054922799);
      a=ii(a,b,c,d,x[i+8],6,1873313359);d=ii(d,a,b,c,x[i+15],10,-30611744);
      c=ii(c,d,a,b,x[i+6],15,-1560198380);b=ii(b,c,d,a,x[i+13],21,1309151649);
      a=ii(a,b,c,d,x[i+4],6,-145523070);d=ii(d,a,b,c,x[i+11],10,-1120210379);
      c=ii(c,d,a,b,x[i+2],15,718787259);b=ii(b,c,d,a,x[i+9],21,-343485551);
      a=safeAdd(a,oa);b=safeAdd(b,ob);c=safeAdd(c,oc);d=safeAdd(d,od);
    }
    return[a,b,c,d];
  }
  function str2blks(str){
    const nblk=((str.length+8)>>6)+1,blks=Array(nblk*16).fill(0);
    for(let i=0;i<str.length;i++)blks[i>>2]|=str.charCodeAt(i)<<(i%4*8);
    blks[str.length>>2]|=0x80<<str.length%4*8;
    return blks;
  }
  function binl2hex(bin){
    const hex='0123456789abcdef';let s='';
    for(let i=0;i<bin.length*4;i++)s+=hex[(bin[i>>2]>>(i%4*8+4))&0xf]+hex[(bin[i>>2]>>(i%4*8))&0xf];
    return s;
  }
  const uriEnc=unescape(encodeURIComponent(str));
  return binl2hex(coreMD5(str2blks(uriEnc),uriEnc.length*8));
}

// ── Encode text to Uint8Array ──
function encodeText(text,enc){
  if(enc==='utf16'){
    const buf=new Uint8Array(text.length*2);
    for(let i=0;i<text.length;i++){const c=text.charCodeAt(i);buf[i*2]=c&0xff;buf[i*2+1]=(c>>8)&0xff;}
    return buf;
  }
  return new TextEncoder().encode(text);
}

// ── ArrayBuffer to hex ──
function buf2hex(buf){return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}

// ── Hash computation ──
async function calcHash(){
  const text=document.getElementById('hash-input').value;
  const enc=document.getElementById('hash-enc').value;
  if(!text){alert('请输入文本');return;}
  document.getElementById('r-md5').textContent=md5(text);
  const buf=encodeText(text,enc);
  for(const [name,id] of[['SHA-1','r-sha1'],['SHA-256','r-sha256'],['SHA-384','r-sha384'],['SHA-512','r-sha512']]){
    try{
      const h=await crypto.subtle.digest(name,buf);
      document.getElementById(id).textContent=buf2hex(h);
    }catch(e){document.getElementById(id).textContent='错误: '+e.message;}
  }
}

// ── HMAC ──
async function calcHMAC(){
  const msg=document.getElementById('hmac-msg').value;
  const key=document.getElementById('hmac-key').value;
  const alg=document.getElementById('hmac-alg').value;
  const el=document.getElementById('hmac-result');
  if(!msg||!key){el.textContent='请输入消息和密钥';return;}
  try{
    const k=await crypto.subtle.importKey('raw',new TextEncoder().encode(key),{name:'HMAC',hash:alg},false,['sign']);
    const sig=await crypto.subtle.sign('HMAC',k,new TextEncoder().encode(msg));
    el.textContent=buf2hex(sig);
  }catch(e){el.textContent='错误: '+e.message;}
}

// ── AES (PBKDF2 key derivation) ──
async function doAES(){
  const op=document.getElementById('aes-op').value;
  const input=document.getElementById('aes-input').value.trim();
  const pass=document.getElementById('aes-pass').value;
  const mode=document.getElementById('aes-mode').value;
  const bits=parseInt(document.getElementById('aes-bits').value);
  const outEl=document.getElementById('aes-output');
  const errEl=document.getElementById('aes-err');
  const errMsg=document.getElementById('aes-err-msg');
  errEl.style.display='none';outEl.value='';
  if(!input||!pass){errMsg.textContent='请填写内容和密码';errEl.style.display='flex';return;}
  try{
    const salt=new TextEncoder().encode('CryptoToolboxSalt2024');
    const baseKey=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey(
      {name:'PBKDF2',salt:salt,iterations:100000,hash:'SHA-256'},
      baseKey,{name:mode,length:bits},false,['encrypt','decrypt']
    );
    if(op==='enc'){
      const iv=crypto.getRandomValues(new Uint8Array(mode==='AES-GCM'?12:16));
      const ct=await crypto.subtle.encrypt({name:mode,iv:iv},key,new TextEncoder().encode(input));
      const combined=new Uint8Array(iv.length+ct.byteLength);
      combined.set(iv);combined.set(new Uint8Array(ct),iv.length);
      outEl.value=btoa(String.fromCharCode(...combined));
    }else{
      const raw=Uint8Array.from(atob(input),c=>c.charCodeAt(0));
      const ivLen=mode==='AES-GCM'?12:16;
      const iv=raw.slice(0,ivLen);const ct=raw.slice(ivLen);
      const pt=await crypto.subtle.decrypt({name:mode,iv:iv},key,ct);
      outEl.value=new TextDecoder().decode(pt);
    }
  }catch(e){errMsg.textContent=e.message;errEl.style.display='flex';}
}

// ── Base64 ──
function b64Encode(){
  const text=document.getElementById('b64-input').value;
  const urlSafe=document.getElementById('b64-mode').value==='url';
  try{
    let result=btoa(unescape(encodeURIComponent(text)));
    if(urlSafe)result=result.replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
    document.getElementById('b64-output').value=result;
  }catch(e){document.getElementById('b64-output').value='编码错误: '+e.message;}
}
function b64Decode(){
  let text=document.getElementById('b64-input').value.trim();
  const urlSafe=document.getElementById('b64-mode').value==='url';
  if(urlSafe){text=text.replace(/-/g,'+').replace(/_/g,'/');while(text.length%4)text+='=';}
  try{document.getElementById('b64-output').value=decodeURIComponent(escape(atob(text)));}
  catch(e){document.getElementById('b64-output').value='解码错误: '+e.message;}
}
document.getElementById('b64-file').addEventListener('change',function(){
  const file=this.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    let result=e.target.result.split(',')[1]||'';
    if(document.getElementById('b64-mode').value==='url')
      result=result.replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
    document.getElementById('b64-output').value=result;
  };
  reader.readAsDataURL(file);
});

// ── Hex ──
function toHex(){
  const text=document.getElementById('hex-input').value;
  const sep=document.getElementById('hex-sep').value;
  const bytes=new TextEncoder().encode(text);
  const hex=Array.from(bytes).map(b=>b.toString(16).padStart(2,'0'));
  document.getElementById('hex-output').value=hex.join(sep);
}
function fromHex(){
  let hex=document.getElementById('hex-input').value.trim().replace(/[:\s]+/g,'');
  try{
    const bytes=[];
    for(let i=0;i<hex.length;i+=2)bytes.push(parseInt(hex.slice(i,i+2),16));
    document.getElementById('hex-output').value=new TextDecoder().decode(new Uint8Array(bytes));
  }catch(e){document.getElementById('hex-output').value='解码错误: '+e.message;}
}

// ── URL encode/decode ──
function urlEncode(){document.getElementById('url-output').value=encodeURIComponent(document.getElementById('url-input').value);}
function urlDecode(){
  try{document.getElementById('url-output').value=decodeURIComponent(document.getElementById('url-input').value);}
  catch(e){document.getElementById('url-output').value='解码错误: '+e.message;}
}

// ── JWT decoder ──
function parseJWT(){
  const token=document.getElementById('jwt-input').value.trim();
  const out=document.getElementById('jwt-out');
  out.innerHTML='';
  if(!token){out.innerHTML='<div class="badge err">请输入 JWT Token</div>';return;}
  const parts=token.split('.');
  if(parts.length!==3){out.innerHTML='<div class="badge err">无效的 JWT 格式（需要3段）</div>';return;}
  function b64url(s){s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';try{return JSON.parse(atob(s));}catch{return null;}}
  const header=b64url(parts[0]),payload=b64url(parts[1]);
  if(!header||!payload){out.innerHTML='<div class="badge err">JWT 解析失败，请检查格式</div>';return;}
  let expBadge='';
  if(payload.exp){
    const now=Math.floor(Date.now()/1000);
    const expDate=new Date(payload.exp*1000).toLocaleString('zh-CN');
    if(payload.exp>now)expBadge=`<span class="badge ok"><i class="fa-solid fa-check"></i> 未过期 (${expDate})</span>`;
    else expBadge=`<span class="badge err"><i class="fa-solid fa-xmark"></i> 已过期 (${expDate})</span>`;
  }else{expBadge='<span class="badge warn">无 exp 字段</span>';}
  out.innerHTML=`
    <div class="grid">
      <div class="card"><div class="hd"><div class="dot"></div><h3>Header</h3></div><div class="bd">
        <div class="code-block">${JSON.stringify(header,null,2)}</div>
      </div></div>
      <div class="card"><div class="hd"><div class="dot" style="background:var(--accent2)"></div><h3>Payload</h3>
        <span style="margin-left:auto">${expBadge}</span>
      </div><div class="bd">
        <div class="code-block">${JSON.stringify(payload,null,2)}</div>
      </div></div>
    </div>`;
}

// ── Random generators ──
function genUUID(){
  const n=Math.min(50,Math.max(1,parseInt(document.getElementById('uuid-count').value)||1));
  const uuids=[];
  for(let i=0;i<n;i++){
    uuids.push(([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,c=>(c^crypto.getRandomValues(new Uint8Array(1))[0]&15>>c/4).toString(16)));
  }
  document.getElementById('uuid-out').textContent=uuids.join('\n');
}
function genBytes(){
  const n=Math.min(512,Math.max(1,parseInt(document.getElementById('rbytes-count').value)||16));
  const bytes=crypto.getRandomValues(new Uint8Array(n));
  const fmt=document.getElementById('rbytes-fmt').value;
  if(fmt==='hex'){document.getElementById('rbytes-out').textContent=Array.from(bytes).map(b=>b.toString(16).padStart(2,'0')).join('');}
  else{document.getElementById('rbytes-out').textContent=btoa(String.fromCharCode(...bytes));}
}
function genPassword(){
  const len=Math.min(128,Math.max(4,parseInt(document.getElementById('pwd-len').value)||16));
  let cset='';
  if(document.getElementById('pwd-upper').checked)cset+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if(document.getElementById('pwd-lower').checked)cset+='abcdefghijklmnopqrstuvwxyz';
  if(document.getElementById('pwd-digit').checked)cset+='0123456789';
  if(document.getElementById('pwd-sym').checked)cset+='!@#$%^&*()_+-=[]{}|;:,.<>?';
  if(!cset){alert('请至少选择一种字符集');return;}
  const rnd=crypto.getRandomValues(new Uint32Array(len));
  document.getElementById('pwd-out').textContent=Array.from(rnd).map(v=>cset[v%cset.length]).join('');
}
