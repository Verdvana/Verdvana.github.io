<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpyGlass CDC Rule Reference | Interactive Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border-color: #334155;
            --highlight: #0ea5e9;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Styles */
        aside {
            width: 300px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 8px;
        }

        .search-box {
            width: 100%;
            padding: 10px 16px;
            background: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }

        .rule-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
        }

        .category-group {
            margin-bottom: 24px;
        }

        .category-title {
            padding: 0 24px 8px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            font-weight: 600;
        }

        .rule-item {
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            font-size: 0.95rem;
        }

        .rule-item:hover {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-color);
        }

        .rule-item.active {
            background: rgba(56, 189, 248, 0.15);
            border-left-color: var(--accent-color);
            color: var(--accent-color);
            font-weight: 500;
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Visualization Area */
        .viz-panel {
            flex: 3;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        .viz-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .viz-card h3 {
            position: absolute;
            top: 20px;
            left: 24px;
            font-size: 0.9rem;
            color: var(--text-dim);
            font-weight: 500;
        }

        /* Detail Panel */
        .detail-panel {
            flex: 2;
            background: #111827;
            border-left: 1px solid var(--border-color);
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .detail-header h2 {
            font-size: 1.75rem;
            margin-bottom: 8px;
        }

        .severity-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .severity-error { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .severity-warning { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }

        .info-section h3 {
            font-size: 1.1rem;
            margin-bottom: 16px;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-section p {
            line-height: 1.6;
            color: var(--text-main);
            font-size: 1rem;
        }

        .fix-box {
            background: rgba(16, 185, 129, 0.1);
            border-left: 4px solid var(--success);
            padding: 20px;
            border-radius: 4px 12px 12px 4px;
        }

        .waive-box {
            background: rgba(245, 158, 11, 0.1);
            border-left: 4px solid var(--warning);
            padding: 20px;
            border-radius: 4px 12px 12px 4px;
        }

        /* SVG & Animation Styles */
        .circuit-svg {
            width: 100%;
            max-width: 600px;
            height: auto;
            display: block;
        }

        #circuitContainer, #waveformContainer {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .signal-line {
            stroke: var(--text-dim);
            stroke-width: 2;
            fill: none;
        }

        .signal-pulse {
            stroke: var(--accent-color);
            stroke-width: 3;
            stroke-dasharray: 10;
            animation: flow 2s linear infinite;
        }

        @keyframes flow {
            from { stroke-dashoffset: 20; }
            to { stroke-dashoffset: 0; }
        }

        .flop {
            fill: var(--sidebar-bg);
            stroke: var(--accent-color);
            stroke-width: 2;
        }

        .gate {
            fill: rgba(56, 189, 248, 0.1);
            stroke: var(--accent-color);
            stroke-width: 2;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-dim);
        }

        .empty-state {
            text-align: center;
            color: var(--text-dim);
        }
        
        /* Waveform Styles */
        .waveform-container {
            width: 100%;
            height: 200px;
            background: #020617;
            border-radius: 12px;
            padding: 20px;
            overflow: hidden;
        }

        .clock-trace { stroke: #64748b; stroke-width: 1.5; fill: none; }
        .data-trace { stroke: var(--accent-color); stroke-width: 2; fill: none; }
        .error-trace { stroke: var(--danger); stroke-width: 2; fill: none; }
        
        .label { font-size: 12px; fill: #94a3b8; }
    </style>
</head>

    // Initialize Sidebar
    const ruleList = document.getElementById('ruleList');
    const searchInput = document.getElementById('ruleSearch');

    function renderRules(filter = '') {
        ruleList.innerHTML = '';
        rulesData.forEach(cat => {
            const filteredRules = cat.rules.filter(r => r.name.toLowerCase().includes(filter.toLowerCase()));
            if (filteredRules.length === 0) return;

            const group = document.createElement('div');
            group.className = 'category-group';
            
            const title = document.createElement('div');
            title.className = 'category-title';
            title.textContent = cat.category;
            group.appendChild(title);

            filteredRules.forEach(rule => {
                const item = document.createElement('div');
                item.className = 'rule-item';
                item.textContent = rule.name;
                item.onclick = () => selectRule(rule, item);
                group.appendChild(item);
            });

            ruleList.appendChild(group);
        });
    }

    function selectRule(rule, element) {
        // Update UI state
        document.querySelectorAll('.rule-item').forEach(i => i.classList.remove('active'));
        element.classList.add('active');

        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('detailContent').style.display = 'flex';

        // Update Text
        document.getElementById('ruleName').textContent = rule.name;
        document.getElementById('ruleDesc').innerHTML = rule.description;
        document.getElementById('ruleFix').innerHTML = rule.fix || '暂无详细修复建议';
        document.getElementById('ruleWaive').innerHTML = rule.waive || '暂无 Waive 建议';
        
        const severityBadge = document.getElementById('ruleSeverity');
        severityBadge.textContent = rule.severity;
        severityBadge.className = `severity-badge severity-${rule.severity.toLowerCase()}`;

        // Render Visuals
        renderCircuit(rule.name);
        renderWaveform(rule.name);
    }

    function renderCircuit(ruleName) {
        const container = document.getElementById('circuitContainer');
        let svgHtml = '';

        if (ruleName.includes('unsync')) {
            svgHtml = `
                <svg viewBox="0 0 400 200" class="circuit-svg">
                    <text x="20" y="30" class="label">Clock Domain A</text>
                    <rect x="50" y="70" width="40" height="60" class="flop" rx="4" />
                    <text x="62" y="105" fill="white" font-size="12">FF</text>
                    
                    <line x1="90" y1="100" x2="300" y2="100" class="signal-line signal-pulse" />
                    
                    <text x="280" y="30" class="label">Clock Domain B</text>
                    <rect x="300" y="70" width="40" height="60" class="flop" rx="4" />
                    <text x="312" y="105" fill="white" font-size="12">FF</text>

                    <rect x="130" y="80" width="80" height="40" class="gate" rx="4" />

                    <line x1="90" y1="100" x2="130" y2="100" class="signal-line" />
                    <line x1="210" y1="100" x2="300" y2="100" class="signal-line" />

    function renderWaveform(ruleName) {
        const container = document.getElementById('waveformContainer');
        const isDataLoss = ruleName.includes('cdc01a') || ruleName.includes('cdc01c');
        const isUnsync = ruleName.includes('unsync');
        const isGlitch = ruleName.includes('glitch');
        
        container.innerHTML = `
            <svg viewBox="0 0 400 150" class="waveform-container">
                <!-- CLK A -->
                <text x="10" y="30" class="label">CLK_A</text>
                <path d="M60 35 L80 35 L80 15 L100 15 L100 35 L120 35 L120 15 L140 15 L140 35 L160 35 L160 15 L180 15 L180 35 L200 35 L200 15 L220 15 L220 35" class="clock-trace" />
                
                <!-- DATA A -->
                <text x="10" y="70" class="label">DATA_A</text>
                ${isGlitch ? `
                    <path d="M60 75 L100 75 L105 60 L110 75 L160 75" class="data-trace" style="stroke: #ef4444">
                        <animate attributeName="d" values="M60 75 L100 75 L105 60 L110 75 L160 75; M60 75 L100 75 L102 65 L104 75 L160 75; M60 75 L100 75 L105 60 L110 75 L160 75" dur="0.2s" repeatCount="indefinite" />
                    </path>
                ` : `
                    <path d="M60 75 L100 75 L100 60 L120 60 L120 75 L220 75" class="data-trace" />
                `}

                <!-- CLK B -->
                <text x="10" y="110" class="label">CLK_B</text>
                <path d="M60 115 L130 115 L130 95 L200 95 L200 115 L270 115" class="clock-trace" />

                ${isDataLoss ? `
                    <circle cx="110" cy="105" r="10" fill="rgba(239, 68, 68, 0.4)">
                        <animate attributeName="opacity" values="0;1;0" dur="0.8s" repeatCount="indefinite" />
                    </circle>
                    <text x="125" y="135" fill="#ef4444" font-size="12" font-weight="bold">MISS!</text>
                ` : ''}

                ${isUnsync ? `
                    <rect x="130" y="95" width="2" height="20" fill="#ef4444">
                         <animate attributeName="opacity" values="1;0;1" dur="0.5s" repeatCount="indefinite" />
                    </rect>
                    <text x="140" y="135" fill="#ef4444" font-size="10">Metastability Risk</text>
                ` : ''}
            </svg>
        `;
    }

    searchInput.oninput = (e) => renderRules(e.target.value);
    
    // Initial Render
    renderRules();
    
    // Automatically select the first rule to show diagrams immediately
    const firstRuleItem = document.querySelector('.rule-item');
    if (firstRuleItem) {
        firstRuleItem.click();
    }
</script>
