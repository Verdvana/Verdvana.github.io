<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CDC 跨时钟域交互演示 | SpyGlass &amp; Qualcomm 规则参考 v3</title>
<style>
:root{
  --bg:#0b0f14;--bg2:#111820;--bg3:#192130;--border:#1e3050;
  --accent:#00d4ff;--accent2:#0088cc;
  --clka:rgba(0,100,220,0.15);--clka-b:#0064dc;
  --clkb:rgba(220,100,0,0.15);--clkb-b:#dc6400;
  --error:#ff4455;--warn:#ffaa22;--ok:#00cc66;--info:#8888ff;
  --text:#c8d8e8;--text2:#7090b0;--card:#131e2a;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:"Microsoft YaHei",Segoe UI,sans-serif;font-size:14px;display:flex;flex-direction:column}
.navbar{height:48px;background:linear-gradient(90deg,#0a1520,#0d2035);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:12px;flex-shrink:0;z-index:10}
.navbar .logo{font-size:17px;font-weight:700;color:var(--accent);white-space:nowrap}
.navbar .sub{font-size:11px;color:var(--text2);white-space:nowrap}
.badge{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:2px 7px;font-size:11px;color:var(--text2);white-space:nowrap}
.layout{display:flex;flex:1;overflow:hidden;min-height:0}
/* SIDEBAR */
.sb{width:258px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.sb::-webkit-scrollbar{width:4px}.sb::-webkit-scrollbar-thumb{background:var(--border)}
.cat-hd{padding:9px 12px 7px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;border-bottom:1px solid var(--border);background:var(--bg);cursor:pointer;display:flex;justify-content:space-between;user-select:none}
.cat-hd:hover{color:var(--accent)}.cat-hd .ar{transition:transform .2s;font-size:10px}
.cat-hd.col .ar{transform:rotate(-90deg)}
.cat-items{overflow:hidden;max-height:600px;transition:max-height .3s ease}
.si{padding:7px 12px 7px 22px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;display:flex;align-items:center;gap:7px;border-bottom:1px solid rgba(255,255,255,.02)}
.si:hover{background:var(--bg3);border-left-color:var(--accent2)}
.si.active{background:rgba(0,212,255,.08);border-left-color:var(--accent);color:var(--accent)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.de{background:var(--error)}.dw{background:var(--warn)}.dok{background:var(--ok)}.di{background:var(--info)}
.si .rid{font-size:10px;color:var(--text2);margin-left:auto;white-space:nowrap}
/* MAIN CONTENT */
.main{flex:1;display:flex;overflow:hidden;min-height:0}
.cpanel{flex:1;display:flex;flex-direction:column;padding:12px;overflow:hidden;gap:7px;min-height:0}
.ptitle{font-size:15px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.rbadge{font-size:10px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:2px 7px;font-family:monospace;color:var(--warn)}
.sbadge{font-size:10px;border-radius:3px;padding:2px 7px}
.sbadge.e{background:rgba(255,68,85,.15);color:var(--error);border:1px solid rgba(255,68,85,.3)}
.sbadge.w{background:rgba(255,170,34,.15);color:var(--warn);border:1px solid rgba(255,170,34,.3)}
.sbadge.k{background:rgba(0,204,102,.15);color:var(--ok);border:1px solid rgba(0,204,102,.3)}
.sbadge.i{background:rgba(136,136,255,.15);color:var(--info);border:1px solid rgba(136,136,255,.3)}
.circ-area{flex:0 0 270px;background:var(--card);border:1px solid var(--border);border-radius:7px;overflow:hidden;position:relative}
#cSvg{width:100%;height:100%}
.wf-area{flex:0 0 155px;background:var(--card);border:1px solid var(--border);border-radius:7px;overflow:hidden;position:relative}
#wfCanvas{display:block;width:100%;height:100%}
.ctrl{display:flex;align-items:center;gap:7px;flex-shrink:0}
.btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 13px;border-radius:4px;cursor:pointer;font-size:12px;transition:all .15s;font-family:inherit}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.act{background:rgba(0,212,255,.1);border-color:var(--accent);color:var(--accent)}
.btn.vio{background:rgba(255,68,85,.1);border-color:var(--error);color:var(--error)}
.spd{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 7px;border-radius:4px;font-size:12px;cursor:pointer;font-family:inherit}
.pb{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;cursor:pointer}
.pbf{height:100%;background:var(--accent);width:0%;border-radius:2px;transition:width .05s}
/* INFO PANEL */
.ipanel{width:300px;background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:14px}
.ipanel::-webkit-scrollbar{width:4px}.ipanel::-webkit-scrollbar-thumb{background:var(--border)}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:10px}
.tab{padding:5px 12px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);transition:all .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover{color:var(--text)}
.tc{display:none}.tc.active{display:block}
.sec{margin-bottom:14px}
.sec h3{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.sec p,.sec li{font-size:12px;line-height:1.65;color:var(--text);margin-bottom:3px}
.sec ul{padding-left:15px}
.cb{background:#060c12;border:1px solid var(--border);border-radius:4px;padding:7px 9px;font-family:"Courier New",monospace;font-size:11px;color:#aaddff;overflow-x:auto;margin-top:5px;line-height:1.55;white-space:pre;word-break:break-all}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px}
.tag{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:2px 6px;font-size:10px;color:var(--text2)}
</style>
</head>
<body>
<div class="navbar">
  <span class="logo">⚡ CDC 跨时钟域交互演示</span>
  <span class="sub">基于 SpyGlass CDC Rules &amp; Qualcomm CDC Guidelines</span>
  <div style="display:flex;gap:6px;margin-left:auto">
    <span class="badge">SpyGlass VC</span>
    <span class="badge">55 个场景</span>
    <span class="badge" style="color:#7090b0">← → 切换场景</span>
  </div>
</div>
<div class="layout">
  <div class="sb" id="sb"></div>
  <div class="main">
    <div class="cpanel">
      <div class="ptitle">
        <span id="sTitle">请选择场景</span>
        <span class="rbadge" id="rBadge">--</span>
        <span class="sbadge" id="sBadge">--</span>
      </div>
      <div class="circ-area">
        <svg id="cSvg" viewBox="0 0 800 268" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
      <div class="wf-area">
        <canvas id="wfCanvas"></canvas>
      </div>
      <div class="ctrl">
        <button class="btn act" id="playBtn" onclick="togglePlay()">&#9654; 播放</button>
        <button class="btn" onclick="resetAnim()">&#8635; 重置</button>
        <select class="spd" id="spdSel" onchange="setSpeed(this.value)">
          <option value="0.5">0.5&#215;</option>
          <option value="1" selected>1&#215;</option>
          <option value="2">2&#215;</option>
          <option value="3">3&#215;</option>
        </select>
        <div class="pb" id="pb" onclick="seekAnim(event)"><div class="pbf" id="pbf"></div></div>
        <button class="btn" id="vBtn" onclick="toggleVio()">&#128308; 显示违例</button>
      </div>
    </div>
    <div class="ipanel">
      <div class="tabs">
        <div class="tab active" onclick="swTab(this,'td')">说明</div>
        <div class="tab" onclick="swTab(this,'tf')">修复建议</div>
        <div class="tab" onclick="swTab(this,'tw')">Waive 方案</div>
      </div>
      <div class="tc active" id="td">
        <div class="sec"><h3>规则信息</h3><div class="tags" id="tagRow"></div><p id="rDesc">请从左侧选择场景。</p></div>
        <div class="sec"><h3>问题根因</h3><p id="rRoot">--</p></div>
        <div class="sec"><h3>潜在影响</h3><p id="rImpact">--</p></div>
      </div>
      <div class="tc" id="tf">
        <div class="sec"><h3>RTL 修复方案</h3><p id="fDesc">--</p><div class="cb" id="fCode">--</div></div>
        <div class="sec"><h3>SGDC 约束</h3><div class="cb" id="fSgdc">--</div></div>
      </div>
      <div class="tc" id="tw">
        <div class="sec"><h3>Waive 条件</h3><p id="wCond">--</p></div>
        <div class="sec"><h3>Waive 命令示例</h3><div class="cb" id="wCode">--</div></div>
        <div class="sec"><h3>&#9888; 注意事项</h3><p id="wNote" style="color:var(--warn)">--</p></div>
      </div>
    </div>
  </div>
</div>
<script>
const SC = [
{id:'ac_unsync01_s2f',ruleName:'Ac_unsync01',cat:0,title:'单比特未同步（慢→快）',sev:'Error',
 desc:'单比特控制信号从慢时钟域（clkA）直接传入快时钟域（clkB），未经任何同步处理。快时钟的采样窗口更密集，极易在信号跳变附近采样，导致亚稳态。',
 root:'跨时钟域路径缺少同步器（Synchronizer）。clkB频率更高，采样窗口更密，亚稳态概率更大，目标FF的Q端输出不确定值X。',
 impact:'目标寄存器Q端可能输出X态，级联组合逻辑全部异常，引发芯片死机或概率性功能错误，MTBF严重恶化。',
 fixDesc:'在目标时钟域（clkB）插入两级D触发器（2-FF Synchronizer）。',
 fixCode:`// 修复前（非法跨域）\nalways @(posedge clkB)\n  data_b <= data_a; // 直接跨域！\n\n// 修复后：插入2-FF同步器\nreg sync1, sync2;\nalways @(posedge clkB or negedge rst_n) begin\n  if (!rst_n) {sync2,sync1} <= 2'b0;\n  else        {sync2,sync1} <= {sync1, data_a};\nend\nassign data_b_sync = sync2;`,
 sgdc:`# 声明同步器单元\nsync_cell -name sync_2ff_inst \\\n  -from_clk clkA -to_clk clkB\n# 若为准静态信号\nquasi_static -name data_a`,
 waiveCond:'仅当信号为准静态（quasi-static）配置寄存器，上电配置后不再变化，且架构师书面确认。',
 waiveCode:`waive -rule Ac_unsync01 \\\n  -from_clock clkA -to_clock clkB \\\n  -signal data_a \\\n  -comment "配置寄存器，上电后static，经架构确认"`,
 waiveNote:'⚠ 请勿随意waive！每条waive必须经架构师审核。建议用quasi_static约束替代waive。',
 svgType:'unsync_s2f',wfType:'unsync_s2f'},

{id:'ac_unsync01_f2s',ruleName:'Ac_unsync01',cat:0,title:'单比特未同步（快→慢）',sev:'Error',
 desc:'单比特信号从快时钟域（clkA）直接传入慢时钟域（clkB），未做同步处理。信号宽度可能不足一个慢时钟周期，极易被慢时钟漏采。',
 root:'快时钟信号宽度仅1~2个快时钟周期，而慢时钟采样周期更长，即使偶尔不漏采，也会存在亚稳态风险。',
 impact:'慢时钟域可能永远看不到该脉冲，相关控制逻辑失效；或偶发性采到，引起随机功能错误。',
 fixDesc:'使用脉冲同步器（Toggle Sync）或先展宽信号再加2-FF同步器。',
 fixCode:`// 脉冲展宽 + toggle同步\nreg toggle_a;\nalways @(posedge clkA or negedge rst_n)\n  if (!rst_n) toggle_a <= 0;\n  else if (pulse_a) toggle_a <= ~toggle_a;\n\n// clkB域：2级同步后边沿检测\nreg s1,s2,s3;\nalways @(posedge clkB or negedge rst_n)\n  if (!rst_n) {s3,s2,s1} <= 3'b0;\n  else        {s3,s2,s1} <= {s2,s1,toggle_a};\nassign pulse_b = s2 ^ s3;`,
 sgdc:`# 声明脉冲同步器\nsync_cell -name pulse_sync_inst \\\n  -from_clk clkA -to_clk clkB`,
 waiveCond:'仅当确认信号宽度 > 2个慢时钟周期，或经波形仿真验证慢时钟必然能采到。',
 waiveCode:`waive -rule Ac_unsync01 \\\n  -from_clock clkA -to_clock clkB \\\n  -signal pulse_a \\\n  -comment "信号宽度足够，仿真验证通过"`,
 waiveNote:'快→慢跨域的信号宽度问题极易被忽视，必须通过仿真波形验证，仅靠代码审查不够。',
 svgType:'unsync_f2s',wfType:'unsync_f2s'},

{id:'ac_unsync02',ruleName:'Ac_unsync02',cat:0,title:'多比特未同步跨时钟',sev:'Error',
 desc:'多位数据总线直接从clkA域跨越到clkB域，各bit独立传播延迟不同，目标域采样时各bit可能处于旧值和新值的混合状态（数据撕裂）。',
 root:'多bit信号每个bit到达目标域的时间略微不同（skew），造成目标FF在同一时钟沿采到部分bit是新值、部分是旧值。',
 impact:'目标域采到既非旧值也非新值的中间非法值，导致FSM跳到非法状态、数据计算错误等严重功能问题。',
 fixDesc:'多bit跨域必须使用：①格雷码编码；②异步FIFO；③握手协议；④MUX同步器（qualifier保护）。',
 fixCode:`// 方法1：格雷码（适合计数器）\nwire [3:0] cnt_gray = cnt_bin ^ (cnt_bin >> 1);\n// 2-FF同步格雷码，再解码\n\n// 方法2：握手协议\nalways @(posedge clkA)\n  if (send && !req) begin\n    data_latch <= new_data;\n    req <= 1'b1;\n  end else if (ack_sync) req <= 1'b0;`,
 sgdc:`# 声明格雷码信号\ngray_signal -name data_bus[7:0]\n# 或声明qualifier\nqualifier -name req_qual \\\n  -from_clk clkA -to_clk clkB \\\n  -enable "top.req"`,
 waiveCond:'仅当多bit信号是准静态的（传输期间不切换），且经架构设计保证数据稳定。',
 waiveCode:`waive -rule Ac_unsync02 \\\n  -from_clock clkA -to_clock clkB \\\n  -signal data_bus \\\n  -comment "配置总线，写入后保持稳定"`,
 waiveNote:'多bit未同步是最危险的CDC问题之一，随意waive可能导致概率性功能错误，且极难调试。',
 svgType:'unsync_multi',wfType:'unsync_multi'},

{id:'two_ff_sync',ruleName:'正确结构',cat:1,title:'双FF同步器（标准）',sev:'Ok',
 desc:'两级D触发器同步器是处理单比特跨时钟域信号的工业标准。第一级FF可能出现亚稳态，经一个clkB周期稳定后，第二级FF安全采样。',
 root:'亚稳态发生在第一级FF，经过1个时钟周期后亚稳态概率呈指数下降，第二级FF采到稳定值的概率极高。',
 impact:'正确结构。极大降低MTBF中亚稳态导致的失效概率，是单比特CDC标准解法。',
 fixDesc:'SpyGlass通过sync_cell声明识别此合法结构，确保SGDC中正确声明。',
 fixCode:`// 标准2-FF同步器（推荐封装模块）\nmodule sync_2ff #(parameter W=1) (\n  input  clk_dst, rstn,\n  input  [W-1:0] d_src,\n  output [W-1:0] d_dst\n);\n  (* ASYNC_REG = "TRUE" *)\n  reg [W-1:0] meta, sync;\n  always @(posedge clk_dst or negedge rstn)\n    if (!rstn) {sync,meta} <= 0;\n    else       {sync,meta} <= {meta, d_src};\n  assign d_dst = sync;\nendmodule`,
 sgdc:`# 声明同步器模块\nsync_cell -name sync_2ff \\\n  -from_clk clkA -to_clk clkB\n# 通配符写法\nsync_cell -name "*sync_2ff*"`,
 waiveCond:'此为正确结构，无需waive。若SpyGlass未识别，需通过sync_cell约束告知工具。',
 waiveCode:`# 无需waive，通过sync_cell约束声明\nsync_cell -name sync_2ff_inst`,
 waiveNote:'ASYNC_REG属性使时序工具将两级FF物理放置靠近，减少布线延迟，降低亚稳态风险。',
 svgType:'two_ff_sync',wfType:'two_ff_sync'},

{id:'pulse_sync',ruleName:'正确结构',cat:1,title:'脉冲同步器（Toggle）',sev:'Ok',
 desc:'源域将脉冲转为电平翻转（Toggle），目标域用2-FF同步后检测边沿还原为脉冲。适用于快→慢或频率不确定的跨域单脉冲传输。',
 root:'Toggle信号宽度与源时钟无关，两脉冲间隔 > 2个目标时钟周期即可可靠传输。',
 impact:'正确结构。能可靠传递单脉冲，不受源/目标时钟频率比限制。',
 fixDesc:'由toggle寄存器+2-FF同步器+XOR边沿检测组成。注意最小脉冲间隔约束。',
 fixCode:`// 源域：脉冲→Toggle\nreg toggle;\nalways @(posedge clkA or negedge rstn)\n  if (!rstn) toggle <= 0;\n  else if (pulse_in) toggle <= ~toggle;\n\n// 目标域：2-FF同步+边沿检测\nreg s1,s2,s3;\nalways @(posedge clkB or negedge rstn)\n  if (!rstn) {s3,s2,s1} <= 3'b000;\n  else       {s3,s2,s1} <= {s2,s1,toggle};\nassign pulse_out = s2^s3; // XOR边沿检测`,
 sgdc:`# 声明脉冲同步器结构\nsync_cell -name pulse_sync_inst \\\n  -from_clk clkA -to_clk clkB`,
 waiveCond:'此为正确结构，无需waive。',
 waiveCode:`# 无需waive`,
 waiveNote:'脉冲同步器的最小脉冲间隔：两相邻脉冲在源域的最短间隔必须 > 2个目标时钟周期。',
 svgType:'pulse_sync',wfType:'pulse_sync'},

{id:'handshake',ruleName:'正确结构',cat:1,title:'4相握手同步',sev:'Ok',
 desc:'源域发出REQ并锁存数据，目标域收到同步REQ后读取数据并发送ACK，源域收到ACK后才允许下一次传输。适合多bit数据跨域。',
 root:'握手确认机制保证数据在目标域读取时源域不更新，从根本上避免数据撕裂。',
 impact:'正确结构。握手引入约4~6个时钟周期延迟，不适合高吞吐量场景。',
 fixDesc:'REQ/ACK各需独立2-FF同步器，数据在REQ有效期间保持不变。SGDC中用qualifier声明。',
 fixCode:`// 源域\nalways @(posedge clkA)\n  if (send && !req && !ack_sync)\n    {data_latch,req} <= {new_data,1'b1};\n  else if (ack_sync) req <= 1'b0;\n\n// 目标域\nalways @(posedge clkB)\n  if (req_sync && !ack)\n    {out_data,ack} <= {data_latch,1'b1};\n  else if (!req_sync) ack <= 1'b0;`,
 sgdc:`# qualifier声明：数据受req保护\nqualifier -name req_qual \\\n  -from_clk clkA -to_clk clkB \\\n  -enable "top.req"`,
 waiveCond:'此为正确结构，无需waive。',
 waiveCode:`# 无需waive，使用qualifier约束`,
 waiveNote:'握手中数据信号从结构上看可能报Ac_unsync02，用qualifier约束告知SpyGlass数据受req保护。',
 svgType:'handshake',wfType:'handshake'},

{id:'async_fifo',ruleName:'正确结构',cat:1,title:'异步FIFO（格雷码指针）',sev:'Ok',
 desc:'读写指针使用格雷码，每次仅变化1bit，通过2-FF同步后可安全比较。用于高吞吐量多bit数据跨域传输。',
 root:'二进制计数器多bit同时变化会有数据撕裂，格雷码每次仅1bit变化，避免了该问题。',
 impact:'正确结构，是多bit数据高吞吐量跨域的工业标准方案。',
 fixDesc:'格雷码转换逻辑需在SGDC中用gray_signal声明，SpyGlass才能识别为合法多bit同步结构。',
 fixCode:`// 写指针格雷码\nwire [PTR_W:0] wptr_gray = wptr ^ (wptr >> 1);\n// 读域：2-FF同步写指针格雷码\nreg [PTR_W:0] wp_s1, wp_s2;\nalways @(posedge clk_rd or negedge rstn)\n  if (!rstn) {wp_s2,wp_s1} <= 0;\n  else       {wp_s2,wp_s1} <= {wp_s1,wptr_gray};\n// 同理：读指针同步到写域`,
 sgdc:`# 声明格雷码指针\ngray_signal -name wptr_gray\ngray_signal -name rptr_gray`,
 waiveCond:'此为正确结构，无需waive。如SpyGlass仍报错，检查gray_signal约束是否正确声明。',
 waiveCode:`# 无需waive\ngray_signal -name wptr_gray[PTR_W:0]`,
 waiveNote:'FIFO满/空标志也需考虑跨域，确认满/空判断逻辑在各自时钟域内正确实现。',
 svgType:'async_fifo',wfType:'async_fifo'},

{id:'mux_sync',ruleName:'正确结构',cat:1,title:'MUX同步器',sev:'Ok',
 desc:'使用使能信号（EN）控制数据跨域：EN经2-FF同步，保证在数据稳定期间才触发锁存。适合多bit数据跨域，延迟小于握手协议。',
 root:'MUX同步关键约束：EN有效期间，源域数据必须保持稳定（至少m+1个目标时钟周期）。',
 impact:'正确结构，延迟比握手小，但必须在设计上保证EN有效期间数据稳定。',
 fixDesc:'SpyGlass需要qualifier约束识别EN为数据有效限定符，否则报Ac_datahold01a。',
 fixCode:`// EN同步\nreg en1,en2;\nalways @(posedge clkB or negedge rstn)\n  if (!rstn) {en2,en1} <= 0;\n  else       {en2,en1} <= {en1,data_en};\n// 边沿检测，锁存数据\nreg en2_d;\nalways @(posedge clkB) en2_d <= en2;\nwire en_rise = en2 & ~en2_d;\nalways @(posedge clkB)\n  if (en_rise) data_b <= data_a;`,
 sgdc:`# 声明EN为qualifier\nqualifier -name data_en_qual \\\n  -from_clk clkA -to_clk clkB \\\n  -enable "top.data_en"`,
 waiveCond:'此为正确结构，无需waive。',
 waiveCode:`# 通过qualifier约束声明，无需waive`,
 waiveNote:'MUX同步最大风险：忘记保证EN有效时数据的稳定性，必须仔细验证协议时序。',
 svgType:'mux_sync',wfType:'mux_sync'},

{id:'ac_conv01',ruleName:'Ac_conv01',cat:2,title:'同源信号分别同步后聚合',sev:'Warning',
 desc:'来自同一时钟域的多路信号，分别通过独立2-FF同步器跨到目标域，同步后的输出经顺序元件后汇聚。各路同步器的cycle uncertainty不同，聚合后数据关联性可能错误。',
 root:'两信号同时变化，但独立同步器可能分别采样到不同周期的值（cycle uncertainty = ±1 clk），导致目标域看到不一致的数据组合。',
 impact:'目标域可能短暂出现"A已更新但B还是旧值"的中间状态，触发后级逻辑误动作。',
 fixDesc:'改为单信号跨域（合并为格雷码总线）、异步FIFO、握手或qualifier保护的多bit同步。',
 fixCode:`// 错误：两独立同步器\nsync_2ff u_a(.clk(clkB),.d(sig_a),.q(sa));\nsync_2ff u_b(.clk(clkB),.d(sig_b),.q(sb));\n// sa & sb 可能时序不一致！\n\n// 正确：格雷码合并或握手保证一致性\nwire [1:0] sig_gray = {sig_a,sig_b}^({sig_a,sig_b}>>1);\n// 或使用qualifier+MUX同步`,
 sgdc:`# 若设计已保证一致性\ncdc_filter_coherency \\\n  -unrelated sig_a sig_b \\\n  -comment "握手保证数据一致性"`,
 waiveCond:'当聚合逻辑本质上是独立无关的控制信号，或后级逻辑对瞬态非法值不敏感时可waive。',
 waiveCode:`waive -rule Ac_conv01 \\\n  -from sig_a_sync -to sig_b_sync \\\n  -comment "两信号逻辑独立无关，不影响功能"`,
 waiveNote:'需仔细分析聚合逻辑，确认不存在数据依赖关系，建议仿真验证。',
 svgType:'conv01',wfType:'conv01'},

{id:'ac_conv02',ruleName:'Ac_conv02',cat:2,title:'同步信号在FF前聚合',sev:'Warning',
 desc:'来自同一源域的信号分别同步后，在到达顺序元件（FF）之前的组合逻辑中汇聚。比Ac_conv01危险，组合逻辑可能传播亚稳态或产生glitch被后级FF误采。',
 root:'各路同步信号稳定时间略有不同，在组合逻辑相遇时可能出现短暂glitch，被后级FF锁存产生错误输出。',
 impact:'glitch被目标域FF锁存，产生错误的功能逻辑输出，引发FSM异常跳转。',
 fixDesc:'在各路同步器输出后，目标时钟域再寄存一拍，使所有分支在同一时钟沿对齐后再做组合逻辑。',
 fixCode:`// 错误：同步后立即组合聚合\nassign out = sig_a_sync & sig_b_sync; // 危险！\n\n// 正确：先寄存一拍对齐，再做组合\nreg ra,rb;\nalways @(posedge clkB)\n  {ra,rb} <= {sig_a_sync,sig_b_sync};\nassign out = ra & rb; // 安全`,
 sgdc:`# 声明此组合逻辑为预期设计\nallow_combo_logic -name top.conv_logic`,
 waiveCond:'组合聚合输出不直接驱动关键时序路径，或确认glitch不影响后续功能。',
 waiveCode:`waive -rule Ac_conv02 \\\n  -from {sig_a_sync sig_b_sync} \\\n  -comment "组合逻辑已验证不影响功能"`,
 waiveNote:'组合逻辑前的聚合危险性更高，waive前必须用仿真证实。',
 svgType:'conv02',wfType:'conv01'},

{id:'ac_conv03',ruleName:'Ac_conv03',cat:2,title:'不同源域信号聚合',sev:'Warning',
 desc:'来自不同时钟域的信号，各自同步到同一目标域后在顺序元件前聚合。这是最高风险的聚合情况，不同源域信号在目标域的相对时序完全不确定。',
 root:'不同源域信号有着完全不同的时钟关系，即使分别同步，在目标域的相对时序也是不确定的，会出现各种组合。',
 impact:'产生复杂的数据不一致问题，几乎不可避免出现功能错误，且问题极难复现和调试。',
 fixDesc:'架构上避免不同源域信号在目标域聚合。必须聚合时，在两路数据共同到达目标域后建立严格的"双valid"握手确认机制。',
 fixCode:`// 正确做法：目标域等待两路数据均有效\nreg data_a_rdy, data_b_rdy;\nalways @(posedge clkC)\n  if (data_a_ack) data_a_rdy <= 1;\n  if (data_b_ack) data_b_rdy <= 1;\n  if (data_a_rdy && data_b_rdy) begin\n    result <= data_a_s & data_b_s; // 两路均稳定\n    data_a_rdy <= 0; data_b_rdy <= 0;\n  end`,
 sgdc:`# 声明过滤（已有一致性保证）\ncdc_filter_coherency \\\n  -unrelated sig_clkA_s sig_clkB_s \\\n  -comment "双valid握手保证数据一致"`,
 waiveCond:'需要架构级别的书面保证、完整的时序分析和仿真验证，非常谨慎。',
 waiveCode:`waive -rule Ac_conv03 \\\n  -from {sig_clkA_sync sig_clkB_sync} \\\n  -comment "双valid握手保证一致性，仿真验证"`,
 waiveNote:'不同源域信号聚合是SoC设计高风险区域，必须在架构阶段彻底解决，不能依赖waive。',
 svgType:'conv03',wfType:'conv01'},

{id:'ac_conv04',ruleName:'Ac_conv04',cat:2,title:'多比特控制无格雷码',sev:'Error',
 desc:'多bit控制信号跨时钟域，各bit通过独立同步器，没有使用格雷码编码，目标域可能采到递增过程中的过渡非法值。',
 root:'二进制数递增时可能多个bit同时翻转（如7→8: 0111→1000），各bit到达目标域时间不同，产生如0010、0100等从未出现过的中间值。',
 impact:'目标域FSM可能跳转到非法状态，地址/控制逻辑产生错误，且问题依赖具体数据序列，极难复现。',
 fixDesc:'使用格雷码编码该多bit控制信号，每次只有1bit变化，彻底解决数据撕裂问题。',
 fixCode:`// 格雷码计数器\nreg [3:0] cnt;\nwire [3:0] cnt_g = cnt ^ (cnt>>1);\n// 目标域同步格雷码\nreg [3:0] g1,g2;\nalways @(posedge clkB)\n  {g2,g1} <= {g1,cnt_g};\n// 解码\nwire [3:0] dec;\nassign dec[3]=g2[3];\nassign dec[2]=dec[3]^g2[2];\nassign dec[1]=dec[2]^g2[1];\nassign dec[0]=dec[1]^g2[0];`,
 sgdc:`# 声明格雷码信号\ngray_signal -name cnt_g[3:0]\n# 声明同步器\nsync_cell -name gray_sync \\\n  -from_clk clkA -to_clk clkB`,
 waiveCond:'确认该多bit信号每次只有1bit变化（本身是格雷码特性），或信号为准静态时。',
 waiveCode:`waive -rule Ac_conv04 \\\n  -from ctrl_bus -to clkB_domain \\\n  -comment "信号为准静态配置，不会多bit同时跳变"`,
 waiveNote:'状态机编码、地址总线等必须用格雷码或握手，不能简单waive。',
 svgType:'conv04',wfType:'unsync_multi'},

{id:'ac_glitch01',ruleName:'Ac_glitch01',cat:3,title:'同步器前非Glitch-Free MUX',sev:'Error',
 desc:'在进入同步器之前，数据经过一个普通MUX，且MUX的select与data信号来自不同路径，可能在select切换时产生极窄毛刺，直接进入同步器第一级FF。',
 root:'MUX的select信号与data在目标FF采样窗口内同时到达，组合逻辑竞争冒险产生宽度极窄的glitch，这个glitch被同步器第一级FF误采。',
 impact:'毛刺被同步器锁存，等效产生一个假脉冲，触发错误的控制逻辑，且问题仅出现在特定切换时序窗口，仿真极难复现。',
 fixDesc:'在MUX输出后在源域寄存一拍消除glitch，再跨域；或使用glitch-free MUX（ICG结构）。',
 fixCode:`// 错误：组合MUX直接进同步器\nwire data_mux = sel ? da : db; // 可能有glitch\nsync_2ff u1(.clk(clkB),.d(data_mux),.q(out));\n\n// 正确：源域FF消除glitch\nreg mux_r;\nalways @(posedge clkA)\n  mux_r <= sel ? da : db; // FF消除竞争冒险\nsync_2ff u1(.clk(clkB),.d(mux_r),.q(out));`,
 sgdc:`# 声明glitch-free MUX\nglitchfree_cell -names glf_mux_inst -type data\n# 或声明允许组合逻辑（已验证）\nallow_combo_logic -name mux_before_sync`,
 waiveCond:'仅当MUX已验证为glitch-free结构，或data和select信号同源（同一时钟域FF输出）不会产生竞争。',
 waiveCode:`waive -rule Ac_glitch01 \\\n  -from mux_out -to sync_in \\\n  -comment "MUX为glitch-free，已STA验证"`,
 waiveNote:'MUX glitch问题在后仿（gate-level sim）中才会暴露，RTL仿真往往发现不了，务必重视。',
 svgType:'glitch01',wfType:'glitch01'},

{id:'ac_glitch02',ruleName:'Ac_glitch02',cat:3,title:'扇出重汇聚源导致毛刺',sev:'Error',
 desc:'来自同一源FF输出的多条路径（扇出）经不同组合逻辑延迟后重新汇聚（reconvergence），在汇聚点产生竞争冒险毛刺，直接跨时钟域传播。',
 root:'同一源信号经多条路径传播，各路径延迟不同，在汇聚门输出产生毛刺（逻辑冒险）。这个毛刺宽度极窄，STA可能不能检测。',
 impact:'毛刺在跨域路径传播，被目标域FF误采，产生错误脉冲。后仿（考虑gate延迟）才会暴露。',
 fixDesc:'在跨域信号进组合逻辑前，确保已在源域寄存一拍。避免将多路径重汇聚的信号直接跨域。',
 fixCode:`// 错误：重汇聚组合逻辑直接跨域\nwire o1 = data & en;\nwire o2 = data | ctrl;\nwire rc = o1 ^ o2; // 重汇聚→可能glitch\n// rc直接跨域 → 错误!\n\n// 正确：源域先寄存一拍\nreg rc_r;\nalways @(posedge clkA) rc_r <= o1^o2;\n// rc_r 跨域 → 安全`,
 sgdc:`# 声明过滤此重汇聚\ncdc_filter_coherency \\\n  -conv_gates top.reconv_gate`,
 waiveCond:'通过STA（全工艺角PVT）能保证不产生glitch，需要后端确认签字。',
 waiveCode:`waive -rule Ac_glitch02 \\\n  -from src_ff -to reconv_gate \\\n  -comment "STA验证无glitch，来源相同"`,
 waiveNote:'RTL级极难保证无glitch，必须依赖后端STA确认，建议直接修改RTL。',
 svgType:'glitch02',wfType:'glitch01'},

{id:'ac_glitch03',ruleName:'Ac_glitch03',cat:3,title:'组合逻辑直接跨时钟域',sev:'Error',
 desc:'跨时钟域的信号是一个组合逻辑输出，而不是源域FF的输出。组合逻辑天然存在毛刺，直接进入目标域同步器会显著增加亚稳态概率。',
 root:'组合逻辑输出在逻辑翻转过程中存在竞争冒险窗口，输出值不稳定，存在宽度极短的glitch。',
 impact:'glitch被同步器第一级FF采样，等效增加了亚稳态发生频率，MTBF大幅降低，且glitch可能传播到后级逻辑。',
 fixDesc:'在组合逻辑输出和跨域路径之间插入一级源域触发器，消除组合逻辑的毛刺后再同步。',
 fixCode:`// 错误：组合逻辑直接跨域\nassign cdc_sig = (st==IDLE) & dv; // 组合逻辑！\nsync_2ff u1(.clk(clkB),.d(cdc_sig),.q(out));\n\n// 正确：源域先寄存一拍\nreg cdc_r;\nalways @(posedge clkA or negedge rstn)\n  if (!rstn) cdc_r <= 0;\n  else cdc_r <= (st==IDLE) & dv;\nsync_2ff u1(.clk(clkB),.d(cdc_r),.q(out));`,
 sgdc:`# 若输入均为quasi-static\nquasi_static -name combo_inputs`,
 waiveCond:'仅当组合逻辑所有输入均为准静态信号，不会同时跳变，工具和架构均确认无glitch。',
 waiveCode:`waive -rule Ac_glitch03 \\\n  -from combo_out -to sync_in \\\n  -comment "输入为quasi-static，无竞争冒险"`,
 waiveNote:'强烈不建议waive，修复成本极低（增加一级FF），但错过可能导致难以复现的随机功能错误。',
 svgType:'glitch03',wfType:'glitch01'},

{id:'ac_cdc01',ruleName:'Ac_cdc01',cat:4,title:'快→慢信号宽度不足',sev:'Error',
 desc:'信号从快时钟域（clkA）传到慢时钟域（clkB），信号有效宽度小于1.5个慢时钟周期，慢时钟采样可能完全错过该信号，导致数据丢失。',
 root:'快时钟信号可能只维持1~2个快时钟周期，慢时钟的一个周期涵盖多个快时钟周期，采样窗口可能完全不与有效信号重叠。',
 impact:'目标域永远无法采样到该信号，相关控制逻辑永远不会被触发，功能完全失效，且不报错难以发现。',
 fixDesc:'①使用脉冲同步器（Toggle sync）；②源域展宽信号到 > 1.5个目标时钟周期；③使用握手协议。',
 fixCode:`// 错误：只维持1个clkA周期的脉冲\nalways @(posedge clkA)\n  pulse <= 1'b1; // 下一周期自动清除！\n\n// 正确1：展宽脉冲\nreg [3:0] cnt;\nalways @(posedge clkA or negedge rstn)\n  if (!rstn) cnt <= 0;\n  else if (trig) cnt <= 4'd10;\n  else if (cnt>0) cnt <= cnt-1;\nassign sig_wide = (cnt > 0); // 展宽10个clkA周期\n\n// 正确2：使用toggle+sync（推荐）`,
 sgdc:`# 无直接SGDC修复，需RTL改动\n# 信号展宽后声明路径\ncdc_false_path -from clkA_domain \\\n  -to clkB_domain \\\n  -comment "信号已展宽，仿真验证"`,
 waiveCond:'确认源域信号宽度已足够（> 2× 目标时钟周期），并通过仿真验证目标域能可靠采样到。',
 waiveCode:`waive -rule Ac_cdc01 \\\n  -from fast_sig -to slow_domain \\\n  -comment "信号宽度已展宽20ns，慢时钟10ns周期"`,
 waiveNote:'必须通过波形仿真（或形式验证）确认信号宽度满足要求，不能仅凭主观判断waive。',
 svgType:'cdc01',wfType:'cdc01'},

{id:'ac_datahold01a',ruleName:'Ac_datahold01a',cat:4,title:'使能同步数据保持违例',sev:'Error',
 desc:'使用使能信号（Enable）进行数据同步时，Enable有效之后源域数据发生了变化，导致目标域采样到的数据与Enable所对应的数据不符。',
 root:'MUX同步/Enable同步的根本要求：Enable有效时数据必须保持稳定。若协议中EN和Data更新未正确对齐，就会出现此问题。',
 impact:'目标域采到的数据与Enable对应的数据不一致，产生数据关联性错误，引发功能性故障。',
 fixDesc:'确保在Enable信号拉高后，源域数据保持不变，直到目标域通过握手确认完成采样。',
 fixCode:`// 错误：Enable拉高后data立即更新\nalways @(posedge clkA) begin\n  en <= 1'b1;\n  data <= new_data; // 同一周期更新！\nend\n\n// 正确：先锁存data，再拉en，等ack后清en\nalways @(posedge clkA) begin\n  if (!en) begin\n    data_latch <= new_data; // 先锁存\n    en <= 1'b1;             // 再拉EN\n  end else if (ack_sync)\n    en <= 1'b0; // 收到ack才清EN\nend`,
 sgdc:`# qualifier声明数据有效性\nqualifier -name en_qual \\\n  -from_clk clkA -to_clk clkB \\\n  -enable "top.data_en"`,
 waiveCond:'通过功能分析确认data和enable的时序关系不会导致采样到错误数据，需详细波形证明。',
 waiveCode:`waive -rule Ac_datahold01a \\\n  -from data_sig -to dest_ff \\\n  -comment "设计协议保证EN有效期间data稳定，有仿真验证"`,
 waiveNote:'此类问题往往在特定数据序列下才暴露，随机仿真难以覆盖，需要定向测试验证。',
 svgType:'datahold',wfType:'datahold'},

{id:'ar_unsync01',ruleName:'Ar_unsync01',cat:5,title:'异步复位信号未同步',sev:'Error',
 desc:'异步复位信号（rstn）直接连接到目标时钟域的触发器，未经复位同步器。在复位释放时，不同触发器可能在不同时钟周期退出复位状态，产生复位竞争。',
 root:'异步复位的Assert可以随时生效，但Deassert必须满足FF的Recovery time。不同位置FF的recovery时间不同，可能在不同周期释放复位。',
 impact:'复位释放时，部分FF已开始工作而其他FF还在复位中，造成设计状态不一致，引发随机功能错误，概率较低但影响极大。',
 fixDesc:'使用异步Assert/同步Deassert复位同步器（行业标准的ASIC复位处理方式）。',
 fixCode:`// 错误：直接使用异步复位输入\nalways @(posedge clk or negedge rstn_ext)\n  if (!rstn_ext) state <= IDLE; // 危险！\n\n// 正确：复位同步器\nmodule rst_sync(input clk,rstn_in,output rstn_out);\n  reg d1,d2;\n  always @(posedge clk or negedge rstn_in)\n    if (!rstn_in) {d2,d1} <= 2'b00; // 异步assert\n    else          {d2,d1} <= {d1,1'b1}; // 同步deassert\n  assign rstn_out = d2;\nendmodule`,
 sgdc:`# 声明复位同步器\nsync_cell -name rst_sync \\\n  -reset -to_clk clk\n# 声明输入复位端口\nreset -name rstn_in -async -value 0`,
 waiveCond:'仅当复位信号是同步复位（随时钟沿同步），或设计已通过其他方式保证复位时序安全。',
 waiveCode:`waive -rule Ar_unsync01 \\\n  -from rstn_in \\\n  -comment "该复位为同步复位，随clk沿生效"`,
 waiveNote:'复位同步是ASIC设计基础规范，不正确的复位处理是导致芯片返修的主要原因之一！',
 svgType:'rst_unsync',wfType:'rst_unsync'},

{id:'ar_asyncdeassert01',ruleName:'Ar_asyncdeassert01',cat:5,title:'异步复位未同步释放',sev:'Error',
 desc:'使用了异步复位，但没有同步释放（Synchronous Deassert）电路。复位释放时刻与时钟无关，不同FF具有不同的setup/hold时序参数，会在不同时刻退出复位状态。',
 root:'异步复位释放时若正好在时钟沿附近，不同FF（不同物理位置、不同setup裕量）会有不同的表现，一部分在这个周期退出复位，一部分在下个周期退出。',
 impact:'复位释放后设计进入不确定状态，FSM可能进入非法状态机转移，且问题仅在特定时序条件下出现，难以在仿真中复现。',
 fixDesc:'必须使用"异步Assert，同步Deassert"的标准复位同步器，这是ASIC/FPGA设计行业标准。',
 fixCode:`// 正确：异步Assert同步Deassert复位链\nalways @(posedge clk or negedge rstn_raw)\n  if (!rstn_raw)  // 异步Assert：立即复位\n    {rs2,rs1} <= 2'b00;\n  else            // 同步Deassert：时钟沿采样释放\n    {rs2,rs1} <= {rs1,1'b1};\n// rs2驱动所有需要该复位的FF\n// 保证所有FF在同一时钟沿同步退出复位`,
 sgdc:`sync_cell -name rst_sync_inst \\\n  -reset -to_clk target_clk\nreset -name rstn_raw -async -value 0`,
 waiveCond:'不建议waive。仅在能证明所有下游FF的Recovery时序裕量充足，且复位后系统有其他初始化机制时。',
 waiveCode:`waive -rule Ar_asyncdeassert01 \\\n  -from rstn_raw -to target_domain \\\n  -comment "STA分析recovery裕量>1ns，全工艺角满足"`,
 waiveNote:'此类问题在量产后随温度/电压变化可能偶发，不能仅凭TT角STA通过就waive。',
 svgType:'rst_async_deassert',wfType:'rst_unsync'},

{id:'reset_sync_correct',ruleName:'正确结构',cat:5,title:'复位同步器（正确结构）',sev:'Ok',
 desc:'标准异步Assert/同步Deassert复位同步器：Assert时（低电平）所有FF立即异步复位；释放时，经2级FF同步后统一在时钟沿释放，避免复位竞争。',
 root:'D端固定接高电平的2级FF链，异步复位后输出全为0，释放时同步采样高电平，保证所有后续FF在同一时钟沿同步退出复位。',
 impact:'正确结构，是ASIC/FPGA设计的标准复位处理模板，每个时钟域都应有独立的复位同步器。',
 fixDesc:'封装为独立模块，每个时钟域实例化一个，SGDC中通过sync_cell -reset声明。',
 fixCode:`module rst_sync (\n  input  clk,\n  input  rstn_in,  // 原始异步复位（低有效）\n  output rstn_out  // 同步后复位输出\n);\n  (* ASYNC_REG = "TRUE" *)\n  reg meta_ff, sync_ff;\n  always @(posedge clk or negedge rstn_in)\n    if (!rstn_in) {sync_ff,meta_ff} <= 2'b00;\n    else          {sync_ff,meta_ff} <= {meta_ff,1'b1};\n  assign rstn_out = sync_ff;\nendmodule`,
 sgdc:`sync_cell -name rst_sync \\\n  -reset -to_clk clk\nreset -name rstn_in -async -value 0`,
 waiveCond:'此为正确结构，无需waive。',
 waiveCode:`# 无需waive，确保SGDC正确声明`,
 waiveNote:'每个时钟域都应有独立的复位同步器，不同时钟域的复位不能共用同一个同步器。',
 svgType:'rst_sync_correct',wfType:'rst_sync'},

{id:'ac_coherency06',ruleName:'Ac_coherency06',cat:6,title:'同域信号被多次同步（冗余）',sev:'Warning',
 desc:'来自同一时钟域的信号A，被多个位于不同位置的同步器分别同步到同一目标域，产生多份同步副本，SpyGlass报告资源浪费。',
 root:'架构设计冗余：多个下游模块各自实例化了同步器，但共享一个同步器输出就够了。',
 impact:'仅浪费面积和功耗，不是功能性错误，Warning级别。',
 fixDesc:'将多个同步器合并为一个，所有下游模块共享同步器输出。',
 fixCode:`// 冗余：各模块各有同步器\n// modA: sync_2ff u_a(.d(sig),.q(sig_A_sync));\n// modB: sync_2ff u_b(.d(sig),.q(sig_B_sync));\n\n// 优化：顶层统一同步，向下分发\nsync_2ff u_top(.clk(clkB),.d(sig),.q(sig_sync));\n// sig_sync 同时连接 mod_A 和 mod_B`,
 sgdc:`# Warning级别，若有意保留多同步\n# 通过注释说明设计意图即可`,
 waiveCond:'若多路同步是有意为之（如增强鲁棒性或模块时序隔离），可以合理waive。',
 waiveCode:`waive -rule Ac_coherency06 \\\n  -from sig_source \\\n  -comment "多模块各有独立同步，为模块时序隔离设计"`,
 waiveNote:'优先考虑合并同步器节省面积，如有特殊原因保留多个，waive是可以接受的。',
 svgType:'coherency',wfType:'two_ff_sync'},

{id:'clock_glitch05',ruleName:'Clock_glitch05',cat:6,title:'时钟路径上的毛刺',sev:'Error',
 desc:'时钟网络（Clock Tree）上存在组合逻辑产生的毛刺，直接影响触发器的CLK输入，导致FF在非预期时刻采样数据，造成时序完全错乱。',
 root:'时钟MUX或时钟门控电路的select信号在时钟有效沿附近切换，产生毛刺脉冲直接驱动FF的CLK端，产生伪时钟沿。',
 impact:'FF在非预期时钟沿采样数据，造成时序完全错乱，这是芯片设计中最严重的时钟完整性问题。',
 fixDesc:'所有时钟切换和时钟门控必须使用glitch-free结构（ICG：Integrated Clock Gating Cell），时钟MUX的select信号必须在时钟无效电平期间稳定切换。',
 fixCode:`// 错误：普通逻辑门做时钟门控\nassign clk_g = clk & en; // 产生毛刺！\n\n// 正确1：使用ICG（Integrated Clock Gate）\n// ICG包含Latch+AND，Latch在低电平锁存en\nCLKGATE u_icg(\n  .CLK(clk), .EN(en), .TE(scan_en),\n  .GCLK(clk_g) // Glitch-free输出\n);\n\n// 正确2：时钟MUX select在低电平期间切换`,
 sgdc:`# 声明时钟门控单元\nset_parameter clock_gate_cell CLKGATE\n# 声明glitch-free cell\nglitchfree_cell -names CLKGATE -type clock`,
 waiveCond:'极度谨慎。只有当STA全工艺角确认伪时钟沿不满足任何FF的建立保持时间，或设计中在毛刺期间D端稳定不变时。',
 waiveCode:`waive -rule Clock_glitch05 \\\n  -from clk_mux_out \\\n  -comment "STA全角:毛刺<50ps,所有FF hold>200ps"`,
 waiveNote:'时钟毛刺是最严重的芯片设计问题之一，强烈建议永远不要waive，从架构上根本解决！',
 svgType:'clk_glitch',wfType:'clk_glitch'}

,
/* ══ 新增场景（已归入原有分组）══ */
{id:'ac_unsync03',ruleName:'Ac_unsync03',cat:0,title:'向量信号部分比特未同步',sev:'Error',
 desc:'多位向量信号中，仅部分bit经过同步器传入目标域，其余bit直接跨域或被遗漏。SpyGlass对每个bit独立追踪，未同步的bit单独报Ac_unsync03，比全部未同步更隐蔽。',
 root:'向量拆分同步时，设计者常只对控制bit加同步器，数据bit被遗漏；或SGDC中sync_cell声明的位宽与RTL不一致，导致工具认为某些bit已同步而实际RTL未处理。',
 impact:'未同步的bit在目标域出现亚稳态，与已同步bit组合产生更难调试的功能错误；中间bit的问题仅在特定数据场景下暴露。',
 fixDesc:'对整个向量统一同步：使用异步FIFO、格雷码或握手协议。SGDC中sync_cell/gray_signal声明必须覆盖所有bit，用位宽精确声明，不要遗漏。',
 fixCode:`// 错误：只同步部分bit\nsync_2ff u_ctrl(.clk(clkB),.d(bus[7]),.q(ctrl_sync));\nassign out = {ctrl_sync, bus[6:0]}; // 其余bit直接用！\n\n// 正确：格雷码整体同步\nwire [7:0] bus_gray = bus ^ (bus >> 1);\n// 或：握手+锁存整体跨域`,
 sgdc:`# 错误声明（只声明1bit）\nsync_cell -name sync_inst -from_clk clkA -to_clk clkB\n# 正确：覆盖全部bit\ngray_signal -name bus_gray[7:0]\nqualifier -name req_qual \\\\\n  -from_clk clkA -to_clk clkB \\\\\n  -enable "top.req"`,
 waiveCond:'仅当未同步bit是准静态信号（上电后不变化），且架构师书面确认该bit在目标域使用前必然稳定。',
 waiveCode:`waive -rule Ac_unsync03 \\\\\n  -from bus[6:0] -to clkB_domain \\\\\n  -comment "配置bit，上电后static，架构确认"`,
 waiveNote:'部分bit未同步是最隐蔽的CDC问题之一，建议全面review所有sync_cell的位宽声明，确保无遗漏。',
 svgType:'unsync03',wfType:'unsync_multi'},

{id:'ac_sync_reconv01',ruleName:'Ac_sync_reconv01',cat:2,title:'全局重收敛（跨模块SoC层）',sev:'Error',
 desc:'来自同一源时钟域的信号，分别在不同子模块内经独立同步器同步后，在SoC顶层逻辑中重新汇聚（Global Reconvergence）。各同步器cycle uncertainty独立，汇聚后一致性无法保证。此问题在block级CDC不可见，只在SoC flat CDC才暴露。',
 root:'子模块A和B各自对同一源信号独立同步，在SoC顶层将两路同步输出汇聚使用。各路±1 cycle不确定性在顶层叠加，工具在flat CDC goal下才能检测。',
 impact:'SoC层出现跨模块数据不一致，极难调试。高通Kaanapali以后项目要求SoC cdc_flat必须通过Global Reconvergence检查，是Chip signoff门控之一。',
 fixDesc:'①顶层统一同步一次后分发给各子模块；②子模块间握手协议保证数据一致；③各子模块cdc_model.tcl正确声明端口同步状态，避免SoC层重复同步导致重收敛。',
 fixCode:`// 问题：子模块各自对同一源信号独立同步\n// ModA: sync_2ff u_a(.clk(clkB),.d(sig),.q(sig_a));\n// ModB: sync_2ff u_b(.clk(clkB),.d(sig),.q(sig_b));\n// Top:  out = sig_a & sig_b; // 全局重收敛！\n\n// 修复：顶层统一同步，向下分发\nsync_2ff u_top(.clk(clkB),.d(sig),.q(sig_sync));\nassign sig_a_in = sig_sync;\nassign sig_b_in = sig_sync;`,
 sgdc:`cdc_filter_coherency \\\\\n  -unrelated sig_a_sync sig_b_sync \\\\\n  -comment "顶层统一同步分发，无重收敛"\ncdc_model -port sig_sync -clk clkB -combo no`,
 waiveCond:'架构保证两路同步信号cycle差异不影响功能（幂等操作或双valid保护），且架构师书面确认。',
 waiveCode:`waive -rule Ac_sync_reconv01 \\\\\n  -from {ModA.sig_sync ModB.sig_sync} \\\\\n  -comment "SoC层双valid握手保证一致性，架构确认"`,
 waiveNote:'⚠ 高通Kaanapali/Congo以后项目cdc_flat必须通过此检查，是Chip signoff门控，不得随意waive！',
 svgType:'sync_reconv01',wfType:'conv01'},

{id:'ac_datahold01b',ruleName:'Ac_datahold01b',cat:4,title:'Qualifier失效后数据过早更新',sev:'Error',
 desc:'Enable/Qualifier同步场景中，qualifier去高（失效）后，源域数据在同步链延迟尚未清除前立即更新。目标域同步链仍在传播旧qualifier期间感知到了新数据，采到错误组合。',
 root:'Qualifier deassert后，目标域同步器仍需1~2个时钟周期反映该变化。若源域在qualifier去高后立即更新数据，目标域采样窗口可能跨越新旧数据边界，采到混合值。',
 impact:'目标域采到"旧qualifier对应新数据"的错误组合，产生功能错误且仅在特定时序序列下复现，随机仿真难以覆盖，需定向测试才能发现。',
 fixDesc:'Qualifier去高后，源域数据必须保持稳定至少(同步链级数+1)个目标时钟周期。建议通过握手ACK信号确认目标域完成采样后再更新数据。',
 fixCode:`// 错误：qualifier去高后同周期更新data\nalways @(posedge clkA) begin\n  en <= 1'b0;       // qualifier去高\n  data <= new_data; // 同周期更新！危险！\nend\n\n// 正确：等待ACK确认后再更新\nalways @(posedge clkA) begin\n  if (ack_sync) en <= 1'b0;\n  if (!en && !ack_sync && need_update)\n    data <= new_data; // 安全更新窗口\nend`,
 sgdc:`qualifier -name en_qual \\\\\n  -from_clk clkA -to_clk clkB \\\\\n  -enable "top.data_en"`,
 waiveCond:'通过详细波形分析确认：qualifier去高后到数据更新之间间隔 > 同步链级数+1个目标时钟周期，有完整仿真波形证明。',
 waiveCode:`waive -rule Ac_datahold01b \\\\\n  -from data_sig -to dest_ff \\\\\n  -comment "协议保证qualifier去高后3个clkB周期才更新data"`,
 waiveNote:'Ac_datahold01b与01a区别：01a是qualifier有效时数据超前更新；01b是qualifier去高后数据滞后保持不足。两者都需仿真验证。',
 svgType:'datahold01b',wfType:'datahold'},

{id:'ac_datahold01c',ruleName:'Ac_datahold01c',cat:4,title:'MUX同步器组合逻辑数据保持违例',sev:'Error',
 desc:'MUX同步器中，驱动目标域Latch的数据路径含组合逻辑（如多路选择器）。EN有效期间，组合逻辑的select等输入信号发生翻转，数据总线产生glitch，被目标域FF锁存到非法中间值。',
 root:'MUX同步器要求EN有效期间数据稳定且无glitch。若数据路径含组合MUX且select在EN有效期变化，竞争冒险产生极窄glitch被目标域FF误采。',
 impact:'目标域锁存到glitch产生的非法值，等效于多bit数据撕裂，但有EN保护的假象使问题更隐蔽。只在gate-level后仿（含组合逻辑延迟）中才会暴露。',
 fixDesc:'①源域对MUX输出先寄存一拍消除glitch再送入跨域路径；②确保EN有效期间所有驱动数据的信号（含select）均不翻转；③改用握手协议替代MUX同步。',
 fixCode:`// 错误：EN有效期间MUX的sel可能变化\nassign data_x = sel ? data_a : data_b; // 组合逻辑！\n// EN有效期间sel变→data_x产生glitch！\n\n// 正确：源域先寄存消除glitch\nreg [7:0] data_stable;\nalways @(posedge clkA)\n  if (!en) data_stable <= sel ? data_a : data_b;\n  // EN上升前锁定，EN期间稳定不变`,
 sgdc:`qualifier -name en_mux_qual \\\\\n  -from_clk clkA -to_clk clkB \\\\\n  -enable "top.mux_en"\n# 约束的data字段指向寄存后的稳定信号`,
 waiveCond:'STA+后仿确认：EN有效全部时间内，数据总线所有bit无任何翻转和glitch（含组合路径所有竞争冒险）。',
 waiveCode:`waive -rule Ac_datahold01c \\\\\n  -from data_mux -to dest_latch \\\\\n  -comment "STA验证EN期间data无翻转，gate sim通过"`,
 waiveNote:'此类问题只在门级后仿中暴露，RTL仿真无法发现。强烈建议在源域寄存一拍，修复成本极低。',
 svgType:'datahold01c',wfType:'datahold'},

{id:'ac_abstract_validation01',ruleName:'Ac_abstract_validation01',cat:6,title:'层次化CDC端口约束不一致',sev:'Error',
 desc:'Block级CDC生成的抽象模型（cdc_model.tcl）中，端口时钟域声明与SoC顶层实际连接不匹配。如Block端口声明为clkA域，但SoC顶层将其连接到clkB域netlist，导致SoC CDC分析的基础约束错误。',
 root:'Block级和SoC级CDC分别独立运行，cdc_model.tcl未随RTL变更同步更新；或Block端口在SoC中被复用于不同时钟域配置而cdc_model.tcl未反映。',
 impact:'SoC层CDC分析基于错误约束：漏报真实CDC violation（严重）或误报大量假违例。Block级通过但SoC级出现新CDC问题，极难定位，可能导致Chip Respin。',
 fixDesc:'①Block级每次RTL freeze必须重新运行CDC并由CDC owner审核后更新cdc_model.tcl；②SoC集成时执行cdc_model_check验证端口声明与顶层netlist一致；③使用高通CDC Ref Flow的auto-model-check功能。',
 fixCode:`# Block级SGDC正确声明\ncdc_model -port data_out[7:0] \\\\\n  -clk clkA -combo no\n\n# SoC级验证思路\n# 1. 读Block的cdc_model.tcl\n# 2. 提取SoC顶层端口实际连接时钟\n# 3. 比对声明与实际\n# 4. 不一致 → 报Ac_abstract_validation01`,
 sgdc:`cdc_model -port {data_out[7:0] ctrl_out} \\\\\n  -clk clkA -combo no\ncdc_model -port data_in[7:0] \\\\\n  -clk clkB -combo no\n# SoC级引用Block模型\nread_file -type sgdc ./block/block_cdc_model.tcl`,
 waiveCond:'仅当端口不一致是Block复用于不同时钟域配置（有意为之），且SoC层flat CDC完整验证无真实CDC violation，经CDC owner签字确认。',
 waiveCode:`waive -rule Ac_abstract_validation01 \\\\\n  -port block_inst.data_out \\\\\n  -comment "Block复用于clkB域配置，SoC flat CDC通过，架构确认"`,
 waiveNote:'⚠ 高通内部规定：每次Block RTL freeze后必须更新cdc_model.tcl并经CDC Owner签字，此violation禁止未review批量waive。',
 svgType:'abstract_val01',wfType:'two_ff_sync'},

{id:'ar_combo01',ruleName:'Ar_combo01',cat:5,title:'复位路径上的组合逻辑毛刺',sev:'Error',
 desc:'异步复位信号经过组合逻辑（AND/OR/NOT）后再驱动FF的异步复位端（RN/SN）。组合逻辑在输入跳变时产生的极窄毛刺，会触发FF产生误复位。这是ASIC量产失效的高频原因之一，只在gate-level后仿才会暴露。',
 root:'复位路径上的AND门（如rstn & func_en）在func_en跳变瞬间产生竞争冒险，输出极窄低脉冲（glitch）。脉冲宽度可能不满足FF最小复位脉冲宽度要求，但仍能触发异步复位，导致FF在功能运行中被误复位。',
 impact:'FF在功能运行期间被误复位，状态机跳回IDLE，数据丢失，系统随机挂死。仅在特定信号跳变时序下出现，RTL仿真极难复现，gate-level后仿（含门延迟）才会暴露。',
 fixDesc:'①复位路径严禁普通组合逻辑门；②所有复位逻辑合并必须在复位同步器内部实现（Latch结构消除glitch）；③测试复位通过专用DFT复位路径处理。',
 fixCode:`// 错误：复位路径上AND组合逻辑\nassign rstn_gated = rstn_in & func_en; // func_en跳变→毛刺！\nalways @(posedge clk or negedge rstn_gated)\n  if (!rstn_gated) state <= IDLE; // 被误复位！\n\n// 正确：门控逻辑移入复位同步器内部\nmodule rst_sync_gated(\n  input clk, rstn_in, func_en, output rstn_out\n);\n  reg d1, d2;\n  wire rstn_qual = rstn_in & func_en;\n  always @(posedge clk or negedge rstn_qual)\n    if (!rstn_qual) {d2,d1} <= 2'b00;\n    else {d2,d1} <= {d1,1'b1};\n  assign rstn_out = d2;\nendmodule`,
 sgdc:`sync_cell -name rst_sync_gated \\\\\n  -reset -to_clk clk\nreset -name rstn_in -async -value 0\nglitchfree_cell -names RST_GATE_CELL -type reset`,
 waiveCond:'仅当组合逻辑所有输入均为静态信号（复位期间完全不跳变），STA全工艺角PVT确认无毛刺，且DFT工程师书面确认测试模式安全。',
 waiveCode:`waive -rule Ar_combo01 \\\\\n  -from rstn_gated \\\\\n  -comment "STA全角无glitch，func_en为static信号，DFT确认"`,
 waiveNote:'复位路径glitch是ASIC量产失效高频原因，DFT scan模式下尤为危险。强烈建议从架构上根本解决，不要依赖waive。',
 svgType:'ar_combo01',wfType:'rst_unsync'},

{id:'mutual_exclusive_clocks',ruleName:'Mutual Exclusive',cat:6,title:'互斥时钟域未声明（MUX切换）',sev:'Warning',
 desc:'两时钟通过MUX切换（同一时刻只有一个有效），但未在SGDC中声明为互斥时钟（Mutually Exclusive）。SpyGlass将两者视为独立异步时钟，对所有跨这两个时钟的路径误报大量CDC violation，严重淹没真实问题。',
 root:'MUX时钟切换是SoC低功耗设计常见手段。不声明互斥时，工具认为两路时钟可能同时有效，对所有同步路径误判为未同步，生成大量假违例。',
 impact:'大量False Positive淹没真实CDC问题，signoff效率极低。若对假违例进行"修复"（添加不必要同步器），反而破坏原设计时序并浪费面积/功耗。',
 fixDesc:'①SGDC用set_clock_groups -logically_exclusive声明互斥；②确保MUX切换glitch-free（select在两时钟均无效期间切换）；③高通标准waiver tag：Mutual Exclusive Clocks: clkA <-> clkB。',
 fixCode:`// 时钟MUX必须使用glitch-free单元\nCLKMUX u_mux(\n  .CLK0(clkA), .CLK1(clkB),\n  .SEL(clk_sel_sync), // 经专用同步器的glitch-free信号\n  .CLKOUT(clk_out)\n);\n// 切换时序：先关clkA，等稳定，再开clkB\n// clk_sel只在时钟无效低电平期间切换`,
 sgdc:`# 方法1：SDC声明互斥时钟组（推荐）\nset_clock_groups -logically_exclusive \\\\\n  -group [get_clocks clkA] \\\\\n  -group [get_clocks clkB]\n\n# 方法2：SpyGlass SGDC\ncdc_preference -parameter clock_mux_exclusive \\\\\n  -value {clkA clkB}\n# 高通标准tag: Mutual Exclusive Clocks: clkA <-> clkB`,
 waiveCond:'已正确声明互斥关系，且MUX切换经STA和仿真验证为glitch-free（切换完全在两时钟均无效期间）。',
 waiveCode:`waive -rule Ac_unsync01 \\\\\n  -from_clock clkA -to_clock clkB \\\\\n  -comment "Mutual Exclusive Clocks: 互斥时钟，MUX切换glitch-free"`,
 waiveNote:'高通CDC Waivers文档将"Mutual Exclusive Clocks"列为标准waiver tag。需同时验证：①MUX切换glitch-free；②select信号CDC已处理；③两时钟不会同时有效。',
 svgType:'mutual_excl',wfType:'clk_glitch'}


,
{id:'ac_unsync04',ruleName:'Ac_unsync04',cat:0,title:'异步FIFO读写指针未用格雷码',sev:'Error',
 desc:'异步FIFO的读指针或写指针使用普通二进制计数器直接跨时钟域同步，而非格雷码。二进制计数器递增时多个bit同时翻转，经2-FF同步器后目标域可能采到非法中间值，导致FIFO满/空判断错误。',
 root:'异步FIFO正确性的基础在于指针每次只变化1bit（格雷码特性），使2-FF同步器能安全传输。二进制计数器如从7（0111）跳到8（1000），4个bit同时翻转，同步器无法保证目标域采到合法值。',
 impact:'FIFO满/空判断错误：可能误判为空（丢数据）或误判为满（停止写入），导致数据丢失或系统死锁。此问题在特定读写频率比下才出现，随机仿真难以完全覆盖。',
 fixDesc:'读写指针必须使用格雷码编码后再跨时钟域同步。SGDC中用gray_signal声明格雷码指针，SpyGlass才能识别为合法多bit同步结构。',
 fixCode:`// 错误：二进制指针直接同步
reg [PTR_W:0] wptr_bin;
// 直接2-FF同步二进制指针 → 危险！

// 正确：先转格雷码再同步
wire [PTR_W:0] wptr_gray = wptr_bin ^ (wptr_bin >> 1);
reg [PTR_W:0] wg_s1, wg_s2;
always @(posedge clk_rd or negedge rstn)
  if (!rstn) {wg_s2,wg_s1} <= 0;
  else {wg_s2,wg_s1} <= {wg_s1, wptr_gray};
function [PTR_W:0] gray2bin;
  input [PTR_W:0] g; integer i;
  begin
    gray2bin[PTR_W] = g[PTR_W];
    for (i=PTR_W-1;i>=0;i=i-1)
      gray2bin[i] = gray2bin[i+1] ^ g[i];
  end
endfunction`,
 sgdc:`# 声明格雷码指针
gray_signal -name wptr_gray[PTR_W:0]
gray_signal -name rptr_gray[PTR_W:0]
sync_cell -name wptr_sync_inst -from_clk clk_wr -to_clk clk_rd
sync_cell -name rptr_sync_inst -from_clk clk_rd -to_clk clk_wr`,
 waiveCond:'仅当读写时钟已知为同步时钟（整数倍关系且相位已知），且通过STA保证指针不会被错误采样。此情况极少，需架构师书面确认。',
 waiveCode:`waive -rule Ac_unsync04 \\
  -from wptr_bin -to clk_rd_domain \\
  -comment "读写时钟同步，STA保证安全，架构确认"`,
 waiveNote:'异步FIFO设计中格雷码指针是铁律，任何违反都可能导致数据完整性问题。建议使用经验证的FIFO IP而非自行设计。',
 svgType:'async_fifo',wfType:'unsync_multi'}
,
{id:'three_ff_sync',ruleName:'正确结构',cat:1,title:'三级FF同步器（高速/高可靠）',sev:'Ok',
 desc:'在标准2-FF同步器基础上增加第三级触发器。适用于目标时钟频率极高（如GHz级）、亚稳态解析时间不足一个时钟周期，或对MTBF要求极高（如安全关键设计）的场景。第三级FF进一步降低亚稳态传播概率至可忽略水平。',
 root:'亚稳态概率P ∝ exp(−T_res/τ)，其中T_res为解析时间，τ为工艺参数。目标时钟频率越高，每级FF可用于亚稳态解析的时间越短，需要更多级FF来保证MTBF达到设计要求（通常>1000年）。',
 impact:'正确结构。相比2-FF同步器，MTBF提升约exp(Tclk/τ)倍，适用于超高频设计。代价是增加2个FF的面积和多1个时钟周期的延迟。',
 fixDesc:'第三级FF与前两级同时声明在sync_cell中。注意：3级同步仅适用于单比特控制信号，多bit数据仍需格雷码/握手/FIFO方案。',
 fixCode:`// 三级FF同步器
module sync_3ff #(parameter W=1) (
  input  clk_dst, rstn,
  input  [W-1:0] d_src,
  output [W-1:0] d_dst
);
  (* ASYNC_REG = "TRUE" *)
  reg [W-1:0] meta, sync1, sync2;
  always @(posedge clk_dst or negedge rstn)
    if (!rstn) {sync2,sync1,meta} <= 0;
    else {sync2,sync1,meta} <= {sync1,meta,d_src};
  assign d_dst = sync2;
endmodule
// 适用：目标时钟 > 2GHz，或MTBF要求 > 10^6年`,
 sgdc:`# 声明三级同步器
sync_cell -name sync_3ff -from_clk clkA -to_clk clkB
# 高通项目中部分IP要求声明级数
sync_cell -name sync_3ff -stages 3 -from_clk clkA -to_clk clkB`,
 waiveCond:'此为正确结构，无需waive。若SpyGlass误报，通过sync_cell约束声明即可。',
 waiveCode:`# 无需waive，sync_cell正确声明即可`,
 waiveNote:'3级FF同步仅在必要时使用（超高频或安全关键），通常2级FF已足够。过度使用3级同步会增加延迟，影响跨域响应时间。',
 svgType:'two_ff_sync',wfType:'two_ff_sync'}
,
{id:'ac_conv05',ruleName:'Ac_conv05',cat:2,title:'同步后信号含反馈弧重入源域',sev:'Warning',
 desc:'信号A从clkA域同步到clkB域后，clkB域的处理结果通过组合逻辑或直接反馈回clkA域的另一路径，形成跨时钟域的反馈弧（Feedback Arc）。SpyGlass在聚合分析中将此识别为Ac_conv05：同步链存在反馈路径，破坏了单向同步的拓扑假设。',
 root:'正向同步（clkA→clkB）与反向反馈路径（clkB→clkA）形成跨域环路。若两条路径的传播延迟之和小于握手协议所需的最小间隔，可能在目标域采样到不稳定的中间状态，且环路可能导致死锁或活锁。',
 impact:'若反馈路径未经适当同步，clkA域可能在前一次传输尚未完成时启动新传输，导致数据覆盖或握手状态机进入非法状态。问题仅在高压力场景（频繁传输）下出现，难以通过低频率测试覆盖。',
 fixDesc:'①确保反馈路径（clkB→clkA）也经过独立2-FF同步器；②在clkA域的状态机中，必须等待反馈同步完成（ACK确认）才能发起下一次传输；③SGDC中声明双向同步结构。',
 fixCode:`// 错误：反馈路径未同步
always @(posedge clkA)
  if (ack_b_raw) // 直接用clkB域信号！
    state <= IDLE;

// 正确：反馈也需要2-FF同步
reg ack_s1, ack_s2;
always @(posedge clkA or negedge rstn)
  if (!rstn) {ack_s2,ack_s1} <= 2'b0;
  else {ack_s2,ack_s1} <= {ack_s1, ack_b_raw};
always @(posedge clkA)
  if (ack_s2) state <= IDLE;`,
 sgdc:`# 正向同步
sync_cell -name fwd_sync -from_clk clkA -to_clk clkB
# 反馈同步（反向）
sync_cell -name bwd_sync -from_clk clkB -to_clk clkA
# qualifier声明
qualifier -name req_qual -from_clk clkA -to_clk clkB -enable "top.req"`,
 waiveCond:'仅当反馈路径已经过独立2-FF同步，且状态机设计保证不会在ACK确认前发起新传输，经仿真验证无死锁/活锁。',
 waiveCode:`waive -rule Ac_conv05 \\
  -from ack_b_raw -to clkA_domain \\
  -comment "反馈路径已有bwd_sync同步，握手状态机保证安全"`,
 waiveNote:'跨时钟域反馈弧是SoC设计中容易被忽视的高风险结构，架构评审时必须专门检查反馈路径的同步完整性。',
 svgType:'conv01',wfType:'conv01'}
,
{id:'ac_glitch04',ruleName:'Ac_glitch04',cat:3,title:'时钟使能（CE）跨域毛刺',sev:'Error',
 desc:'时钟使能信号（CE/CEN）从一个时钟域跨越到另一个时钟域，未经同步或同步结构不正确。CE信号直接控制FF的时钟使能端，若在时钟有效沿附近发生亚稳态或毛刺，等效于时钟本身出现问题，危害程度与时钟毛刺相当。',
 root:'CE端的亚稳态与D端不同：D端亚稳态只影响当前FF的输出值，而CE端亚稳态决定"是否采样"，会导致FF在不确定的时刻锁存数据，或应该锁存时未锁存，造成整行/整片FF状态不确定。',
 impact:'CE端亚稳态导致受控FF的采样行为不确定，比D端亚稳态影响范围更大（一个CE可能控制数十个FF）。若CE未同步，相关所有FF的数据都处于不可信状态，可能导致整个功能模块行为异常。',
 fixDesc:'时钟使能信号跨域必须使用2-FF同步器，且同步器的输出必须在目标时钟域中稳定后才连接到FF的CE端。若CE需要精确的时序对齐，改用数据路径控制（将CE转为数据有效标志）。',
 fixCode:`// 错误：CE信号直接跨域
always @(posedge clkB)
  if (ce_a_raw) // 未同步的CE！
    data_reg <= data_in;

// 正确：CE信号必须先同步
reg ce_s1, ce_s2;
always @(posedge clkB or negedge rstn)
  if (!rstn) {ce_s2,ce_s1} <= 2'b0;
  else {ce_s2,ce_s1} <= {ce_s1, ce_a_raw};
always @(posedge clkB)
  if (ce_s2) data_reg <= data_in;
// 注意：同步引入2周期延迟，需调整协议时序`,
 sgdc:`sync_cell -name ce_sync_inst -from_clk clkA -to_clk clkB
# 若CE为准静态
quasi_static -name ce_a_raw`,
 waiveCond:'仅当CE信号已确认为准静态（配置完成后不再变化），且SpyGlass能通过quasi_static约束识别，或CE在两个时钟域均有效时已通过STA证明无亚稳态风险。',
 waiveCode:`waive -rule Ac_glitch04 \\
  -from ce_a_raw -to clkB_domain \\
  -comment "CE为准静态配置信号，上电后不变，quasi_static约束已声明"`,
 waiveNote:'CE端亚稳态的危害往往被低估。一个CE控制多个FF时，单次亚稳态可能造成整个寄存器组的状态错误，必须与D端跨域同等对待。',
 svgType:'glitch01',wfType:'glitch01'}
,
{id:'ac_datahold02',ruleName:'Ac_datahold02',cat:4,title:'多周期路径跨时钟域数据保持违例',sev:'Error',
 desc:'设计中存在跨时钟域的多周期路径（Multi-Cycle Path），SDC中声明了set_multicycle_path约束，但CDC分析工具未正确识别该约束，或约束与实际时序不一致，导致数据在跨域传输时保持时间不足。',
 root:'多周期路径意味着数据在源域保持N个时钟周期后才被目标域采样。若同步器的级数与多周期约束不匹配（如2-FF同步器配合3周期路径），或qualifier的有效窗口未覆盖数据保持的全部周期，会产生采样窗口与数据有效窗口的错位。',
 impact:'目标域在数据仍在过渡的周期内采样，采到的值既非旧值也非新值，产生与Ac_datahold01a类似但更难定位的数据错误。由于多周期路径在时序分析中被"放宽"，问题更容易被STA遗漏。',
 fixDesc:'①多周期路径跨域时，qualifier的有效窗口必须覆盖所有N个源时钟周期；②同步器级数与多周期数匹配（N周期路径建议使用N级同步或加宽qualifier有效窗口）；③SGDC中set_multicycle_path与qualifier约束需联合声明。',
 fixCode:`// SDC: set_multicycle_path 3 -from [get_cells src_reg]
// 意味着data_a在src更新后保持3个clkA周期

// 错误：qualifier只维持1个周期
always @(posedge clkA) begin en <= 1; data <= new_val; end
always @(posedge clkA) en <= 0; // 1周期后即去低！

// 正确：qualifier保持足够周期
reg [2:0] en_cnt;
always @(posedge clkA or negedge rstn)
  if (!rstn) en_cnt <= 0;
  else if (send) en_cnt <= 3'd6;
  else if (en_cnt>0) en_cnt <= en_cnt-1;
assign data_en = (en_cnt > 0);`,
 sgdc:`qualifier -name mcp_qual -from_clk clkA -to_clk clkB -enable "top.data_en"
set_multicycle_path 3 -from [get_clocks clkA] -to [get_clocks clkB]`,
 waiveCond:'通过详细时序分析和定向仿真确认：qualifier有效窗口完全覆盖多周期路径的数据有效期，且同步器输出稳定时数据已满足保持要求。',
 waiveCode:`waive -rule Ac_datahold02 \\
  -from data_mcp -to dst_ff \\
  -comment "MCP=3，qualifier保持6周期，仿真验证采样窗口安全"`,
 waiveNote:'多周期路径跨域是高级CDC问题，需要STA工程师与CDC工程师联合分析，不能单独依赖其中一方的工具结论。',
 svgType:'datahold',wfType:'datahold'}
,
{id:'ar_unsync02',ruleName:'Ar_unsync02',cat:5,title:'复位信号跨时钟域未同步（多域不一致）',sev:'Error',
 desc:'系统中存在多个时钟域，一个域的本地复位信号（已经过该域的复位同步器处理）被直接用于驱动另一个时钟域的触发器复位端，未经目标时钟域的复位同步器重新同步。两个域的复位释放时刻在各自时钟下不一致。',
 root:'即使每个时钟域都有自己的复位同步器，clkA域的rstn_a与clkB域的rstn_b在各自时钟沿释放，两者之间不存在固定的相位关系。将rstn_a直接用于clkB域FF，等效于用一个与clkB不同步的信号驱动其异步复位端。',
 impact:'复位释放后，跨域的FF可能在不同时钟周期退出复位状态，造成SoC级的复位不一致。在复位刚释放时，已退出复位的域可能向仍在复位中的域发送数据或控制信号，引发随机功能错误，且仅在复位序列中出现，正常仿真难以覆盖。',
 fixDesc:'每个时钟域必须有自己独立的复位同步器，使用本域时钟对原始复位信号进行同步。禁止将一个域同步后的复位直接用于另一个域。如需要跨域复位顺序控制，应通过专用的复位序列控制器（Reset Sequencer）实现。',
 fixCode:`// 错误：clkA域的同步复位驱动clkB域FF
always @(posedge clkB or negedge rstn_a) // 错误！
  if (!rstn_a) state_b <= IDLE;

// 正确：各域使用本域时钟的复位同步器
rst_sync u_rst_a(.clk(clkA),.rstn_in(rstn_raw),.rstn_out(rstn_a));
rst_sync u_rst_b(.clk(clkB),.rstn_in(rstn_raw),.rstn_out(rstn_b));
always @(posedge clkB or negedge rstn_b) // 正确
  if (!rstn_b) state_b <= IDLE;`,
 sgdc:`sync_cell -name u_rst_a -reset -to_clk clkA
sync_cell -name u_rst_b -reset -to_clk clkB
reset -name rstn_raw -async -value 0`,
 waiveCond:'仅当能证明两个时钟域存在固定的相位关系（如clkB由clkA分频产生，且已知相位），使rstn_a的释放时刻在clkB域也满足Recovery时序。此情况需后端STA全工艺角验证。',
 waiveCode:`waive -rule Ar_unsync02 \\
  -from rstn_a -to clkB_domain \\
  -comment "clkB由clkA 2分频，相位固定，STA全角验证Recovery满足"`,
 waiveNote:'多时钟域复位不一致是SoC集成中的高频问题。建议在系统级架构阶段规划统一的复位网络，每个时钟域均配备独立复位同步器。',
 svgType:'rst_unsync',wfType:'rst_unsync'}
,
{id:'ac_cdc_fanout01',ruleName:'Ac_cdc_fanout01',cat:7,title:'跨时钟域信号扇出过多',sev:'Warning',
 desc:'源时钟域的单个信号经过一个同步器后，其同步输出在目标域扇出到大量后级逻辑（通常扇出数>32或跨越多个子模块）。高扇出信号在布局布线后存在较大的时钟树偏斜（Clock Skew）风险，且单点故障影响面积大。',
 root:'同步器输出的高扇出路径在物理实现中需要大量Buffer树，引入额外的传播延迟和时序不确定性。在极端工艺角下，扇出末端的FF实际建立/保持时间与标称值偏差较大，可能在本应安全的同步路径上出现时序违例。',
 impact:'高扇出同步信号在后端实现中时序签收困难，可能需要多次迭代修复。若扇出末端的时序违例未被发现，会导致部分FF采样到亚稳态值，而其他FF已正确采样，产生局部不一致的状态。',
 fixDesc:'①在目标域对同步器输出寄存一拍后再分发（Pipeline Buffer）；②将高扇出同步信号通过专用的时钟分发网络分发；③评估是否需要多个独立同步器分别驱动不同子模块（需注意Ac_coherency06的权衡）。',
 fixCode:`// 问题：同步器输出直接高扇出
wire sig_sync; // 扇出到100+个FF！
sync_2ff u1(.clk(clkB),.d(sig_a),.q(sig_sync));

// 修复：插入流水线缓冲级
reg sig_pipe;
always @(posedge clkB)
  sig_pipe <= sig_sync;
// sig_pipe 再分发，时序更容易满足

// 或分组分发
always @(posedge clkB) begin
  grp_a_en <= sig_sync;
  grp_b_en <= sig_sync;
end`,
 sgdc:`sync_cell -name u1 -from_clk clkA -to_clk clkB`,
 waiveCond:'高扇出同步信号已经过后端时序签收（所有扇出末端FF的建立/保持时间在所有PVT角均满足），且后端工程师书面确认。',
 waiveCode:`waive -rule Ac_cdc_fanout01 \\
  -from sig_sync -comment "后端STA全角已签收，扇出时序满足"`,
 waiveNote:'高扇出CDC信号是前端与后端协作的边界问题，建议在物理设计阶段早期评估，避免在Signoff阶段才发现时序收敛困难。',
 svgType:'coherency',wfType:'two_ff_sync'}
,
{id:'ac_quasi_static01',ruleName:'Ac_quasi_static01',cat:7,title:'准静态信号跨域时源域未静止',sev:'Error',
 desc:'信号被声明为准静态（quasi_static）以waive CDC违例，但在实际工作中，该信号在目标域采样期间仍然发生了变化（源域未能保证在跨域传输期间信号稳定）。SpyGlass的quasi_static约束是基于设计意图的声明，工具本身无法验证运行时是否真正静止。',
 root:'quasi_static的前提是：信号只在系统初始化或特定配置窗口期间改变，正常功能运行时保持稳定。若软件/固件在功能运行期间修改了该寄存器，或硬件逻辑在非配置期间也会更新该信号，则quasi_static声明与实际行为不符，CDC问题未被真正修复。',
 impact:'quasi_static waive掩盖了真实的CDC违例。目标域在信号变化期间采样，产生亚稳态，但由于SpyGlass已waive该路径，不会有任何工具告警。这是最危险的CDC问题之一：问题被掩盖但实际存在，只在特定软件配置序列下暴露，量产后极难调试。',
 fixDesc:'①严格审查所有quasi_static声明，确认是否有机制保证"采样期间信号稳定"；②建议用硬件锁定机制（如配置锁寄存器）防止功能运行期间修改quasi_static信号；③若信号在功能期间可能变化，必须改用2-FF同步器或握手协议，不能依赖quasi_static。',
 fixCode:`// 危险：quasi_static声明但实际可变
// SGDC: quasi_static -name cfg_reg ← 声明为准静态
// 但软件可能在任何时候写该寄存器！

// 修复方案1：硬件锁定
reg cfg_lock;
always @(posedge clk)
  if (!cfg_lock) cfg_reg <= apb_wdata;

// 修复方案2：若必须动态变化，改用2-FF同步
reg cs1, cs2;
always @(posedge clkB or negedge rstn)
  if (!rstn) {cs2,cs1} <= 0;
  else {cs2,cs1} <= {cs1, cfg_reg};
assign cfg_b = cs2;`,
 sgdc:`# quasi_static声明（仅当真正静止时使用！）
quasi_static -name cfg_reg
# 或改用2-FF同步（推荐）
sync_cell -name cfg_sync -from_clk clkA -to_clk clkB`,
 waiveCond:'不建议在quasi_static已出问题的情况下继续waive。必须从根本上修复：要么通过硬件保证信号真正静止，要么改用正规同步结构。',
 waiveCode:`# 强烈不建议waive此问题
# 若确认信号通过硬件锁定机制保证静止：
waive -rule Ac_quasi_static01 \\
  -from cfg_reg \\
  -comment "硬件cfg_lock寄存器保证功能期间不可写，已验证"`,
 waiveNote:'⚠ quasi_static是最容易被滥用的CDC豁免机制。高通CDC审查中，对quasi_static声明的审核与Error级别违例同等严格，每条声明必须有明确的硬件保证机制文档。',
 svgType:'mux_sync',wfType:'mux_sync'}
,

// ══════════════════ 新增场景（遗漏补充）══════════════════

// Cat 0 – 未同步跨时钟
{id:'ac_unsync05',ruleName:'Ac_unsync05',cat:0,title:'IP边界异步接口信号未同步',sev:'Error',
 desc:'外部异步IP（如AXI异步桥、PCIe PHY、DDR PHY、片外IO）的信号直接进入SoC内部逻辑，未在IP边界做任何同步处理。外部信号的时钟相位与芯片内部时钟完全独立，亚稳态风险极高。',
 root:'片外信号或异步IP输出端口与SoC内部时钟域之间没有同步器。SpyGlass在分析顶层边界时，若对应端口缺少port_domain声明或sync_cell标注，即报告此违例。',
 impact:'外部异步信号直接驱动内部FF，亚稳态传播到整个时钟树，可能导致芯片随机死机、数据损坏或总线挂死。在量产产品中，此类问题极难复现和排查。',
 fixDesc:'在SoC顶层IO环（或CDC隔离层）统一插入2-FF同步器，并在SGDC中声明port_domain与sync_cell。',
 fixCode:`// SoC顶层边界同步处理
reg s1_ext, s2_ext;
always @(posedge clk_soc or negedge rst_n)
  if (!rst_n) {s2_ext, s1_ext} <= 2'b0;
  else        {s2_ext, s1_ext} <= {s1_ext, ext_signal_in};
assign int_signal = s2_ext;`,
 sgdc:`# 声明外部端口时钟域
port_domain -name ext_signal_in -clock async
# 声明同步器
sync_cell -name u_ext_sync \
  -from_clock async -to_clock clk_soc`,
 waiveCond:'仅当外部信号已在PCB/PHY层确认完全静态（如板级硬连接的配置引脚），且经系统架构师书面确认。',
 waiveCode:`waive -rule Ac_unsync05 \
  -signal ext_signal_in \
  -comment "硬连接配置引脚，板级静态，经系统架构确认"`,
 waiveNote:'⚠ IP边界疏漏的同步器是SoC量产失效的高发原因之一，务必在顶层CDC lint阶段统一检查所有异步端口。',
 svgType:'unsync_s2f',wfType:'unsync_s2f'},

// Cat 1 – 同步结构（正确）
{id:'open_loop_sync',ruleName:'正确结构',cat:1,title:'开环MUX同步器（多周期采样）',sev:'Ok',
 desc:'开环MUX同步器（Open-Loop MUX Synchronizer）是一种低功耗多比特跨时钟同步方案：源域保持数据稳定N个目标时钟周期，目标域在第N/2个周期采样，无需握手，适合对吞吐量要求较低的配置总线。',
 root:'目标时钟在数据稳定窗口的中间对数据采样，避开建立/保持边沿附近的亚稳态窗口。N的大小由时钟频率比和同步延迟共同决定，通常N≥4。设计者需通过STA验证多周期路径约束正确。',
 impact:'正确结构。相比握手协议吞吐量较低，不适合高频数据；若多周期路径（MCP）约束配置错误，STA会误报或漏报，实际采样仍可能亚稳态。',
 fixDesc:'在SDC中正确声明多周期路径（set_multicycle_path），并在SGDC中声明open_loop_sync单元。保证源域数据保持稳定时间 ≥ N×Tclkb。',
 fixCode:`// 源域：数据保持N拍
reg [7:0] data_hold;
reg [2:0] hold_cnt;
always @(posedge clkA) begin
  if (send_req) begin
    data_hold <= new_data;
    hold_cnt  <= N;
  end else if (hold_cnt != 0)
    hold_cnt <= hold_cnt - 1;
end

// 目标域：N/2拍后采样
reg [7:0] data_b;
always @(posedge clkB)
  if (sample_en) data_b <= data_hold;`,
 sgdc:`# 声明开环MUX同步器
open_loop_sync -name u_ol_sync \
  -from_clk clkA -to_clk clkB \
  -hold_cycles 4
# SDC多周期路径
# set_multicycle_path 4 -from [get_cells data_hold*] -to [get_cells data_b*]`,
 waiveCond:'无需waive，此为合法结构。若SpyGlass误报，添加open_loop_sync声明即可消除。',
 waiveCode:`# 优先使用SGDC声明，无需waive
open_loop_sync -name u_ol_sync -from_clk clkA -to_clk clkB`,
 waiveNote:'⚠ 开环同步的安全性完全依赖源域数据稳定时间的设计保证，必须通过STA验证多周期路径约束，不可仅靠代码审查。',
 svgType:'mux_sync',wfType:'mux_sync'},

// Cat 2 – 聚合问题
{id:'ac_conv06',ruleName:'Ac_conv06',cat:2,title:'总线部分比特同步、部分未同步后聚合',sev:'Warning',
 desc:'跨时钟域总线中，部分比特经过了正规同步器，而另一部分比特直接跨域，两部分在目标域逻辑中被聚合使用。同步路径和未同步路径的延迟差异导致数据在目标域的到达时序完全不一致。',
 root:'同步路径经过2-FF同步器，引入2个目标时钟周期延迟；未同步路径则无延迟。两者在目标域FF前汇合，采样时序完全错位，目标FF采到的是不同时间点的数据混合，形成数据撕裂（data tearing）。',
 impact:'目标域采到非法的混合状态（既非旧值组合也非新值组合），可能导致FSM跳入非法状态、运算结果出错、总线协议违规等严重功能问题。',
 fixDesc:'对整条总线统一采用同一种同步方案（全部用异步FIFO、或全部用MUX同步器+qualifier），严禁对同一总线的不同比特采用不同的同步策略。',
 fixCode:`// 错误：bus[7:0]中部分bit经同步、部分未经同步
// 正确：统一使用异步FIFO
async_fifo #(.WIDTH(8)) u_fifo (
  .wclk(clkA), .wr_en(valid_a), .wdata(bus_a),
  .rclk(clkB), .rd_en(rd_en_b), .rdata(bus_b)
);

// 或统一使用MUX同步器+qualifier
qualifier u_qual(.clk(clkB),.req(req_sync),.data_in(bus_a),.data_out(bus_b));`,
 sgdc:`# 对整条总线声明qualifier或FIFO
qualifier -name req_b \
  -from_clk clkA -to_clk clkB \
  -enable "top.req_b" \
  -data "top.bus_a"`,
 waiveCond:'仅当经过形式验证（Formal Verification）证明时序分离，且数据在采样时刻确实全部稳定（如准静态配置总线），经设计主管书面审批。',
 waiveCode:`waive -rule Ac_conv06 \
  -from_clock clkA -to_clock clkB \
  -signal bus_a \
  -comment "准静态配置总线，形式验证通过，设计主管审批"`,
 waiveNote:'⚠ 同一总线不同比特的混合同步策略，是CDC设计审查中最容易被忽视的陷阱，通常只有SpyGlass全局分析才能发现。',
 svgType:'conv03',wfType:'unsync_multi'},

// Cat 3 – 毛刺问题
{id:'ac_glitch05',ruleName:'Ac_glitch05',cat:3,title:'时钟MUX切换期间输出毛刺',sev:'Error',
 desc:'时钟MUX（Clock Multiplexer）的选择信号（sel）异步切换时，MUX输出时钟在新旧时钟之间产生毛刺脉冲或高/低电平毛刺，驱动下游寄存器产生错误的时钟沿，导致错误数据被锁存。',
 root:'sel信号切换时恰好在旧时钟高电平期间，MUX输出出现比正常时钟脉冲更短的毛刺；或sel切换产生两个时钟同时为高的重叠窗口（double-edge问题）。下游FF被这个毛刺误触发，锁存无效数据。',
 impact:'下游寄存器数据损坏，可能引起系统挂起、寄存器堆状态混乱、PMU状态机跳转失控等严重问题。在低功耗场景下（频繁切频），此类问题对系统稳定性威胁极大。',
 fixDesc:'使用Glitch-Free Clock MUX（门控时钟MUX）方案：在切换前，先将两路时钟分别门控关闭，待时钟处于低电平时切换sel，再重新使能输出时钟。',
 fixCode:`// Glitch-Free MUX 标准实现
// 阶段1：负沿锁存门控使能，避开高电平切换
always @(negedge clkA)
  en_a <= sel_sync_a ? 1'b0 : 1'b1;
always @(negedge clkB)
  en_b <= sel_sync_b ? 1'b1 : 1'b0;

// 阶段2：与门门控后再进入MUX
assign clk_mux = (clkA & en_a) | (clkB & en_b);`,
 sgdc:`# 声明时钟MUX
clock_mux -name u_clk_mux \
  -select sel \
  -in_clocks {clkA clkB} \
  -out_clock clk_mux`,
 waiveCond:'仅当系统架构保证时钟MUX切换时所有下游寄存器均处于复位状态（即切换期间功能无效），且经仿真验证波形无毛刺被采样。',
 waiveCode:`waive -rule Ac_glitch05 \
  -signal sel \
  -comment "切换时下游寄存器处于复位，仿真验证无功能影响"`,
 waiveNote:'⚠ 时钟MUX毛刺是低功耗芯片的高频CDC问题，必须使用Glitch-Free MUX单元（通常由工艺库提供），不可用普通数字MUX替代。',
 svgType:'clk_glitch',wfType:'clk_glitch'},

// Cat 4 – 数据保持问题
{id:'ac_cdc02',ruleName:'Ac_cdc02',cat:4,title:'背靠背CDC传输违反最小间隔约束',sev:'Error',
 desc:'连续两次跨时钟域数据传输之间的间隔时间小于同步器所需的最小传输间隔（Min Transfer Interval）。在第一次传输尚未完成同步（数据还在流水线中）时，第二次传输已经发起，导致同步器内部状态被覆盖，第一次数据丢失。',
 root:'2-FF同步器需要至少3个目标时钟周期（含建立时间）才能完成一次完整传输。若源域发送数据的间隔 < 3×Tclkb，新数据会在同步器第一级FF未传播到第二级之前覆盖旧数据，造成数据丢失。',
 impact:'第一次传输的数据在目标域完全不可见；或者两次数据在同步管线中合并，目标域采到不确定状态。在高速数据流场景下，错误率随发送频率成比例上升。',
 fixDesc:'发送端必须保证相邻两次传输之间的间隔 ≥ (同步级数+1)×目标时钟周期。使用握手协议（req/ack）或异步FIFO可自动保证最小间隔约束。',
 fixCode:`// 错误：背靠背发送，无间隔保证
always @(posedge clkA)
  data_out <= new_data; // 每拍发一个，目标域来不及同步！

// 正确：握手协议保证间隔
always @(posedge clkA) begin
  if (ready && send_req) begin
    data_latch <= new_data;
    req <= 1;
  end else if (ack_sync) begin
    req <= 0;
  end
end
// 目标域ack确认后，源域才可发下一笔`,
 sgdc:`# 声明握手或最小间隔约束
sync_cell -name u_sync \
  -from_clk clkA -to_clk clkB \
  -min_transfer_interval 4`,
 waiveCond:'仅当数据流设计保证物理上不会出现背靠背传输（例如源域发送速率受限），且通过形式验证或穷举仿真确认。',
 waiveCode:`waive -rule Ac_cdc02 \
  -from_clock clkA -to_clock clkB \
  -signal data_out \
  -comment "源域发送速率 < 1/4 目标时钟频率，经形式验证确认"`,
 waiveNote:'⚠ 背靠背传输问题在门级仿真中极难复现（依赖精确时序），强烈建议使用握手协议或异步FIFO，从根本上消除此风险。',
 svgType:'cdc01',wfType:'datahold'},

// Cat 5 – 复位同步
{id:'ar_domain01',ruleName:'Ar_domain01',cat:5,title:'上电复位序列跨域不一致（POR未对齐）',sev:'Error',
 desc:'芯片上电时，POR（Power-On Reset）信号需要同步分发到所有时钟域。若某些时钟域在POR结束后、时钟稳定前已开始工作，或不同域的复位释放时序严重不对齐（差异超过数个时钟周期），各域之间的初始状态不一致，导致启动时序紊乱。',
 root:'POR信号通常来自模拟电路（POR Cell），其释放时间与各数字时钟域相位无关。不同时钟域在POR释放时所处的时钟相位不同，导致复位释放在各域中被采样的时刻不同，形成复位前沿的跨域不对齐。',
 impact:'上电时某些域已退出复位并开始运算，而其他域仍在复位；跨域的信号在一端有效、另一端仍被复位清零，造成初始事务丢失、协议握手超时，严重时导致芯片上电失败概率上升。',
 fixDesc:'使用专用复位控制器（Reset Controller/Sequencer），对POR信号进行分域同步与时序排序：先复位高频域，再依次释放低频域，保证复位释放顺序和间隔满足跨域协议要求。',
 fixCode:`// 复位控制器：各域分别同步POR
module reset_ctrl (
  input  por_n,      // 来自POR Cell
  input  clkA, clkB,
  output rst_a_n, rst_b_n
);

// 域A：2-FF同步POR
reg [1:0] sync_a;
always @(posedge clkA or negedge por_n)
  if (!por_n) sync_a <= 2'b0;
  else        sync_a <= {sync_a[0], 1'b1};
assign rst_a_n = sync_a[1];

// 域B：同理
reg [1:0] sync_b;
always @(posedge clkB or negedge por_n)
  if (!por_n) sync_b <= 2'b0;
  else        sync_b <= {sync_b[0], 1'b1};
assign rst_b_n = sync_b[1];
endmodule`,
 sgdc:`# 声明POR为异步复位源
async_reset -name por_n
# 各域复位同步器
sync_cell -name u_rst_sync_a \
  -from_clock async -to_clock clkA -type reset
sync_cell -name u_rst_sync_b \
  -from_clock async -to_clock clkB -type reset`,
 waiveCond:'仅当系统验证平台（SVP）或硅后测试平台已通过全速上电复位序列验证，且各域复位不对齐时间 < 1个协议事务周期，经系统架构师书面确认。',
 waiveCode:`waive -rule Ar_domain01 \
  -signal por_n \
  -comment "POR时序经SVP上电场景覆盖验证，架构确认无影响"`,
 waiveNote:'⚠ POR跨域不对齐在流片前极难通过普通仿真发现，强烈建议使用专用Reset Sequencer，并在上电仿真场景中加入随机相位抖动测试。',
 svgType:'rst_unsync',wfType:'rst_unsync'},

// Cat 6 – 特殊情况
{id:'false_path_cdc',ruleName:'False Path CDC',cat:6,title:'CDC路径被错误声明为False Path',sev:'Error',
 desc:'设计者为了消除SpyGlass或STA工具对CDC路径的警告，将跨时钟域路径直接用set_false_path约束豁免。set_false_path只告诉工具忽略此路径的时序分析，但并不等效于插入同步器，实际电路仍然存在亚稳态风险，且此后CDC lint和STA均无法再检测此路径。',
 root:'set_false_path仅是时序分析的例外声明，不涉及任何硬件同步机制。被声明为false path后，工具链对该路径的所有检查（建立时间、保持时间、CDC lint）全部失效，亚稳态风险在工具层面完全隐身。',
 impact:'可能遗漏大量真实亚稳态风险，且这类错误极难在仿真中复现。若被量产流片，轻则偶发失效，重则高温/低压条件下大规模失效，造成重大质量事故。',
 fixDesc:'绝不使用set_false_path来掩盖CDC违例。对CDC路径应插入正规同步器，并在SGDC中声明；若路径确实不需要时序约束（如真正的异步路径），使用SpyGlass的domain_interact声明来正确标注，而非false_path。',
 fixCode:`// 错误做法（SDC中）：
// set_false_path -from [get_clocks clkA] -to [get_clocks clkB]
// ↑ 这会让所有clkA→clkB的CDC检查全部失效！

// 正确做法1：插入同步器+SGDC声明
sync_cell -name u_sync -from_clk clkA -to_clk clkB

// 正确做法2：若为真正无需同步的路径，用domain_interact声明
// domain_interact -from clkA -to clkB -interaction none`,
 sgdc:`# 正确替代false_path的SGDC声明
# 方案1：有同步器
sync_cell -name u_sync \
  -from_clk clkA -to_clk clkB

# 方案2：互斥域
clock_group -name excl_grp \
  -logically_exclusive {clkA clkB}`,
 waiveCond:'此类问题本身不应waive。若set_false_path确实用于真正的静态/异步路径，需用domain_interact等正确SGDC约束替代，并附架构说明。',
 waiveCode:`# 不建议waive，请用正确SGDC替代
# 如确需记录，格式如下：
waive -rule False_Path_CDC \
  -comment "已确认使用domain_interact替代，正确声明跨域关系"`,
 waiveNote:'⚠ 用set_false_path掩盖CDC问题是工程实践中的重大错误。流片前必须审查所有跨时钟域的false path声明，逐一确认其技术合理性。',
 svgType:'coherency',wfType:'coherency'},

// Cat 7 – 时钟域结构问题
{id:'ac_clkdomain01',ruleName:'Ac_clkdomain01',cat:7,title:'时钟域划分歧义（模糊时钟源）',sev:'Warning',
 desc:'某个触发器的时钟端可以通过组合逻辑路径追溯到多个不同的时钟源，SpyGlass无法确定该触发器属于哪个时钟域，导致相关CDC路径被标记为"不可分析"或时钟域划分不明确，后续CDC检查结果不可信。',
 root:'时钟路径上存在组合逻辑（非Glitch-Free机制）、时钟MUX未正确声明、或者时钟选择逻辑使用了普通数字逻辑门而非标准时钟单元，导致SpyGlass时钟追踪算法无法唯一确定时钟源。',
 impact:'SpyGlass对该触发器相关的所有CDC路径无法给出确定性分析结论，可能大量漏报CDC违例；或者工具在保守模式下对所有该分支路径均报错，导致大量误报需要人工排查。',
 fixDesc:'在SGDC中为该触发器或模块明确声明时钟域归属；对时钟MUX使用clock_mux声明；避免时钟路径上使用普通组合逻辑；在SoC级别规范化时钟树。',
 fixCode:`// 错误：用普通assign选择时钟（引起时钟域歧义）
assign clk_sel_out = sel ? clkA : clkB; // 普通assign，工具无法识别

// 正确：使用标准时钟MUX单元（工艺库提供）
CLKMUX u_mux (.CLK0(clkA), .CLK1(clkB), .SEL(sel), .Y(clk_out));

// SGDC声明消除歧义
// clock_mux -name u_mux -select sel -in_clocks {clkA clkB}`,
 sgdc:`# 声明时钟MUX消除歧义
clock_mux -name u_clk_mux \
  -select sel \
  -in_clocks {clkA clkB} \
  -out_clock clk_out

# 或为特定FF显式声明时钟域
domain -name domA -clock clkA
domain -name domB -clock clkB`,
 waiveCond:'仅当经人工分析确认该FF在任何运行场景下只受单一时钟驱动（例如MUX在功能上互斥），且已用clock_group或clock_mux正确声明。',
 waiveCode:`waive -rule Ac_clkdomain01 \
  -signal clk_sel_out \
  -comment "时钟MUX已声明，clkA/clkB互斥，无同时有效场景"`,
 waiveNote:'⚠ 时钟域歧义是CDC分析可信度的根本威胁，必须在设计早期（架构阶段）规范时钟树，确保每个FF的时钟来源唯一且可追溯。',
 svgType:'clk_glitch',wfType:'clk_glitch'},

{id:'ac_isolation01',ruleName:'Ac_isolation01',cat:7,title:'跨电源域信号缺少隔离单元（ISO Cell）',sev:'Error',
 desc:'信号从可关断电源域（Switchable Power Domain）传向常开域（Always-On Domain），当可关断域断电时，其输出信号浮空（值不确定），常开域的逻辑端接收到X态或高阻输入，导致功能错误甚至硬件损坏。',
 root:'可关断域断电时，其标准单元输出处于未知状态（浮空或钳位到电源轨电压），常开域的输入端接收到该信号后，可能导致CMOS输入端长期处于线性区（大电流状态），引发功耗异常甚至闩锁效应（Latch-up）。',
 impact:'常开域逻辑接收到X态输入，功能紊乱；严重时引起CMOS输入MOS管同时导通（穿通）、芯片异常发热甚至永久损坏。低功耗场景下（频繁电源开关），此类问题极为危险。',
 fixDesc:'在可关断域输出端（位于常开域侧）插入隔离单元（Isolation Cell / ISO Cell）。ISO Cell在电源关断时将输出钳位到安全的已知电平（0或1），防止X态传播到常开域。',
 fixCode:`// UPF声明隔离策略
create_isolation_rule -name iso_rule \
  -from_domain PD_switchable \
  -to_domain PD_always_on \
  -isolation_signal iso_en \
  -isolation_sense high \
  -location to_domain \
  -clamp_value 0

// RTL层：ISO Cell通常由工具自动插入（UPF流程）
// 手动例化示例：
ISO_AND u_iso (.A(signal_from_pd), .EN(iso_en), .Y(signal_to_aon));`,
 sgdc:`# SpyGlass LP模式下声明电源域
# power_domain -name PD_sw -primary_power_net VDD_SW
# power_domain -name PD_aon -primary_power_net VDD_AON
# ISO检查通常由SpyGlass LP（低功耗）规则集处理
# 确保UPF中create_isolation_rule覆盖所有跨域信号`,
 waiveCond:'仅当信号在可关断域断电时，经架构分析确认常开域此时不使用该信号（时序隔离），且功能正确性有其他机制保证（如常开域提前寄存了稳定值）。',
 waiveCode:`waive -rule Ac_isolation01 \
  -signal signal_from_pd \
  -comment "断电时常开域本地寄存器已锁存有效值，不再使用此输入，经低功耗架构师确认"`,
 waiveNote:'⚠ 缺少ISO Cell是低功耗芯片的致命设计缺陷，必须在UPF/CPF流程中完整声明所有电源域边界，并通过SpyGlass LP专项lint确认无遗漏。',
 svgType:'unsync_s2f',wfType:'unsync_s2f'}

,

// ══════════════════════════════════════════════════════════════════
//  补充遗漏场景（9 个）
// ══════════════════════════════════════════════════════════════════

// ── Cat 0：未同步跨时钟 ────────────────────────────────────────────
{id:'ac_unsync06',ruleName:'Ac_unsync06',cat:0,title:'复位衍生使能信号跨时钟域未同步',sev:'Error',
 desc:'由复位信号衍生出的使能/有效信号（如复位释放后产生的 init_done、power_on_en 等），从复位域直接传入数据时钟域，未经同步处理。这类信号虽然语义上是"静态配置"，但其产生时刻与目标时钟域无相位关系，存在亚稳态风险；SpyGlass 不会因信号名称而自动豁免。',
 root:'复位衍生信号的 Assert / Deassert 时刻由复位同步器决定，与数据时钟域时钟相位无关。若直接作为数据时钟域 FF 的使能或数据输入，目标 FF 采样时可能处于信号跳变边沿，触发亚稳态。',
 impact:'数据时钟域 FF 在上电或复位释放阶段采到亚稳态，导致初始状态不确定；相关控制逻辑可能在复位刚释放时进入非法状态，引发启动时序紊乱，且仅在特定上电时序窗口下出现，难以复现。',
 fixDesc:'复位衍生的使能信号也必须经过目标时钟域的 2-FF 同步器。建议将此类信号封装为专用"域间初始化同步"路径，并在 SGDC 中声明 sync_cell。',
 fixCode:`// 错误：复位衍生信号直接跨域
wire init_done = ~rstn_raw; // 复位释放后拉高
always @(posedge clk_data)
  if (init_done) state <= ACTIVE; // 未同步！

// 正确：经 2-FF 同步器传入数据域
reg init_s1, init_s2;
always @(posedge clk_data or negedge rstn_raw)
  if (!rstn_raw) {init_s2,init_s1} <= 2'b0;
  else {init_s2,init_s1} <= {init_s1, init_done_src};
assign init_done_sync = init_s2;`,
 sgdc:`# 声明同步器
sync_cell -name u_init_sync \\
  -from_clk clk_rst -to_clk clk_data
# 若 init_done 确为准静态
quasi_static -name init_done_src`,
 waiveCond:'仅当复位衍生信号在目标时钟域使用时已确保至少经过 2 个目标时钟周期的稳定窗口，且架构师书面确认信号在跨域采样时刻已完全稳定。',
 waiveCode:`waive -rule Ac_unsync06 \\
  -from init_done_src -to clk_data_domain \\
  -comment "复位释放后保持稳定超过 10 个 clk_data 周期，架构确认"`,
 waiveNote:'复位衍生信号容易被误认为"上电后静态"而忽视同步需求。高通 CDC 审查中，此类信号需与普通控制信号同等对待，必须有 sync_cell 声明或 quasi_static 书面确认。',
 svgType:'unsync_s2f',wfType:'rst_unsync'},

// ── Cat 1：同步结构正确 ────────────────────────────────────────────
{id:'reset_sync_multi',ruleName:'正确结构',cat:1,title:'多时钟域独立复位同步链（正确结构）',sev:'Ok',
 desc:'SoC 中存在多个时钟域时，每个时钟域都应有独立的复位同步器，统一对原始异步复位信号（por_n / rstn_raw）进行同步处理。各域同步器使用本域时钟，输出的 rstn_x 彼此独立、与本域时钟对齐，是 ASIC 多时钟域复位的工业标准做法。',
 root:'多时钟域设计中，不同时钟域的复位必须分别同步，才能保证各域的复位释放时序与本域时钟对齐。共用一个同步器或跨域使用他域同步后复位，都会引入复位时序不确定性。',
 impact:'正确结构。每个域独立同步复位，保证各域内 FF 在同一时钟沿退出复位，是 SoC 多域复位设计的基础规范。代价是面积略有增加（每域 2 个 FF），完全可以接受。',
 fixDesc:'封装通用 rst_sync 模块，在顶层为每个时钟域各实例化一次；SGDC 中每个实例均需声明 sync_cell -reset。',
 fixCode:`// 顶层：各时钟域独立复位同步
rst_sync u_rst_a(.clk(clkA),.rstn_in(por_n),.rstn_out(rstn_a));
rst_sync u_rst_b(.clk(clkB),.rstn_in(por_n),.rstn_out(rstn_b));
rst_sync u_rst_c(.clk(clkC),.rstn_in(por_n),.rstn_out(rstn_c));

// 各域 FF 使用本域同步后的复位
always @(posedge clkA or negedge rstn_a)
  if (!rstn_a) state_a <= IDLE; // 正确
always @(posedge clkB or negedge rstn_b)
  if (!rstn_b) state_b <= IDLE; // 正确`,
 sgdc:`# 各域复位同步器声明
sync_cell -name u_rst_a -reset -to_clk clkA
sync_cell -name u_rst_b -reset -to_clk clkB
sync_cell -name u_rst_c -reset -to_clk clkC
reset -name por_n -async -value 0`,
 waiveCond:'此为正确结构，无需 waive。',
 waiveCode:`# 无需 waive，确保每个域均有独立 sync_cell -reset 声明`,
 waiveNote:'常见错误：仅在顶层实例化一个复位同步器，然后将其输出分发给多个时钟域——这等效于用一个域的同步复位驱动其他域，必须避免。',
 svgType:'rst_sync_correct',wfType:'rst_sync'},

// ── Cat 2：聚合问题 ────────────────────────────────────────────────
{id:'ac_conv07',ruleName:'Ac_conv07',cat:2,title:'异步 FIFO 满/空标志同步后逻辑聚合',sev:'Warning',
 desc:'异步 FIFO 的满标志（full）和空标志（empty）分别经独立同步器同步到各自时钟域后，在下游控制逻辑中与其他信号（如另一 FIFO 的状态或外部使能）聚合，产生组合聚合（convergence）。两路标志的同步延迟独立，聚合后可能出现短暂的不一致状态。',
 root:'FIFO 满/空标志是基于格雷码指针计算的，本身已是合法的单 bit 跨域信号，但同步后的标志与其他信号聚合时，各路信号的 cycle uncertainty 叠加，目标域控制逻辑可能在某个时钟周期看到"两个标志同时有效"或"标志与外部使能不一致"的中间状态。',
 impact:'下游流控逻辑（如同时判断 FIFO 非满且外部 ready）可能在某个时钟周期做出错误判断，导致多写一笔数据（overflow）或错误停止写入（underflow）。在高速数据流场景下，此类概率性错误极难定位。',
 fixDesc:'① 对满/空标志聚合的下游逻辑增加一级寄存器，使各路信号在同一时钟沿对齐后再做判断；② 使用握手协议替代直接标志聚合；③ SGDC 中用 cdc_filter_coherency 声明已保证一致性。',
 fixCode:`// 问题：满/空标志直接聚合
assign can_write = !fifo_full_sync && ext_ready; // 可能短暂不一致

// 修复：先寄存一拍对齐
reg full_r, ready_r;
always @(posedge clk_wr)
  {full_r, ready_r} <= {fifo_full_sync, ext_ready};
assign can_write = !full_r && ready_r; // 安全`,
 sgdc:`# 声明已保证一致性
cdc_filter_coherency \\
  -unrelated fifo_full_sync ext_ready \\
  -comment "各路信号已寄存一拍对齐，控制逻辑可接受一周期延迟"`,
 waiveCond:'当下游逻辑对满/空标志的一周期不确定性不敏感（如流控裕量 > 1 个时钟周期），且通过功能仿真验证无 overflow/underflow。',
 waiveCode:`waive -rule Ac_conv07 \\
  -from {fifo_full_sync ext_ready} \\
  -comment "流控裕量充足，仿真验证无溢出"`,
 waiveNote:'FIFO 满/空标志聚合问题在低负载仿真中不会出现，必须在高压力（接近满/空边界）场景下专项测试，才能覆盖此类概率性错误。',
 svgType:'conv01',wfType:'conv01'},

// ── Cat 3：毛刺问题 ────────────────────────────────────────────────
{id:'ac_glitch06',ruleName:'Ac_glitch06',cat:3,title:'DFT 扫描模式下的时钟毛刺（Scan Clock Glitch）',sev:'Error',
 desc:'在 DFT（Design For Test）扫描模式下，扫描时钟（scan_clk）与功能时钟（func_clk）通过时钟 MUX 切换。若扫描使能信号（scan_en）的跳变不满足时钟 MUX 的建立保持时间，或扫描时钟 MUX 不是 glitch-free 结构，切换时会在时钟网络上产生毛刺，导致 FF 被误触发，损坏扫描链数据完整性。',
 root:'扫描模式下 scan_en 信号的时序通常不受功能时序约束管控（被 set_false_path 豁免），若 scan_en 在时钟高电平期间跳变，普通时钟 MUX 会输出窄脉冲（glitch）。扫描链 FF 被误触发后，扫描数据链被破坏，导致测试向量无效，掩盖实际的制造缺陷。',
 impact:'扫描测试覆盖率下降，漏测芯片制造缺陷；严重时导致 ATE 测试无法正常运行，芯片无法出货。在高频设计（GHz 级）中，时钟 MUX 切换毛刺概率更高，影响更严重。',
 fixDesc:'① 扫描时钟 MUX 必须使用 glitch-free 单元（工艺库提供的 CLKMUX）；② scan_en 信号必须满足时钟 MUX 的建立保持时间（通常在时钟低电平期间切换）；③ DFT 工程师必须在扫描插入时指定 glitch-free 时钟 MUX，并在 SGDC 中声明。',
 fixCode:`// 错误：普通 MUX 做扫描时钟切换
assign clk_dft = scan_en ? scan_clk : func_clk; // 产生毛刺！

// 正确：使用 glitch-free 扫描时钟 MUX（工艺库单元）
CLKMUX_DFT u_scan_mux (
  .CLK0(func_clk),  // 功能时钟
  .CLK1(scan_clk),  // 扫描时钟
  .SEL(scan_en),    // 扫描使能（需满足建立保持）
  .CLKOUT(clk_out)  // Glitch-free 输出
);
// scan_en 必须在 clk_out 低电平期间稳定切换`,
 sgdc:`# 声明扫描时钟 MUX 为 glitch-free
glitchfree_cell -names CLKMUX_DFT -type clock
# 声明 DFT 时钟与功能时钟互斥
set_clock_groups -logically_exclusive \\
  -group [get_clocks func_clk] \\
  -group [get_clocks scan_clk]`,
 waiveCond:'仅当 DFT 工程师通过 ATPG 工具验证扫描链数据完整性（所有向量 shift/capture 正确），且 STA 验证 scan_en 在所有工艺角满足时钟 MUX 建立保持时间。',
 waiveCode:`waive -rule Ac_glitch06 \\
  -from scan_en -to clk_out \\
  -comment "ATPG 覆盖率 100%，STA PVT 全角 scan_en 满足 MUX 建立保持"`,
 waiveNote:'⚠ 扫描时钟毛刺是 DFT 与 CDC 的交叉问题，需要 DFT 工程师与 CDC 工程师联合确认。流片前必须通过完整的扫描链连通性测试（Scan Chain Continuity Test）。',
 svgType:'clk_glitch',wfType:'clk_glitch'},

// ── Cat 4：数据保持问题 ────────────────────────────────────────────
{id:'ac_datahold03',ruleName:'Ac_datahold03',cat:4,title:'同步器输出经组合逻辑后二次跨域的数据保持违例',sev:'Error',
 desc:'信号从 clkA 域同步到 clkB 域后，clkB 域对同步器输出做了组合逻辑变换（如取反、与运算），然后将组合逻辑结果再次传回 clkA 域或第三个时钟域 clkC。二次跨域时，组合逻辑引入的额外延迟和可能的 glitch，叠加到同步器输出的时序不确定性上，产生新的数据保持违例。',
 root:'第一次同步已引入 2 个 clkB 周期延迟，组合逻辑进一步引入组合延迟（非整周期）。第二次跨域时，目标域采样窗口与实际数据有效窗口的对齐关系变得更加复杂，SpyGlass 需要追踪两次跨域的组合时序，往往出现误报或漏报。',
 impact:'二次跨域的数据在目标域（clkA 或 clkC）可能采到组合逻辑的过渡值或 glitch，产生错误功能。此类问题极难通过单独的 Block 级 CDC 分析发现，只有在 SoC flat CDC 中才能暴露完整的跨域链。',
 fixDesc:'① 避免同步器输出直接进入组合逻辑后再次跨域；② 在 clkB 域先寄存一拍消除组合延迟，再进行第二次跨域；③ 如必须二次跨域，确保第二次也经过完整的 2-FF 同步器，并在 SGDC 中声明完整的同步链。',
 fixCode:`// 错误：同步器输出经组合逻辑直接二次跨域
wire sig_b_sync;
sync_2ff u1(.clk(clkB),.d(sig_a),.q(sig_b_sync));
wire combo = sig_b_sync & ctrl_b; // 组合逻辑
always @(posedge clkA) result <= combo; // 未经同步直接跨回 clkA！

// 正确：clkB 域先寄存一拍消除组合不确定性
reg combo_r;
always @(posedge clkB) combo_r <= sig_b_sync & ctrl_b;
// 再经完整 2-FF 同步器传回 clkA
sync_2ff u2(.clk(clkA),.d(combo_r),.q(result_sync));`,
 sgdc:`# 声明双向同步链
sync_cell -name u1 -from_clk clkA -to_clk clkB
sync_cell -name u2 -from_clk clkB -to_clk clkA
# 确保 combo_r 为 clkB 域寄存输出，非组合直接跨域`,
 waiveCond:'仅当通过形式验证（Formal Verification）证明二次跨域的组合逻辑输出在目标域采样时刻完全稳定，且所有工艺角 PVT 均满足建立保持时间。',
 waiveCode:`waive -rule Ac_datahold03 \\
  -from combo -to clkA_domain \\
  -comment "形式验证通过，combo 在 clkA 采样时刻稳定，STA 全角满足"`,
 waiveNote:'二次跨域的组合路径是 CDC 分析的盲区，强烈建议在架构设计时避免此类结构；若确实存在，务必在 SoC flat CDC 中专项检查。',
 svgType:'datahold',wfType:'datahold'},

// ── Cat 5：复位同步 ────────────────────────────────────────────────
{id:'ar_seq01',ruleName:'Ar_seq01',cat:5,title:'复位释放顺序错误（子模块先于系统释放）',sev:'Error',
 desc:'SoC 中存在复位释放顺序依赖关系时，子模块的复位先于系统顶层（或其依赖的模块）释放，导致子模块在系统尚未就绪时开始运行。典型场景：PHY 在控制器之前退出复位，PHY 开始输出数据但控制器仍在复位中，数据被丢弃且 PHY 状态机进入非法状态。',
 root:'复位释放顺序问题源于：① 不同时钟域的复位同步器释放时刻不同；② 软件/PMU 对复位序列控制不当；③ 硬件复位网络中某些域的复位路径传播延迟更短，导致意外的早释放。',
 impact:'先释放的子模块在系统未就绪时发出请求或数据，造成握手超时、数据丢失、总线协议违规；严重时导致整个系统上电初始化失败。此类问题极难通过功能仿真覆盖，往往在硅后测试中才暴露。',
 fixDesc:'使用专用复位序列控制器（Reset Sequencer）：按照系统架构要求的顺序，逐级释放各域复位，保证依赖关系（如控制器复位先于 PHY 复位释放）。高通标准流程中，PMU 负责管理复位释放顺序。',
 fixCode:`// 复位序列控制器（简化示例）
module reset_sequencer(
  input  por_n, pmu_done,
  input  clkA, clkB,
  output rstn_ctrl, // 控制器复位（先释放）
  output rstn_phy   // PHY 复位（后释放）
);
  // 第 1 步：控制器复位同步释放
  rst_sync u_ctrl(.clk(clkA),.rstn_in(por_n),.rstn_out(rstn_ctrl));
  // 第 2 步：等控制器初始化完成（pmu_done）再释放 PHY 复位
  wire phy_rst_src = por_n & pmu_done;
  rst_sync u_phy(.clk(clkB),.rstn_in(phy_rst_src),.rstn_out(rstn_phy));
endmodule`,
 sgdc:`# 声明复位同步器
sync_cell -name u_ctrl -reset -to_clk clkA
sync_cell -name u_phy  -reset -to_clk clkB
reset -name por_n -async -value 0
# PMU done 信号同步
sync_cell -name u_pmu_sync -from_clk pmu_clk -to_clk clkA`,
 waiveCond:'仅当系统验证平台（SVP）通过完整的上电/复位场景（含所有复位顺序组合）验证，确认子模块早释放不影响系统正确性，且系统架构师书面确认。',
 waiveCode:`waive -rule Ar_seq01 \\
  -from rstn_phy \\
  -comment "SVP 验证：PHY 早释放场景下控制器已通过其他机制保护，架构确认"`,
 waiveNote:'⚠ 复位释放顺序问题在 RTL 仿真中极难覆盖，强烈建议使用专用 Reset Sequencer IP，并在门级仿真中加入上电复位专项场景。',
 svgType:'rst_unsync',wfType:'rst_unsync'},

// ── Cat 6：特殊情况 ────────────────────────────────────────────────
{id:'ac_blackbox01',ruleName:'Ac_blackbox01',cat:6,title:'黑盒模块 CDC 边界未声明（Black Box）',sev:'Warning',
 desc:'在层次化 CDC 分析中，某子模块以黑盒（Black Box）方式集成（无 RTL 代码，仅有端口定义），SpyGlass 无法分析其内部时钟域结构。若黑盒模块的端口未通过 cdc_model.tcl 声明时钟域归属，工具对所有与该模块交互的信号均无法给出确定的 CDC 分析结论，可能大量漏报真实违例。',
 root:'黑盒模块的内部 CDC 由 IP 供应商或其他团队负责，但与外部的接口信号的时钟域归属必须通过 cdc_model 声明。若 cdc_model 缺失或不完整，SpyGlass 分析顶层时无法确定黑盒端口所属时钟域，相关跨域路径被标记为"不可分析"或按保守假设处理。',
 impact:'漏报黑盒边界的真实 CDC 违例（最危险），或产生大量假违例需人工排查（效率极低）。在 SoC 集成中，黑盒 IP 的 CDC 边界疏漏是导致 Chip 级 CDC 分析不完整的主要原因之一。',
 fixDesc:'① 向 IP 供应商索取 cdc_model.tcl 或 SGDC 端口声明；② 若无法获取，由集成工程师根据 IP 数据手册手动编写 cdc_model，声明每个端口的时钟域归属；③ SoC CDC lint 必须检查所有黑盒模块的 cdc_model 完整性。',
 fixCode:`# 黑盒 IP 端口时钟域声明示例（cdc_model.tcl）
# 输入端口（从外部接收，已由外部同步）
cdc_model -port {data_in[7:0] ctrl_in} \\
  -clk clkA -combo no -direction in
# 输出端口（由 IP 内部 clkB 域驱动）
cdc_model -port {data_out[7:0] status_out} \\
  -clk clkB -combo no -direction out
# 异步端口（需在顶层同步）
cdc_model -port irq_out \\
  -clk async -direction out`,
 sgdc:`# SoC 顶层引用黑盒 IP 的 cdc_model
read_file -type sgdc ./ip_blk/ip_cdc_model.tcl
# 或手动声明
cdc_model -instance u_ip_blk \\
  -port data_out -clk clkB -combo no`,
 waiveCond:'仅当黑盒模块已由 IP 供应商提供经过认证的 CDC 分析报告（清零违例），且集成工程师验证了 cdc_model 与实际接口行为一致，经 CDC owner 审核。',
 waiveCode:`waive -rule Ac_blackbox01 \\
  -instance u_ip_blk \\
  -comment "IP 已通过供应商 CDC 认证，cdc_model 由供应商提供并经 CDC owner 审核"`,
 waiveNote:'⚠ 黑盒 CDC 是 SoC 集成中的高风险盲区。建议在 IP 采购合同中明确要求供应商提供 cdc_model.tcl，并将其纳入 IP 验收标准。',
 svgType:'coherency',wfType:'two_ff_sync'},

// ── Cat 7：时钟域结构问题 ──────────────────────────────────────────
{id:'ac_generated_clk01',ruleName:'Ac_generated_clk01',cat:7,title:'衍生时钟未正确声明导致误判为异步时钟',sev:'Warning',
 desc:'衍生时钟（Generated Clock）是由源时钟经分频、倍频、相移或门控产生的时钟。若在 SDC/SGDC 中未正确声明衍生时钟与源时钟的关系（create_generated_clock），SpyGlass 和 STA 工具会将其视为与源时钟完全异步的时钟，对两者之间的所有路径报告 CDC 违例，产生大量假违例；同时真正需要同步的路径也可能被漏报。',
 root:'工具的时钟关系推断依赖 SDC 约束中的 clock_groups 和 generated_clock 声明。若衍生时钟未声明，工具默认两时钟之间没有已知相位关系（即异步），触发保守的 CDC 检查。反之，若错误地将两个真正异步的时钟声明为衍生关系，则会漏报真实的 CDC 违例。',
 impact:'假违例大量涌现，淹没真实 CDC 问题，Signoff 效率极低；或因错误声明漏报真实 CDC 违例，芯片存在隐患。对于整数倍分频时钟，间路径已满足多周期时序约束但被工具误判为异步，会产生不必要的修复工作。',
 fixDesc:'① 所有分频/门控衍生时钟必须在 SDC 中用 create_generated_clock 正确声明源时钟和分频比；② 在 SGDC 中声明时钟关系（同步/异步/互斥）；③ 对整数倍分频同步时钟间的路径，用 set_multicycle_path 放宽时序约束，无需 CDC 同步器。',
 fixCode:`// SDC：声明衍生时钟
create_clock -name clkA -period 10 [get_ports CLK_IN]
create_generated_clock -name clkB_div2 \\
  -source [get_ports CLK_IN] \\
  -divide_by 2 \\
  [get_pins u_div/CLK_OUT]
// clkA 与 clkB_div2 为同步关系（整数倍分频）
// 无需 CDC 同步器，但需多周期路径约束
set_multicycle_path 2 -setup \\
  -from [get_clocks clkA] \\
  -to   [get_clocks clkB_div2]`,
 sgdc:`# SGDC 声明时钟关系
clock_group -name sync_grp \\
  -synchronous {clkA clkB_div2}
# 若两时钟真正异步（非整数倍分频）
clock_group -name async_grp \\
  -asynchronous {clkA clkC_pll}`,
 waiveCond:'仅当通过详细时序分析确认衍生时钟与源时钟之间的所有路径已满足多周期时序约束，且不存在真正的亚稳态风险（相位关系完全已知且固定）。',
 waiveCode:`waive -rule Ac_generated_clk01 \\
  -from_clock clkA -to_clock clkB_div2 \\
  -comment "clkB_div2 为 clkA 整数倍分频，SDC 已声明 generated_clock，MCP 约束满足"`,
 waiveNote:'⚠ 衍生时钟声明错误是 CDC 假违例的最大来源之一。建议在项目早期完整建立时钟树规范文档，并在第一次 SpyGlass 运行前完成所有 create_generated_clock 声明。',
 svgType:'clk_glitch',wfType:'clk_glitch'},

{id:'ac_cdc_power01',ruleName:'Ac_cdc_power01',cat:7,title:'电源门控期间 CDC 路径状态丢失（State Retention）',sev:'Error',
 desc:'当某个电源域（Power Domain）被关断时，跨越该域边界的 CDC 路径会失去状态：关断域内的寄存器状态丢失，常开域仍在运行并可能尝试读取已丢失的数据。若未使用状态保留寄存器（Retention Register）或未通过握手协议在关断前完成数据转移，重新上电后系统状态不一致，导致功能错误。',
 root:'标准触发器在掉电后状态全部丢失。若跨电源域的 CDC 路径在域关断前未完成数据交换，或关断域内的同步器状态在重新上电后不确定，常开域将读取到无效数据。PMU 的关断时序与 CDC 数据传输时序之间的配合是问题根源。',
 impact:'电源域重新上电后，系统处于不一致状态：关断域内寄存器被清零（或保留错误的上次值），但常开域的控制逻辑仍认为数据有效，产生功能错误；严重时导致芯片在低功耗场景下频繁挂死，且仅在特定功耗状态切换序列下复现。',
 fixDesc:'① 对关键状态寄存器使用保留寄存器（Retention Register / Always-On FF）；② 在 PMU 关断前，通过握手协议将关断域内的重要状态保存到常开域或非易失存储器；③ 使用 UPF/CPF 声明保留策略，由工具自动插入保留单元；④ ISO Cell 与 Retention Register 必须配合使用。',
 fixCode:`// UPF 声明状态保留策略
create_power_domain -name PD_sw  -elements {u_data_proc}
create_power_domain -name PD_aon -elements {u_ctrl}

// 声明保留寄存器（关键状态）
set_retention -domain PD_sw \\
  -save_signal    {pmu_save    high} \\
  -restore_signal {pmu_restore high} \\
  -elements {u_data_proc/state_reg*}

// RTL 层：关断前通过握手保存状态
always @(posedge clk_sw)
  if (pmu_shutdown_req) begin
    state_save   <= current_state; // 保存到 AON 域
    pmu_save_ack <= 1;             // 确认保存完成
  end`,
 sgdc:`# SpyGlass LP 模式声明保留寄存器
retention_cell -name RETEN_FF \\
  -save_pin SAVE -restore_pin RESTORE
# 声明电源域
power_domain -name PD_sw  -primary_power_net VDD_SW
power_domain -name PD_aon -primary_power_net VDD_AON`,
 waiveCond:'仅当经过完整的低功耗场景仿真（含所有关断/上电序列），确认：① 关断域内无需保留的状态在上电后会被正确初始化；② 跨域 CDC 路径在关断前已通过握手完成数据转移，且常开域有保护机制避免读取无效数据。',
 waiveCode:`waive -rule Ac_cdc_power01 \\
  -from PD_sw.state_reg -to PD_aon \\
  -comment "关断前 PMU 握手保证数据转移完成，上电后初始化序列重建状态，低功耗仿真验证通过"`,
 waiveNote:'⚠ 电源门控与 CDC 的交叉问题（CDC + Low Power）是最复杂的 SoC 设计挑战之一，需要 CDC 工程师、低功耗架构师和验证工程师三方联合分析，建议使用 SpyGlass LP+CDC 联合模式进行专项 lint。',
 svgType:'mux_sync',wfType:'mux_sync'}


];

// ===================== CIRCUIT ENGINE =====================
let SHOW_VIO = false;
const SVG_NS = 'http://www.w3.org/2000/svg';

function mkEl(tag, attrs={}) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}
function getSvg() { return document.getElementById('cSvg'); }

function drawDomain(p, x,y,w,h, type, label) {
  const colors = {A:['rgba(0,100,220,0.13)','#0064dc'],B:['rgba(220,100,0,0.13)','#dc6400'],C:['rgba(160,0,220,0.13)','#9000dc']};
  const [fill,stroke] = colors[type]||colors.A;
  p.appendChild(mkEl('rect',{x,y,width:w,height:h,rx:6,fill,stroke,'stroke-width':1.5,'stroke-dasharray':'6,3'}));
  const t=mkEl('text',{x:x+8,y:y+16,fill:stroke,'font-size':11,'font-weight':'bold','font-family':'monospace'});
  t.textContent=label; p.appendChild(t);
}
function drawFF(p, x,y, label, clkLbl, col='#4488cc') {
  const g=mkEl('g');
  g.appendChild(mkEl('rect',{x,y,width:56,height:48,rx:4,fill:'#0d1e30',stroke:col,'stroke-width':1.5}));
  // D label
  const d=mkEl('text',{x:x+5,y:y+26,fill:'#aaaacc','font-size':10,'font-family':'monospace'});
  d.textContent='D'; g.appendChild(d);
  // Q label
  const q=mkEl('text',{x:x+42,y:y+26,fill:'#aaaacc','font-size':10,'font-family':'monospace'});
  q.textContent='Q'; g.appendChild(q);
  // CLK triangle
  g.appendChild(mkEl('polygon',{points:`${x+3},${y+34} ${x+10},${y+30} ${x+10},${y+38}`,fill:'#6688aa'}));
  // CLK label
  const c=mkEl('text',{x:x+12,y:y+38,fill:'#557799','font-size':9,'font-family':'monospace'});
  c.textContent=clkLbl; g.appendChild(c);
  // Name label above
  const n=mkEl('text',{x:x+28,y:y-5,fill:col,'font-size':10,'font-family':'monospace','text-anchor':'middle'});
  n.textContent=label; g.appendChild(n);
  p.appendChild(g);
  return {dx:x,dy:y+24, qx:x+56,qy:y+24, clkx:x+28,clky:y+48};
}
function drawWire(p, x1,y1,x2,y2, col='#556677', dashed=false, animated=false) {
  let mx=(x1+x2)/2;
  let d=`M${x1},${y1} L${mx},${y1} L${mx},${y2} L${x2},${y2}`;
  const line=mkEl('path',{d,fill:'none',stroke:col,'stroke-width':2});
  if(dashed) line.setAttribute('stroke-dasharray','5,3');
  p.appendChild(line);
  if(animated) {
    const dot=mkEl('circle',{r:4,fill:col,opacity:0.9});

}
function drawArrow(p,x1,y1,x2,y2,col='#00d4ff') {
  drawWire(p,x1,y1,x2,y2,col);
  // Arrowhead
  const dx=x2-x1,dy=y2-y1,l=Math.sqrt(dx*dx+dy*dy)||1;
  const ux=dx/l,uy=dy/l;
  const pts=`${x2},${y2} ${x2-8*ux+5*uy},${y2-8*uy-5*ux} ${x2-8*ux-5*uy},${y2-8*uy+5*ux}`;
  p.appendChild(mkEl('polygon',{points:pts,fill:col}));
}

  t.textContent=text; p.appendChild(t);
}
function drawGate(p,x,y,type,label) {
  const g=mkEl('g');
  if(type==='AND') {
    g.appendChild(mkEl('path',{d:`M${x},${y} L${x+20},${y} Q${x+36},${y} ${x+36},${y+16} Q${x+36},${y+32} ${x+20},${y+32} L${x},${y+32} Z`,fill:'#1a2840',stroke:'#4477aa','stroke-width':1.5}));
  } else if(type==='OR') {
    g.appendChild(mkEl('path',{d:`M${x},${y} Q${x+12},${y+8} ${x+20},${y} L${x+36},${y} Q${x+44},${y+16} ${x+36},${y+32} L${x+20},${y+32} Q${x+12},${y+24} ${x},${y+32} Q${x+10},${y+16} ${x},${y} Z`,fill:'#1a2840',stroke:'#4477aa','stroke-width':1.5}));
  } else if(type==='XOR') {
    g.appendChild(mkEl('path',{d:`M${x+6},${y} Q${x+18},${y+8} ${x+26},${y} L${x+42},${y} Q${x+50},${y+16} ${x+42},${y+32} L${x+26},${y+32} Q${x+18},${y+24} ${x+6},${y+32} Q${x+16},${y+16} ${x+6},${y} Z`,fill:'#1a2840',stroke:'#44aacc','stroke-width':1.5}));
    g.appendChild(mkEl('path',{d:`M${x},${y} Q${x+10},${y+16} ${x},${y+32}`,fill:'none',stroke:'#44aacc','stroke-width':1.5}));
  } else if(type==='MUX') {
    g.appendChild(mkEl('polygon',{points:`${x},${y} ${x+40},${y+10} ${x+40},${y+40} ${x},${y+50}`,fill:'#1a2840',stroke:'#44aacc','stroke-width':1.5}));
  }
  const t=mkEl('text',{x:x+20,y:y+20,fill:'#aaccee','font-size':10,'font-family':'monospace','text-anchor':'middle','dominant-baseline':'middle'});
  t.textContent=label||type; g.appendChild(t);
  p.appendChild(g);
}
