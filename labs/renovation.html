<style>
        .lab-page {
            --bg-color: #000000;
            --text-color: #ffffff;
            --secondary-text: #8e8e93;
            --accent-color: #0071e3;
            --border-color: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(28, 28, 30, 0.7);
            --glass: rgba(255, 255, 255, 0.05);
            --sidebar-width: 260px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .lab-page {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background:
                radial-gradient(circle at 18% 12%, rgba(0, 113, 227, 0.18), transparent 32rem),
                radial-gradient(circle at 88% 28%, rgba(124, 60, 255, 0.16), transparent 34rem),
                linear-gradient(180deg, #05070b 0%, var(--bg-color) 42%);
            color: var(--text-color);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .app-container {
            flex: 1;
            min-height: 100vh;
        }

        aside {
            position: fixed;
            top: 72px;
            left: 0;
            bottom: 0;
            width: var(--sidebar-width);
            padding: 32px 18px;
            overflow-y: auto;
            background:
                linear-gradient(180deg, rgba(10, 14, 22, 0.92), rgba(0, 0, 0, 0.78)),
                rgba(255, 255, 255, 0.03);
            border-right: 1px solid var(--border-color);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            z-index: 10;
        }

        .nav-label {
            margin: 0 12px 16px;
            color: var(--secondary-text);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            min-height: 46px;
            padding: 12px 14px;
            color: rgba(255, 255, 255, 0.78);
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.065), rgba(255, 255, 255, 0.018));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            cursor: pointer;
            user-select: none;
            overflow: hidden;
            transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
        }

        .nav-item::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 18% 50%, rgba(66, 245, 255, 0.22), transparent 42%),
                linear-gradient(90deg, rgba(0, 113, 227, 0.18), transparent 58%);
            opacity: 0;
            transition: opacity 0.18s ease;
            pointer-events: none;
        }

        .nav-item span,
        .nav-item i {
            position: relative;
            z-index: 1;
        }

        .nav-item:hover {
            color: #fff;
            transform: translateX(4px);
            border-color: rgba(66, 245, 255, 0.42);
            box-shadow: 0 10px 28px rgba(0, 113, 227, 0.14);
        }

        .nav-item:hover::before {
            opacity: 1;
        }

        .nav-item.active {
            color: #fff;
            background:
                linear-gradient(135deg, rgba(0, 113, 227, 0.38), rgba(66, 245, 255, 0.12));
            border-color: rgba(66, 245, 255, 0.58);
            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, 0.08),
                0 0 24px rgba(0, 113, 227, 0.24);
        }

        .nav-item.active::before {
            opacity: 1;
        }

        /* Main Content */
        .lab-page main {
            flex-grow: 1;
            margin-left: var(--sidebar-width);
            padding: 112px 60px 64px;
            max-width: 1600px;
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
        }

        /* Grid System */
        .grid {
            display: grid;
            grid-template-columns: 1fr 320px 320px;
            gap: 24px;
            align-items: start;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 32px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--secondary-text);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Image Gallery */
        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .image-container {
            border-radius: 12px;
            overflow: hidden;
            background: #1c1c1e;
            border: 1px solid var(--border-color);
            cursor: zoom-in;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .image-container:hover img {
            transform: scale(1.02);
        }

        .no-image {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--secondary-text);
            font-size: 12px;
        }

        /* Design Iterations */
        .iteration-card {
            border-left: 3px solid var(--accent-color);
            background: rgba(255, 255, 255, 0.02);
        }

        .iteration-meta {
            font-size: 12px;
            color: var(--secondary-text);
            margin-bottom: 12px;
        }

        .badge-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }

        .badge {
            background: rgba(0, 113, 227, 0.1);
            color: var(--accent-color);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid rgba(0, 113, 227, 0.2);
        }

        /* Todo List */
        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .todo-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            transition: border-color 0.2s;
        }

        .todo-item:hover {
            border-color: rgba(66, 245, 255, 0.26);
            background: rgba(255, 255, 255, 0.045);
        }

        .todo-checkbox {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--secondary-text);
            border-radius: 50%;
            cursor: pointer;
            margin-top: 2px;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .todo-checkbox:checked {
            background: var(--accent-color);
            border-color: var(--accent-color);
        }

        .todo-text {
            flex-grow: 1;
            font-size: 14px;
            outline: none;
        }

        .completed .todo-text {
            color: var(--secondary-text);
            text-decoration: line-through;
        }

        .round-selector {
            background: rgba(0, 113, 227, 0.15);
            color: var(--accent-color);
            border: 1px solid rgba(0, 113, 227, 0.3);
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
            appearance: none;
            -webkit-appearance: none;
            text-align: center;
        }

        .round-selector:hover {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }


        /* Save Modal */
        #saveModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #1c1c1e;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            border: 1px solid var(--border-color);
        }

        /* Image Viewer Modal */
        #viewerModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            z-index: 3000;
            cursor: zoom-out;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        #viewerModal img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 8px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            object-fit: contain;
        }

        .viewer-close {
            position: absolute;
            top: 30px;
            right: 30px;
            color: white;
            font-size: 24px;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .viewer-close:hover {
            opacity: 1;
        }

        pre {
            background: #000;
            padding: 20px;
            border-radius: 12px;
            overflow: auto;
            max-height: 60vh;
            margin: 20px 0;
            font-size: 12px;
            font-family: monospace;
            color: #39d98a;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 1100px) {
            aside {
                position: sticky;
                top: 72px;
                width: 100%;
                padding: 18px;
                border-right: 0;
                border-bottom: 1px solid var(--border-color);
            }

            .nav-list {
                flex-direction: row;
                overflow-x: auto;
                padding-bottom: 4px;
            }

            .nav-item {
                flex: 0 0 auto;
                min-width: 150px;
            }

            .lab-page main {
                margin-left: 0;
                padding: 32px 20px 48px;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

<div class="lab-page">


<!-- Main Navigation -->
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside>
            <div class="nav-label">空间选择</div>
            <ul class="nav-list" id="roomNav">
                <!-- Nav items injected by JS -->
            </ul>
        </aside>

        <main>
            <div class="room-header">
                <div>
                    <div
                        style="font-size: 12px; color: var(--accent-color); font-weight: 600; margin-bottom: 4px; text-transform: uppercase;">
                        装修实验室</div>
                    <h1 id="roomTitle">请选择房间</h1>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-outline" onclick="resetToSource()"
                        style="border-color: rgba(255,255,255,0.2); color: var(--secondary-text);">重置到源码</button>
                    <button class="btn" onclick="showSaveModal()">导出配置</button>
                </div>
            </div>

            <div class="grid">
                <div class="media-area">
                    <!-- CAD Section -->
                    <div class="card">
                        <div class="card-title">基础布局 (CAD)</div>
                        <div class="image-gallery" id="cadGallery"></div>
                    </div>

                    <!-- Iterations -->
                    <div id="iterationsContainer"></div>

                    <button class="btn btn-outline" onclick="addIteration()" style="width: 100%; padding: 20px;">
                        <i class="fas fa-plus"></i> 发布新一轮设计更新
                    </button>
                </div>

                <div class="editor-area">
                    <div class="card">
                        <div class="card-title">全屋定制需求清单</div>
                        <div class="todo-list" id="reqList"></div>
                        <button class="btn btn-outline" onclick="addTodo()"
                            style="width: 100%; margin-top: 20px; border-style: dashed;">
                            新增需求条目
                        </button>
                    </div>
                </div>

                <div class="item-area">
                    <div class="card">
                        <div class="card-title">需放置的家电/物品</div>
                        <div class="todo-list" id="itemList"></div>
                        <button class="btn btn-outline" onclick="addItem()"
                            style="width: 100%; margin-top: 20px; border-style: dashed;">
                            新增待购物品
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Floating Back Button -->
<!-- Export Modal -->
    <div id="saveModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 10px;">同步您的数据</h3>
            <p style="font-size: 14px; color: var(--secondary-text);">请复制以下 JSON 代码，并替换 `renovation.html` 中
                `id="projectData"` 脚本块的内容以持久化您的更改。</p>
            <pre id="dataOutput"></pre>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn" onclick="copyData()" style="flex: 1;">复制到剪贴板</button>
                <button class="btn btn-outline" onclick="hideSaveModal()">关闭</button>
            </div>
        </div>
    </div>

    <!-- Image Viewer Modal -->
    <div id="viewerModal" onclick="closeViewer()">
        <div class="viewer-close"><i class="fas fa-times"></i></div>
        <img id="viewerImg" src="" alt="Full view">
    </div>

                            "/labs/renovation/assets/NorthBedroom/89.JPG"
                        ],
                        "note": ""
                    }
                ],
                "items": []
            }
        };

    </script>

    <script>
        // Load data from localStorage if available, else use default projectData
        const STORAGE_KEY = 'renovation_hub_data';
        let renovationData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || window._defaultProjectData;
        let currentRoom = Object.keys(renovationData)[0];

        function init() {
            renderNav();
            loadRoom(currentRoom);
        }

        // Save to localStorage whenever data changes
        function persistData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(renovationData));
        }

        function renderNav() {
            const nav = document.getElementById('roomNav');
            nav.innerHTML = '';
            Object.keys(renovationData).forEach(key => {
                const item = document.createElement('li');
                item.className = `nav-item ${key === currentRoom ? 'active' : ''}`;
                item.innerHTML = `<span>${renovationData[key].name}</span> <i class="fas fa-chevron-right" style="margin-left:auto; font-size:10px; opacity:0.3"></i>`;
                item.onclick = () => {
                    const active = document.querySelector('.nav-item.active');
                    if (active) active.classList.remove('active');
                    item.classList.add('active');
                    loadRoom(key);
                };
                nav.appendChild(item);
            });
        }

        function loadRoom(id) {
            currentRoom = id;
            const data = renovationData[id];
            if (!data.iterations) data.iterations = [];
            if (!data.items) data.items = [];
            document.getElementById('roomTitle').innerText = data.name;
            renderIterations(data.iterations, data.requirements);
            renderTodos(data.requirements);
            renderItems(data.items);
            renderImages('cadGallery', data.cad);
        }

        function renderIterations(iterations, allRequirements) {
            const container = document.getElementById('iterationsContainer');
            container.innerHTML = '';
            iterations.forEach((iter, idx) => {
                const solved = allRequirements.filter(r => r.completed && r.roundIndex === idx);
                const card = document.createElement('div');
                card.className = 'card iteration-card';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                        <div style="font-size:16px; font-weight:700; color:white;" contenteditable="true" oninput="updateIterTitle(${idx}, this.innerText)">${iter.title}</div>
                        <div class="iteration-meta">${iter.date || ''}</div>
                    </div>
                    <div class="image-gallery">
                        ${iter.images.map(src => `
                            <div class="image-container" onclick="openViewer('${src}')">
                                <img src="${src}" onerror="this.parentElement.innerHTML='<div class=no-image>图片路径错误</div>'">
                            </div>
                        `).join('')}
                        <button class="btn btn-outline" onclick="addImageToIter(${idx})" style="aspect-ratio:16/9; font-size:10px;">添加图片路径</button>
                    </div>
                    <div style="margin-top:20px;">
                        <div class="badge-list">
                            ${solved.length > 0 ? solved.map(s => `<span class="badge"><i class="fas fa-check"></i> ${s.text}</span>`).join('') : '<span style="color:var(--secondary-text); font-size:12px;">暂未关联需求</span>'}
                        </div>
                        <div contenteditable="true" oninput="updateIterNote(${idx}, this.innerText)" style="margin-top:16px; font-size:13px; color:var(--secondary-text); outline:none;" placeholder="添加本轮修改说明...">${iter.note || ''}</div>
                    </div>
                    <button style="margin-top:20px; background:transparent; border:none; color:#ff453a; cursor:pointer; font-size:11px; opacity:0.6" onclick="removeIteration(${idx})">删除此版本</button>
                `;
                container.appendChild(card);
            });
        }

        function renderTodos(todos) {
            const list = document.getElementById('reqList');
            const iters = renovationData[currentRoom].iterations || [];
            list.innerHTML = '';
            todos.forEach((todo, index) => {
                const item = document.createElement('div');
                item.className = `todo-item ${todo.completed ? 'completed' : ''}`;

                let roundSelector = "";
                if (todo.completed) {
                    const options = iters.map((it, i) => `<option value="${i}" ${todo.roundIndex == i ? 'selected' : ''}>V${i + 1}</option>`).join('');
                    roundSelector = `<select class="round-selector" onchange="updateTodoRound(${index}, this.value)"><option value="-1">未关联</option>${options}</select>`;
                }

                item.innerHTML = `
                    <input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo(${index})">
                    <div class="todo-text" contenteditable="true" oninput="updateTodo(${index}, this.innerText)">${todo.text}</div>
                    ${roundSelector}
                    <i class="fas fa-times" style="color:var(--secondary-text); cursor:pointer; opacity:0.3; font-size:12px;" onclick="removeTodo(${index})"></i>
                `;
                list.appendChild(item);
            });
        }

        function renderItems(items) {
            const list = document.getElementById('itemList');
            list.innerHTML = '';
            items.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `todo-item ${item.completed ? 'completed' : ''}`;
                div.innerHTML = `
                    <input type="checkbox" class="todo-checkbox" ${item.completed ? 'checked' : ''} onchange="toggleItem(${index})">
                    <div class="todo-text" contenteditable="true" oninput="updateItem(${index}, this.innerText)">${item.text}</div>
                    <i class="fas fa-times" style="color:var(--secondary-text); cursor:pointer; opacity:0.3; font-size:12px;" onclick="removeItem(${index})"></i>
                `;
                list.appendChild(div);
            });
        }

        function addIteration() {
            const date = new Date().toISOString().split('T')[0];
            const roundNum = renovationData[currentRoom].iterations.length + 1;
            renovationData[currentRoom].iterations.push({ title: `V${roundNum} 设计轮次`, date: date, images: [], note: "" });
            persistData();
            loadRoom(currentRoom);
        }

        function addImageToIter(idx) {
            const path = prompt("请输入图片路径 (例如: /labs/renovation/assets/LivingRoom-TVWall/new.jpg):");
            if (path) {
                renovationData[currentRoom].iterations[idx].images.push(path);
                persistData();
                loadRoom(currentRoom);
            }
        }

        function updateIterTitle(idx, val) { renovationData[currentRoom].iterations[idx].title = val; persistData(); }
        function updateIterNote(idx, val) { renovationData[currentRoom].iterations[idx].note = val; persistData(); }
        function removeIteration(idx) {
            if (confirm("确定删除此版本吗？")) {
                renovationData[currentRoom].iterations.splice(idx, 1);
                persistData();
                loadRoom(currentRoom);
            }
        }

        function addTodo() {
            renovationData[currentRoom].requirements.push({ text: "新需求条目", completed: false });
            persistData();
            loadRoom(currentRoom);
        }

        function toggleTodo(index) {
            const todo = renovationData[currentRoom].requirements[index];
            todo.completed = !todo.completed;
            if (todo.completed && (todo.roundIndex === undefined || todo.roundIndex === -1)) {
                const iters = renovationData[currentRoom].iterations;
                if (iters && iters.length > 0) todo.roundIndex = iters.length - 1;
            }
            persistData();
            loadRoom(currentRoom);
        }

        function updateTodo(index, text) { renovationData[currentRoom].requirements[index].text = text; persistData(); }
        function updateTodoRound(index, roundIdx) {
            renovationData[currentRoom].requirements[index].roundIndex = roundIdx == -1 ? undefined : parseInt(roundIdx);
            persistData();
            loadRoom(currentRoom);
        }
        function removeTodo(index) {
            renovationData[currentRoom].requirements.splice(index, 1);
            persistData();
            loadRoom(currentRoom);
        }

        function addItem() {
            renovationData[currentRoom].items.push({ text: "新物品", completed: false });
            persistData();
            loadRoom(currentRoom);
        }

        function toggleItem(index) {
            renovationData[currentRoom].items[index].completed = !renovationData[currentRoom].items[index].completed;
            persistData();
            loadRoom(currentRoom);
        }

        function updateItem(index, text) { renovationData[currentRoom].items[index].text = text; persistData(); }
        function removeItem(index) {
            renovationData[currentRoom].items.splice(index, 1);
            persistData();
            loadRoom(currentRoom);
        }

        function renderImages(containerId, images) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            if (!images || images.length === 0) { container.innerHTML = '<div class="no-image">暂无平面图图纸</div>'; return; }
            images.forEach(src => {
                const div = document.createElement('div');
                div.className = 'image-container';
                div.onclick = () => openViewer(src);
                div.innerHTML = `<img src="${src}" onerror="this.parentElement.innerHTML='<div class=no-image>图片缺失</div>'">`;
                container.appendChild(div);
            });
        }

        function openViewer(src) {
            const modal = document.getElementById('viewerModal');
            const img = document.getElementById('viewerImg');
            img.src = src;
            modal.style.display = 'flex';
        }

        function closeViewer() {
            document.getElementById('viewerModal').style.display = 'none';
        }

        function showSaveModal() {
            const output = `window._defaultProjectData = ${JSON.stringify(renovationData, null, 4)};`;
            document.getElementById('dataOutput').innerText = output;
            document.getElementById('saveModal').style.display = 'flex';
        }
        function hideSaveModal() { document.getElementById('saveModal').style.display = 'none'; }
        function copyData() {
            const text = document.getElementById('dataOutput').innerText;
            navigator.clipboard.writeText(text).then(() => alert('数据已复制到剪贴板！'));
        }

        function resetToSource() {
            if (confirm("确定要丢弃所有本地修改，并恢复到源码定义的版本吗？\n该操作不可撤销。")) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }

        window.onload = init;
    </script>
</div>
