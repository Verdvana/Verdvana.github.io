<script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
<script>
  (function () {
    var lightbox = null;
    var previewImage = null;
    var closeButton = null;

    function ensurePostImageLightbox() {
      if (lightbox) {
        return true;
      }

      if (!document.querySelector('.post-content.js-toc-content')) {
        return false;
      }

      lightbox = document.querySelector('.post-image-lightbox');
      if (lightbox) {
        previewImage = lightbox.querySelector('img');
        closeButton = lightbox.querySelector('.post-image-lightbox-close');
        return !!previewImage;
      }

      lightbox = document.createElement('div');
      lightbox.className = 'post-image-lightbox';
      lightbox.setAttribute('role', 'dialog');
      lightbox.setAttribute('aria-modal', 'true');
      lightbox.setAttribute('aria-label', 'Image preview');

      previewImage = document.createElement('img');
      previewImage.alt = '';

      closeButton = document.createElement('button');
      closeButton.className = 'post-image-lightbox-close';
      closeButton.type = 'button';
      closeButton.setAttribute('aria-label', 'Close image preview');
      closeButton.innerHTML = '&times;';

      lightbox.appendChild(previewImage);
      lightbox.appendChild(closeButton);
      document.body.appendChild(lightbox);

      lightbox.addEventListener('click', function (event) {
        if (event.target === lightbox || event.target === closeButton) {
          closePostImageLightbox();
        }
      });

      previewImage.addEventListener('click', function (event) {
        event.stopPropagation();
      });

      return true;
    }

    function openPostImageLightbox(sourceImage) {
      if (!ensurePostImageLightbox() || !previewImage || !sourceImage) {
        return;
      }

      var largeSrc = sourceImage.currentSrc || sourceImage.getAttribute('src');
      if (!largeSrc || sourceImage.closest('.post-image-lightbox')) {
        return;
      }

      previewImage.alt = sourceImage.alt || '';
      previewImage.src = largeSrc;
      lightbox.classList.add('is-active');
      document.body.classList.remove('is-leaving');
      document.body.classList.add('post-image-lightbox-open');

      window.requestAnimationFrame(function () {
        try {
          if (closeButton) {
            closeButton.focus({ preventScroll: true });
          }
        } catch (e) {}
      });
    }

    function closePostImageLightbox() {
      if (!lightbox) {
        return;
      }

      lightbox.classList.remove('is-active');
      document.body.classList.remove('post-image-lightbox-open');
      window.setTimeout(function () {
        if (!lightbox.classList.contains('is-active') && previewImage) {
          previewImage.removeAttribute('src');
          previewImage.alt = '';
        }
      }, 220);
    }

    document.addEventListener('click', function (event) {
      var image = event.target.closest && event.target.closest('.post-content.js-toc-content img');
      if (!image || image.closest('a.no-lightbox')) {
        return;
      }

      event.preventDefault();
      event.stopImmediatePropagation();
      openPostImageLightbox(image);
    }, true);

    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape' && lightbox && lightbox.classList.contains('is-active')) {
        closePostImageLightbox();
      }
    });
  }());

  (function () {
    var pageLoaded = false;

    function markLoaded() {
      if (pageLoaded) {
        return;
      }

      pageLoaded = true;
      document.body.classList.add('is-loaded');

      window.setTimeout(function () {
        document.body.classList.add('loader-removed');
      }, 650);
    }

    window.addEventListener('load', function () {
      window.setTimeout(markLoaded, 120);
    });

    window.setTimeout(markLoaded, 1800);

    window.addEventListener('pageshow', function () {
      document.body.classList.remove('is-leaving');
      markLoaded();
    });

    document.addEventListener('click', function (event) {
      var link = event.target.closest && event.target.closest('a[href]');
      if (!link || event.defaultPrevented || event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) {
        return;
      }

      // Markdown image links in posts are handled by the post lightbox.
      // Do not run the global page-leave transition for them, otherwise clicking
      // an image wrapped in <a href="..."> can look like a frozen page.
      if (link.closest && link.closest('.post-content') && (link.querySelector('img') || event.target.closest('.post-content img'))) {
        return;
      }

      if (link.target && link.target !== '_self') {
        return;
      }

      var url;
      try {
        url = new URL(link.href, window.location.href);
      } catch (e) {
        return;
      }

      if (url.origin !== window.location.origin || url.href === window.location.href || url.hash && url.pathname === window.location.pathname) {
        return;
      }

      event.preventDefault();
      document.body.classList.add('is-leaving');
      window.setTimeout(function () {
        window.location.href = url.href;
      }, 160);
    });
  }());

  window.addEventListener('DOMContentLoaded', function() {
    var backButton = document.getElementById('fabBack');
    if (backButton) {
      backButton.addEventListener('click', function () {
        try {
          if (history.length > 1) {
            history.back();
            return;
          }
        } catch (e) {}

        try {
          var u = new URL(window.location.href);
          var p = u.pathname.replace(/\/+$/, '');
          var idx = p.lastIndexOf('/');
          if (idx > 0) {
            u.pathname = p.slice(0, idx + 1);
            window.location.assign(u.toString());
            return;
          }
        } catch (e) {}

        window.location.assign('{{ "/labs/" | relative_url }}');
      });
    }
  });

  function toggleWeChat() {
    var modal = document.getElementById('wechat-modal');
    if (modal) {
      modal.classList.toggle('active');
    }
  }

  (function() {
    function setzero(i) {
      return (i < 10) ? "0" + i : i;
    }

    var day = document.getElementById("run_time_day");
    var hour = document.getElementById("run_time_hour");
    var minute = document.getElementById("run_time_minute");
    var second = document.getElementById("run_time_second");
    if (!day || !hour || !minute || !second) {
      return;
    }

    function renderRunTime() {
      var birthDay = new Date("10/04/2018 11:03:56");
      var today = new Date();
      var timeOld = today.getTime() - birthDay.getTime();
      var msPerDay = 24 * 60 * 60 * 1000;
      var daysOld = Math.floor(timeOld / msPerDay);
      var hrsOld = Math.floor((timeOld % msPerDay) / (60 * 60 * 1000));
      var minsOld = Math.floor((timeOld % (60 * 60 * 1000)) / (60 * 1000));
      var secondsOld = Math.floor((timeOld % (60 * 1000)) / 1000);

      day.innerHTML = daysOld;
      hour.innerHTML = setzero(hrsOld);
      minute.innerHTML = setzero(minsOld);
      second.innerHTML = setzero(secondsOld);
    }

    var timerId = null;
    function startRunTime() {
      if (timerId) {
        return;
      }
      renderRunTime();
      timerId = setInterval(renderRunTime, 1000);
    }

    function stopRunTime() {
      if (!timerId) {
        return;
      }
      clearInterval(timerId);
      timerId = null;
    }

    var uptimeStats = document.getElementById('uptime-stats');
    if ('IntersectionObserver' in window && uptimeStats) {
      var observer = new IntersectionObserver(function (entries) {
        if (entries[0] && entries[0].isIntersecting) {
          startRunTime();
        } else {
          stopRunTime();
        }
      });
      observer.observe(uptimeStats);
    } else {
      startRunTime();
    }
  }());
</script>
